<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ハンテン - 重力をひっくり返せ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e27;
  --cyan:#00f0ff;
  --pink:#ff2d95;
  --yellow:#ffe14d;
  --text:#eaf6ff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;background:#05071a}
body{
  font-family:'M PLUS Rounded 1c',sans-serif;color:var(--text);
  touch-action:none;
}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
canvas{display:block;position:absolute;inset:0;width:100%;height:100%}

/* ---------- Overlays ---------- */
.overlay{
  position:absolute;inset:0;z-index:10;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:24px;
  pointer-events:none;
}
.overlay.show{display:flex;animation:fade .35s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}

.title{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(54px,17vw,120px);line-height:.95;letter-spacing:.04em;
  color:#fff;
  text-shadow:0 0 12px var(--cyan),0 0 30px var(--cyan),0 0 60px rgba(0,240,255,.6);
  animation:pulseGlow 2.2s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{text-shadow:0 0 12px var(--cyan),0 0 30px var(--cyan),0 0 60px rgba(0,240,255,.6)}
  50%{text-shadow:0 0 18px var(--pink),0 0 44px var(--pink),0 0 90px rgba(255,45,149,.6)}
}
.subtitle{font-family:'Orbitron',sans-serif;font-weight:500;letter-spacing:.45em;
  font-size:clamp(11px,3.4vw,16px);color:var(--cyan);margin-top:6px;opacity:.9;text-indent:.45em}

.tap-hint{
  margin-top:42px;font-family:'Orbitron',sans-serif;font-weight:700;
  font-size:clamp(16px,5vw,24px);color:var(--yellow);
  text-shadow:0 0 16px rgba(255,225,77,.7);
  animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.96)}}

.howto{margin-top:28px;font-size:clamp(13px,3.8vw,16px);color:#9fb4d8;font-weight:700;line-height:1.7}
.howto b{color:#fff}
.key{display:inline-block;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
  border-radius:7px;padding:1px 9px;font-family:'Orbitron';font-size:.85em;margin:0 2px}

.best-pill{
  margin-top:26px;font-family:'Orbitron',sans-serif;font-weight:700;
  background:rgba(0,240,255,.08);border:1.5px solid rgba(0,240,255,.45);
  border-radius:40px;padding:9px 22px;font-size:clamp(13px,4vw,17px);color:var(--cyan);
  box-shadow:0 0 24px rgba(0,240,255,.2);letter-spacing:.05em;
}

/* HUD (in-game) */
#hud{position:absolute;top:0;left:0;right:0;z-index:8;display:none;
  padding:16px 20px;justify-content:space-between;align-items:flex-start;pointer-events:none;
  padding-top:max(16px,env(safe-area-inset-top));}
#hud.show{display:flex}
.dist{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(30px,9vw,52px);
  line-height:1;color:#fff;text-shadow:0 0 14px rgba(0,240,255,.55)}
.dist small{font-size:.4em;color:var(--cyan);font-weight:700;margin-left:4px}
.hud-right{text-align:right;font-family:'Orbitron';font-weight:700}
.hud-best{font-size:clamp(11px,3.2vw,14px);color:#7f93bd}
.hud-best b{color:var(--yellow)}
.hud-orb{font-size:clamp(13px,3.6vw,16px);color:var(--yellow);margin-top:4px}

/* Pause btn */
#pauseBtn{position:absolute;top:max(14px,env(safe-area-inset-top));right:16px;z-index:9;
  width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.2);
  background:rgba(10,14,39,.6);color:#fff;font-size:16px;display:none;align-items:center;
  justify-content:center;cursor:pointer;pointer-events:auto;backdrop-filter:blur(4px)}
#pauseBtn.show{display:flex}

/* Result */
.result-card{pointer-events:auto;display:flex;flex-direction:column;align-items:center}
.gameover{font-family:'Orbitron';font-weight:700;letter-spacing:.3em;font-size:clamp(14px,4vw,18px);
  color:var(--pink);text-shadow:0 0 18px rgba(255,45,149,.7);text-indent:.3em}
.newrec{font-family:'Orbitron';font-weight:900;font-size:clamp(26px,9vw,46px);
  color:var(--yellow);text-shadow:0 0 22px rgba(255,225,77,.8);margin:6px 0;
  animation:recPop .6s cubic-bezier(.2,1.5,.4,1) both, recGlow 1.4s ease-in-out infinite .6s}
@keyframes recPop{from{transform:scale(0) rotate(-8deg);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes recGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}
.res-dist{font-family:'Orbitron';font-weight:900;font-size:clamp(56px,20vw,120px);line-height:1;
  color:#fff;margin:8px 0;text-shadow:0 0 20px rgba(0,240,255,.6)}
.res-dist small{font-size:.32em;color:var(--cyan)}
.res-sub{font-size:clamp(13px,3.8vw,16px);color:#9fb4d8;font-weight:700;margin-bottom:4px}
.res-sub b{color:var(--yellow)}
.btns{display:flex;flex-direction:column;gap:12px;margin-top:30px;width:min(320px,80vw)}
.btn{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(15px,4.4vw,18px);
  border:none;border-radius:16px;padding:17px;cursor:pointer;letter-spacing:.04em;
  color:#04121a;background:linear-gradient(180deg,#5ffbff,var(--cyan));
  box-shadow:0 0 26px rgba(0,240,255,.45),0 8px 20px rgba(0,0,0,.4);
  transition:transform .08s;
}
.btn:active{transform:scale(.96)}
.btn.share{color:#fff;background:linear-gradient(180deg,#ff5fae,var(--pink));
  box-shadow:0 0 26px rgba(255,45,149,.45),0 8px 20px rgba(0,0,0,.4)}
.btn.ghost{color:#cfe0ff;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.2);box-shadow:none}

/* sound toggle */
#sndBtn{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;z-index:9;
  width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.18);
  background:rgba(10,14,39,.55);color:#fff;font-size:17px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;pointer-events:auto;backdrop-filter:blur(4px)}

/* pause overlay */
#pauseScreen .title{font-size:clamp(40px,12vw,80px)}
.flash-tag{position:absolute;bottom:30px;font-family:'Orbitron';font-size:12px;color:#5a6a92;letter-spacing:.2em}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <button id="sndBtn" title="サウンド">🔊</button>
  <button id="pauseBtn" title="ポーズ">⏸</button>

  <!-- HUD -->
  <div id="hud">
    <div class="dist"><span id="hudDist">0</span><small>m</small></div>
    <div class="hud-right">
      <div class="hud-best">BEST <b id="hudBest">0</b>m</div>
      <div class="hud-orb">◆ <span id="hudOrb">0</span></div>
    </div>
  </div>

  <!-- TITLE -->
  <div class="overlay show" id="titleScreen">
    <div class="title">ハンテン</div>
    <div class="subtitle">FLIP&nbsp;THE&nbsp;GRAVITY</div>
    <div class="best-pill" id="titleBest">BEST&nbsp;&nbsp;0 m</div>
    <div class="tap-hint">TAP TO START</div>
    <div class="howto">
      <b>タップ</b>／クリック／<span class="key">SPACE</span> で<b>重力反転</b><br>
      天井と床を行き来して障害物を避けろ
    </div>
    <div class="flash-tag" id="playCount"></div>
  </div>

  <!-- PAUSE -->
  <div class="overlay" id="pauseScreen">
    <div class="title">PAUSE</div>
    <div class="btns">
      <button class="btn" id="resumeBtn">▶ RESUME</button>
      <button class="btn ghost" id="quitBtn">タイトルへ</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="overlay" id="resultScreen">
    <div class="result-card">
      <div class="gameover">GAME OVER</div>
      <div class="newrec" id="newRec" style="display:none">★ NEW RECORD! ★</div>
      <div class="res-dist"><span id="resDist">0</span><small>m</small></div>
      <div class="res-sub">BEST <b id="resBest">0</b>m ・ ◆ <span id="resOrb">0</span></div>
      <div class="btns">
        <button class="btn" id="retryBtn">↻ もう一度</button>
        <button class="btn share" id="shareBtn">Xでシェア</button>
        <button class="btn ghost" id="homeBtn">タイトルへ</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   ハンテン - Flip The Gravity  (one-tap canvas action)
   ===================================================================== */
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1;

function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.floor(W*DPR); cv.height = Math.floor(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- storage ---------- */
const LS = {
  get(k,d){try{const v=localStorage.getItem('hanten_'+k);return v===null?d:JSON.parse(v)}catch(e){return d}},
  set(k,v){try{localStorage.setItem('hanten_'+k,JSON.stringify(v))}catch(e){}}
};
let best = LS.get('best',0);
let plays = LS.get('plays',0);
let totalOrbs = LS.get('orbs',0);
let soundOn = LS.get('sound',true);

/* ---------- audio (Web Audio API) ---------- */
let actx=null, beatTimer=null;
function AC(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return actx;}
function blip(freq,dur,type='sine',vol=.2,slideTo=null){
  if(!soundOn)return;const ac=AC();if(!ac)return;
  const t=ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.008);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+dur+.02);
}
const SFX={
  flip(){blip(660,.16,'triangle',.18,1100);},
  orb(){blip(900,.09,'square',.14);blip(1320,.12,'square',.12);setTimeout(()=>blip(1760,.1,'square',.1),40);},
  die(){blip(420,.5,'sawtooth',.25,70);},
  record(){[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>blip(f,.3,'triangle',.2),i*90));},
  start(){blip(523,.1,'triangle',.16);setTimeout(()=>blip(784,.12,'triangle',.16),90);},
};
// simple tempo-linked beat
let beatStep=0;
function beatTick(){
  if(!soundOn||state!=='play'){return;}
  const ac=AC();if(!ac)return;
  const base = 55 * (beatStep%4===0?1: beatStep%2===0?1.5:1);
  // kick on every step, bass note pattern
  blip(base,.12,'sine',.12);
  if(beatStep%2===0) blip(base*4,.05,'square',.04);
  beatStep++;
}
function startBeat(){
  stopBeat();
  const interval = ()=> Math.max(140, 340 - (speed-BASE_SPEED)*14); // faster with speed
  function schedule(){ beatTick(); beatTimer=setTimeout(schedule, interval()); }
  beatTimer=setTimeout(schedule, interval());
}
function stopBeat(){ if(beatTimer){clearTimeout(beatTimer);beatTimer=null;} }

/* ---------- game constants ---------- */
const BASE_SPEED = 5.2;
const MAX_SPEED = 13.5;
const GRAV = 2400;          // px/s^2
const PLAYER_X_RATIO = 0.26;
const WALL = 0;             // computed top/bottom band thickness per frame

let state='title';          // title | play | pause | dying | result
let speed=BASE_SPEED;
let dist=0;                 // meters
let orbs=0;
let lastT=0;
let shake=0;
let flashAlpha=0;           // gravity-flip shimmer
let slowmo=1;               // death slow motion factor
let hue=190;                // stage color drift
let stageBand=0;

// player
const P={ x:0,y:0,vy:0,size:26, grav:1, // grav 1 = down(floor), -1 = up(ceiling)
  onGround:true, trail:[] };

// world geometry
let floorY=0, ceilY=0, lane=0;

// arrays
let obstacles=[];
let orbsArr=[];
let particles=[];
let speedLines=[];
let gridOffset=0;
let spawnX=0;               // next spawn world position tracker (px until next spawn)

/* ---------- helpers ---------- */
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

function computeGeom(){
  const band = clamp(H*0.10, 40, 90);
  ceilY = band;
  floorY = H - band;
  lane = floorY - ceilY;
  P.x = W*PLAYER_X_RATIO;
}

/* ---------- reset / start ---------- */
function resetGame(){
  computeGeom();
  speed=BASE_SPEED; dist=0; orbs=0; slowmo=1; shake=0; hue=190; stageBand=0;
  obstacles=[]; orbsArr=[]; particles=[]; speedLines=[]; spawnX=W*0.9;
  P.size=Math.max(20, Math.min(30, H*0.04));
  P.grav=1; P.vy=0; P.onGround=true; P.trail=[];
  P.y=floorY - P.size/2;
}
function startGame(){
  resetGame();
  state='play';
  plays++; LS.set('plays',plays);
  hide(titleScreen); hide(resultScreen); hide(pauseScreen);
  show(hud); pauseBtn.classList.add('show');
  SFX.start();
  beatStep=0; startBeat();
  lastT=performance.now();
}

/* ---------- input ---------- */
function flip(){
  if(state!=='play')return;
  P.grav*=-1;
  P.onGround=false;
  // give a small impulse off the surface for snappy feel
  P.vy = P.grav*-120;
  flashAlpha=0.6;
  SFX.flip();
  // burst at player
  for(let i=0;i<8;i++){
    particles.push({x:P.x,y:P.y,vx:rand(-2,2),vy:rand(-2,2),life:1,c:'#00f0ff',s:rand(2,4)});
  }
}
function onTap(e){
  if(e&&e.type==='touchstart')e.preventDefault();
  AC(); // unlock audio on first gesture
  if(state==='title'){ startGame(); return; }
  if(state==='result'){ /* handled by buttons */ return; }
  if(state==='pause'){ return; }
  if(state==='play'){ flip(); }
}
cv.addEventListener('mousedown', onTap);
cv.addEventListener('touchstart', onTap, {passive:false});
// also allow tap on title/result background overlay area
titleScreen.addEventListener('mousedown', onTap);
titleScreen.addEventListener('touchstart', onTap, {passive:false});

window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    if(state==='title')startGame();
    else if(state==='play')flip();
    else if(state==='pause')resumeGame();
  } else if(e.code==='Escape'){
    if(state==='play')pauseGame();
    else if(state==='pause')resumeGame();
  } else if(e.code==='Enter'){
    if(state==='result')startGame();
  }
});

/* ---------- spawning ---------- */
function difficulty(){
  // 0..1 ramp based on distance
  return clamp(dist/650, 0, 1);
}
function spawnObstacle(){
  const d=difficulty();
  const r=Math.random();
  const minGate = lane*(0.42 - d*0.12); // shrinking passable gap
  const ph = P.size;

  if(r<0.42){
    // spike/block from floor OR ceiling
    const fromTop = Math.random()<0.5;
    const maxH = lane*(0.30 + d*0.30);
    const h = rand(lane*0.18, maxH);
    obstacles.push(mkBlock(W+60, fromTop, h));
  } else if(r<0.72){
    // gate: blocks from both, leaving a gap at top or bottom
    const gap = Math.max(minGate, ph*2.4);
    const gapAtTop = Math.random()<0.5;
    if(gapAtTop){
      obstacles.push(mkBlock(W+60, false, lane-gap)); // big from floor
    }else{
      obstacles.push(mkBlock(W+60, true, lane-gap));  // big from ceiling
    }
  } else if(r<0.86){
    // double pinch: both top and bottom small, gap in middle
    const gap = Math.max(minGate*1.1, ph*2.6);
    const rem = lane-gap;
    const topH = rem*rand(0.35,0.65);
    obstacles.push(mkBlock(W+60, true, topH));
    obstacles.push(mkBlock(W+60, false, rem-topH));
  } else {
    // staggered: floor block then a bit later ceiling block (added as two with offset)
    const h1=rand(lane*0.2,lane*0.4);
    obstacles.push(mkBlock(W+60,false,h1));
    obstacles.push(mkBlock(W+60+rand(120,200),true,rand(lane*0.2,lane*0.4)));
  }

  // sometimes an orb in the safe path
  if(Math.random()<0.55){
    spawnOrbNear();
  }
}
function mkBlock(x, fromTop, h){
  const w = rand(34, 52);
  return { x, w, h, fromTop, scored:false };
}
function spawnOrbNear(){
  const onCeil = Math.random()<0.5;
  const oy = onCeil ? ceilY + lane*rand(0.12,0.32) : floorY - lane*rand(0.12,0.32);
  orbsArr.push({ x:W+rand(80,220), y:oy, r:9, got:false, pulse:Math.random()*6 });
}

/* ---------- collision (slightly forgiving) ---------- */
function aabb(px,py,pr, bx,by,bw,bh){
  // shrink player hitbox a touch for fairness
  const m=pr*0.78;
  return (px+m > bx) && (px-m < bx+bw) && (py+m > by) && (py-m < by+bh);
}

/* ---------- update ---------- */
function update(dt){
  // speed ramps with distance
  const target = BASE_SPEED + (MAX_SPEED-BASE_SPEED)*difficulty();
  speed += (target-speed)*Math.min(1,dt*2);
  const sp = speed * (state==='dying'? slowmo : 1);
  const move = sp * (dt*60); // px this frame (dt in s, normalized to 60fps feel)

  if(state==='play'||state==='dying'){
    dist += move/14;  // px -> meters scaling
    gridOffset = (gridOffset + move) % 80;
  }

  // stage color drift every 220m
  const nb = Math.floor(dist/220);
  if(nb!==stageBand){ stageBand=nb; }
  hue = 190 + stageBand*42; // shift palette per stage
  const cyan = `hsl(${(hue)%360},100%,55%)`;
  const pink = `hsl(${(hue+150)%360},100%,60%)`;
  STAGE.cyan=cyan; STAGE.pink=pink;

  // ---- player physics ----
  if(state==='play'){
    P.vy += P.grav*GRAV*dt;
    P.y  += P.vy*dt;
    const top = ceilY + P.size/2;
    const bot = floorY - P.size/2;
    if(P.grav>0){ // falling to floor
      if(P.y>=bot){ P.y=bot; P.vy=0; P.onGround=true; }
    } else { // rising to ceiling
      if(P.y<=top){ P.y=top; P.vy=0; P.onGround=true; }
    }
    // clamp just in case
    P.y=clamp(P.y, top, bot);
  }

  // trail
  if(state==='play'){
    P.trail.unshift({x:P.x,y:P.y});
    if(P.trail.length>14)P.trail.pop();
  }

  // ---- spawn pacing ----
  if(state==='play'){
    spawnX -= move;
    if(spawnX<=0){
      spawnObstacle();
      const d=difficulty();
      const gap = rand(280, 460) - d*120; // closer together as harder
      spawnX = Math.max(150, gap);
    }
    // speed lines
    if(Math.random()< clamp(0.15+difficulty()*0.4,0,0.6)){
      speedLines.push({x:W+20, y:rand(ceilY,floorY), len:rand(40,120), life:1});
    }
  }

  // ---- move obstacles ----
  for(const o of obstacles){ o.x -= move; }
  obstacles = obstacles.filter(o=>o.x+o.w>-20);

  for(const o of orbsArr){ o.x -= move; o.pulse+=dt*6; }
  orbsArr = orbsArr.filter(o=>o.x>-30 && !o.got);

  for(const s of speedLines){ s.x -= move*1.6; s.life-=dt*1.2; }
  speedLines = speedLines.filter(s=>s.x>-140 && s.life>0);

  // particles
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=dt*1.8; p.vx*=0.97;
  }
  particles=particles.filter(p=>p.life>0);

  // ---- collisions ----
  if(state==='play'){
    // orbs
    for(const o of orbsArr){
      if(o.got)continue;
      const dx=o.x-P.x, dy=o.y-P.y;
      if(dx*dx+dy*dy < (o.r+P.size*0.7)**2){
        o.got=true; orbs++; totalOrbs++; LS.set('orbs',totalOrbs);
        dist += 5; // small bonus
        SFX.orb();
        for(let i=0;i<16;i++){
          particles.push({x:o.x,y:o.y,vx:rand(-3.5,3.5),vy:rand(-3.5,3.5),life:1,c:'#ffe14d',s:rand(2,5)});
        }
      }
    }
    // obstacles
    for(const o of obstacles){
      const by = o.fromTop ? ceilY : floorY - o.h;
      const bh = o.h;
      if(aabb(P.x,P.y,P.size/2, o.x, by, o.w, bh)){
        die();break;
      }
    }
  }

  // shake & flash decay
  shake*=0.86; if(shake<0.1)shake=0;
  flashAlpha*=0.84; if(flashAlpha<0.01)flashAlpha=0;

  // dying -> result after slowmo settles
  if(state==='dying'){
    slowmo*=0.92;
    P.y += P.vy*dt*slowmo; P.vy+=P.grav*GRAV*dt*0.3;
    if(slowmo<0.06){ toResult(); }
  }

  // HUD
  if(state==='play'){
    hudDist.textContent=Math.floor(dist);
    hudOrb.textContent=orbs;
    hudBest.textContent=Math.max(best,Math.floor(dist));
  }
}

function die(){
  if(state!=='play')return;
  state='dying';
  slowmo=1; shake=22; flashAlpha=0.85;
  stopBeat();
  SFX.die();
  // explosion
  for(let i=0;i<46;i++){
    particles.push({x:P.x,y:P.y,vx:rand(-7,7),vy:rand(-7,7),life:1.2,
      c: i%2? STAGE.cyan:STAGE.pink, s:rand(2,6)});
  }
}

/* ---------- draw ---------- */
const STAGE={cyan:'#00f0ff',pink:'#ff2d95'};
function draw(){
  ctx.save();
  // shake
  if(shake>0){ ctx.translate(rand(-shake,shake)*0.5, rand(-shake,shake)*0.5); }

  // background gradient (stage tinted)
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`hsl(${(hue+10)%360},60%,7%)`);
  g.addColorStop(1,'#05071a');
  ctx.fillStyle=g; ctx.fillRect(-30,-30,W+60,H+60);

  // ---- moving grid (depth) ----
  drawGrid();

  // ---- ceil/floor neon bands ----
  ctx.fillStyle=`hsla(${hue%360},80%,10%,.9)`;
  ctx.fillRect(0,0,W,ceilY);
  ctx.fillRect(0,floorY,W,H-floorY);
  // glowing edges
  neonLine(0,ceilY,W,ceilY,STAGE.cyan,3);
  neonLine(0,floorY,W,floorY,STAGE.cyan,3);

  // ---- speed lines ----
  for(const s of speedLines){
    ctx.globalAlpha=s.life*0.5;
    ctx.strokeStyle='#aef6ff'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+s.len,s.y);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // ---- orbs ----
  for(const o of orbsArr){
    const pr=o.r+Math.sin(o.pulse)*2;
    ctx.save();
    ctx.shadowColor='#ffe14d'; ctx.shadowBlur=20;
    ctx.fillStyle='#ffe14d';
    ctx.beginPath();
    // diamond
    ctx.moveTo(o.x,o.y-pr);ctx.lineTo(o.x+pr,o.y);ctx.lineTo(o.x,o.y+pr);ctx.lineTo(o.x-pr,o.y);ctx.closePath();
    ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(o.x,o.y,pr*0.3,0,7);ctx.fill();
    ctx.restore();
  }

  // ---- obstacles ----
  for(const o of obstacles){
    const by = o.fromTop ? ceilY : floorY - o.h;
    drawBlock(o.x,by,o.w,o.h,o.fromTop);
  }

  // ---- player trail ----
  for(let i=P.trail.length-1;i>=0;i--){
    const t=P.trail[i];
    const a=(1-i/P.trail.length)*0.5;
    ctx.globalAlpha=a;
    ctx.fillStyle=STAGE.cyan;
    const s=P.size*(1-i/P.trail.length*0.5);
    ctx.fillRect(t.x-s/2,t.y-s/2,s,s);
  }
  ctx.globalAlpha=1;

  // ---- player ----
  if(state!=='result'){
    drawPlayer();
  }

  // ---- particles ----
  for(const p of particles){
    ctx.globalAlpha=clamp(p.life,0,1);
    ctx.fillStyle=p.c;
    ctx.shadowColor=p.c;ctx.shadowBlur=8;
    ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  ctx.restore();

  // ---- flip flash (full screen shimmer) ----
  if(flashAlpha>0){
    ctx.fillStyle=`rgba(255,255,255,${flashAlpha*0.25})`;
    ctx.fillRect(0,0,W,H);
  }

  // edge vignette for speed feel
  if(state==='play'||state==='dying'){
    const d=difficulty();
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(0,0,0,${0.25+d*0.3})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }
}

function drawGrid(){
  ctx.strokeStyle=`hsla(${hue%360},90%,55%,.10)`;
  ctx.lineWidth=1;
  // vertical lines scrolling
  for(let x=-(gridOffset); x<W; x+=80){
    ctx.beginPath();ctx.moveTo(x,ceilY);ctx.lineTo(x,floorY);ctx.stroke();
  }
  // a few horizontal perspective lines
  ctx.strokeStyle=`hsla(${hue%360},90%,55%,.06)`;
  for(let i=1;i<4;i++){
    const y=ceilY+lane*(i/4);
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

function neonLine(x1,y1,x2,y2,col,w){
  ctx.save();
  ctx.strokeStyle=col;ctx.lineWidth=w;
  ctx.shadowColor=col;ctx.shadowBlur=14;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.restore();
}

function drawBlock(x,y,w,h,fromTop){
  ctx.save();
  ctx.fillStyle=`hsla(${(hue+150)%360},90%,12%,.95)`;
  ctx.fillRect(x,y,w,h);
  // neon outline
  ctx.strokeStyle=STAGE.pink;ctx.lineWidth=2.5;
  ctx.shadowColor=STAGE.pink;ctx.shadowBlur=14;
  ctx.strokeRect(x,y,w,h);
  // hazard stripes on the dangerous edge
  const edgeY = fromTop ? y+h : y;
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x,edgeY);ctx.lineTo(x+w,edgeY);ctx.stroke();
  ctx.restore();
}

function drawPlayer(){
  const s=P.size;
  ctx.save();
  ctx.translate(P.x,P.y);
  // rotate slightly with velocity for liveliness
  const rot=clamp(P.vy*0.0006,-0.4,0.4);
  ctx.rotate(rot);
  ctx.shadowColor=STAGE.cyan;ctx.shadowBlur=22;
  // body: rounded square
  ctx.fillStyle='#eaffff';
  roundRect(-s/2,-s/2,s,s,6);ctx.fill();
  // inner core
  ctx.shadowBlur=0;
  ctx.fillStyle=STAGE.cyan;
  roundRect(-s/2+5,-s/2+5,s-10,s-10,4);ctx.fill();
  // gravity arrow indicator
  ctx.fillStyle='#04121a';
  const ay=P.grav>0?1:-1;
  ctx.beginPath();
  ctx.moveTo(0, ay*s*0.22);
  ctx.lineTo(-s*0.16, -ay*s*0.04);
  ctx.lineTo( s*0.16, -ay*s*0.04);
  ctx.closePath();ctx.fill();
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ---------- main loop ---------- */
function loop(now){
  let dt=(now-lastT)/1000;
  lastT=now;
  if(dt>0.05)dt=0.05; // clamp big gaps (tab switch)
  if(state==='play'||state==='dying'){
    update(dt);
  }
  draw();
  requestAnimationFrame(loop);
}

/* ---------- state transitions ---------- */
function pauseGame(){
  if(state!=='play')return;
  state='pause'; stopBeat();
  show(pauseScreen);
}
function resumeGame(){
  if(state!=='pause')return;
  hide(pauseScreen);
  state='play'; lastT=performance.now();
  startBeat();
}
function toResult(){
  state='result';
  const score=Math.floor(dist);
  const isRec = score>best;
  if(isRec){ best=score; LS.set('best',best); SFX.record(); }
  resDist.textContent=score;
  resBest.textContent=best;
  resOrb.textContent=orbs;
  newRec.style.display = isRec?'block':'none';
  hide(hud); pauseBtn.classList.remove('show');
  show(resultScreen);
  if(isRec){ recordConfetti(); }
}

/* ---------- result confetti via particles in title coords (simple) ---------- */
function recordConfetti(){
  for(let i=0;i<80;i++){
    particles.push({x:W/2+rand(-60,60),y:H*0.35,vx:rand(-6,6),vy:rand(-11,-4),
      life:2, c:['#ffe14d',STAGE.cyan,STAGE.pink,'#fff'][i%4], s:rand(3,6)});
  }
  // keep particles updating even in result: add a gravity decay tick
  let ticks=0;
  const ci=setInterval(()=>{
    for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life-=0.04;}
    particles=particles.filter(p=>p.life>0);
    ticks++;
    if(ticks>70||state!=='result'){clearInterval(ci);}
  },16);
}

/* ---------- UI helpers ---------- */
const titleScreen=document.getElementById('titleScreen');
const pauseScreen=document.getElementById('pauseScreen');
const resultScreen=document.getElementById('resultScreen');
const hud=document.getElementById('hud');
const pauseBtn=document.getElementById('pauseBtn');
const sndBtn=document.getElementById('sndBtn');
function $(id){return document.getElementById(id);}
const hudDist=$('hudDist'),hudBest=$('hudBest'),hudOrb=$('hudOrb');
const resDist=$('resDist'),resBest=$('resBest'),resOrb=$('resOrb'),newRec=$('newRec');
function show(el){el.classList.add('show');}
function hide(el){el.classList.remove('show');}

function refreshTitle(){
  $('titleBest').innerHTML='BEST&nbsp;&nbsp;'+best+' m';
  $('playCount').textContent = plays>0? ('TOTAL '+plays+' RUNS ・ ◆ '+totalOrbs) : '';
}

/* buttons */
$('retryBtn').addEventListener('click',e=>{e.stopPropagation();startGame();});
$('homeBtn').addEventListener('click',e=>{e.stopPropagation();goTitle();});
$('shareBtn').addEventListener('click',e=>{e.stopPropagation();shareScore();});
$('resumeBtn').addEventListener('click',e=>{e.stopPropagation();resumeGame();});
$('quitBtn').addEventListener('click',e=>{e.stopPropagation();state='play';goTitle();});
pauseBtn.addEventListener('click',e=>{e.stopPropagation();pauseGame();});
sndBtn.addEventListener('click',e=>{
  e.stopPropagation();
  soundOn=!soundOn;LS.set('sound',soundOn);
  sndBtn.textContent=soundOn?'🔊':'🔇';
  if(soundOn&&state==='play')startBeat(); else stopBeat();
});

function goTitle(){
  state='title';stopBeat();
  hide(resultScreen);hide(pauseScreen);hide(hud);
  pauseBtn.classList.remove('show');
  refreshTitle();
  show(titleScreen);
}

function shareScore(){
  const score=Math.floor(dist) || best;
  const text=`ハンテンで ${score}m 走った！🌀 重力をひっくり返せ #ハンテン`;
  const url=location.href;
  const tw=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(tw,'_blank');
}

/* ---------- init ---------- */
sndBtn.textContent=soundOn?'🔊':'🔇';
refreshTitle();
computeGeom();
P.y=floorY-P.size/2; P.x=W*PLAYER_X_RATIO;
lastT=performance.now();
requestAnimationFrame(loop);

// pause when tab hidden
document.addEventListener('visibilitychange',()=>{
  if(document.hidden && state==='play')pauseGame();
});
</script>
