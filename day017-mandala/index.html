<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>マンダラ — 描くほど、美しい</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400&family=Outfit:wght@200;300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a14;
    --ink:#e8e6f0;
    --dim:#9a96b8;
    --line:rgba(255,255,255,.10);
    --panel:rgba(16,16,28,.72);
    --accent:#b8a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);}
  body{
    font-family:'Outfit','Shippori Mincho',sans-serif;
    color:var(--ink);
    position:fixed;inset:0;
    touch-action:none;
    user-select:none;-webkit-user-select:none;
  }
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #fx{pointer-events:none;}

  /* ---- top bar ---- */
  .topbar{
    position:absolute;top:0;left:0;right:0;
    padding:max(14px,env(safe-area-inset-top)) 18px 14px;
    display:flex;align-items:center;justify-content:space-between;
    pointer-events:none;z-index:10;
    background:linear-gradient(180deg,rgba(10,10,20,.55),transparent);
  }
  .brand{pointer-events:none;}
  .brand h1{
    font-family:'Cormorant',serif;font-weight:500;font-size:21px;letter-spacing:.04em;
    line-height:1;color:var(--ink);font-style:italic;
  }
  .brand span{
    display:block;font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.42em;
    color:var(--dim);margin-top:5px;padding-left:2px;
  }
  .topbtns{display:flex;gap:9px;pointer-events:auto;}
  .ic{
    width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    color:var(--ink);display:grid;place-items:center;cursor:pointer;
    transition:.25s;font-size:17px;
  }
  .ic:hover{border-color:rgba(184,166,255,.5);color:#fff;}
  .ic:active{transform:scale(.92);}
  .ic.off{opacity:.4;}
  .ic svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

  /* ---- bottom dock ---- */
  .dock{
    position:absolute;left:0;right:0;bottom:0;z-index:10;
    padding:0 12px max(12px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .panel{
    width:100%;max-width:540px;
    background:var(--panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid var(--line);border-radius:22px;
    padding:14px 15px;
    display:flex;flex-direction:column;gap:13px;
    transition:transform .4s cubic-bezier(.2,.8,.2,1),opacity .35s;
    transform-origin:bottom center;
  }
  .panel.hidden{transform:translateY(120%) scale(.96);opacity:0;pointer-events:none;}
  .row{display:flex;align-items:center;gap:10px;}
  .lab{font-size:9.5px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;min-width:42px;}

  .chips{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
  .chip{
    font-family:'Outfit';font-size:13px;font-weight:300;color:var(--dim);
    padding:6px 12px;border-radius:30px;border:1px solid var(--line);
    background:transparent;cursor:pointer;transition:.2s;letter-spacing:.02em;
  }
  .chip:active{transform:scale(.93);}
  .chip.on{color:#0a0a14;background:var(--accent);border-color:var(--accent);font-weight:400;}

  .sw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s;position:relative;}
  .sw:active{transform:scale(.88);}
  .sw.on{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.18);}
  .sw.rainbow{background:conic-gradient(from 0deg,#ff5d8f,#ffd166,#9bff8f,#54e8ff,#b58cff,#ff5d8f);}

  input[type=range]{
    -webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:3px;
    background:rgba(255,255,255,.16);outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
    background:var(--accent);cursor:pointer;box-shadow:0 0 10px rgba(184,166,255,.7);
  }
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:var(--accent);cursor:pointer;}

  .actions{display:flex;gap:8px;width:100%;max-width:540px;justify-content:center;}
  .ab{
    flex:1;height:46px;border-radius:16px;border:1px solid var(--line);
    background:var(--panel);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    color:var(--ink);cursor:pointer;display:grid;place-items:center;gap:3px;
    transition:.2s;font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  }
  .ab:active{transform:scale(.95);}
  .ab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
  .ab.primary{background:linear-gradient(135deg,#b8a6ff,#8f7bff);color:#0a0a14;border-color:transparent;}
  .ab.wide{flex:0 0 56px;}

  .pulltab{
    pointer-events:auto;width:46px;height:6px;border-radius:6px;background:rgba(255,255,255,.22);
    cursor:pointer;margin-bottom:2px;transition:.2s;
  }
  .pulltab:active{transform:scaleX(1.3);}

  /* ---- gallery ---- */
  .gal{
    position:absolute;inset:0;z-index:30;background:rgba(8,8,16,.92);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    display:none;flex-direction:column;padding:max(20px,env(safe-area-inset-top)) 18px 20px;
  }
  .gal.show{display:flex;}
  .gal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .gal-head h2{font-family:'Cormorant',serif;font-style:italic;font-weight:500;font-size:25px;letter-spacing:.03em;}
  .gal-head .sub{font-family:'Shippori Mincho',serif;font-size:10px;letter-spacing:.4em;color:var(--dim);display:block;margin-top:3px;}
  .gal-grid{
    flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:11px;align-content:start;
    -webkit-overflow-scrolling:touch;
  }
  @media(max-width:380px){.gal-grid{grid-template-columns:repeat(2,1fr);}}
  .card{aspect-ratio:1;border-radius:16px;overflow:hidden;border:1px solid var(--line);position:relative;background:#000;cursor:pointer;transition:.2s;}
  .card:active{transform:scale(.95);}
  .card img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .del{
    position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;
    background:rgba(0,0,0,.55);color:#fff;border:none;display:grid;place-items:center;font-size:13px;cursor:pointer;opacity:0;transition:.2s;
  }
  .card:hover .del{opacity:1;}
  .gal-empty{flex:1;display:grid;place-items:center;color:var(--dim);font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.1em;text-align:center;line-height:2;}

  /* hint */
  .hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:.32em;color:rgba(232,230,240,.5);
    pointer-events:none;z-index:5;transition:opacity 1s;text-align:center;line-height:2.2;
  }
  .hint.gone{opacity:0;}

  .toast{
    position:absolute;top:64px;left:50%;transform:translateX(-50%) translateY(-12px);
    background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(12px);
    color:var(--ink);padding:9px 18px;border-radius:30px;font-size:12px;letter-spacing:.08em;
    opacity:0;transition:.35s;pointer-events:none;z-index:40;font-family:'Shippori Mincho',serif;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<canvas id="art"></canvas>
<canvas id="fx"></canvas>

<div class="hint" id="hint">中心から、指で描いてみてください<br><span style="font-size:10px;letter-spacing:.2em;opacity:.7">どんな線も、美しい模様になります</span></div>

<div class="topbar">
  <div class="brand">
    <h1>Mandala</h1>
    <span>マンダラ</span>
  </div>
  <div class="topbtns">
    <button class="ic" id="bSound" title="描く音"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7M19 5a9 9 0 010 14"/></svg></button>
    <button class="ic off" id="bAmbient" title="環境音"><svg viewBox="0 0 24 24"><path d="M3 12c2-5 4-5 6 0s4 5 6 0 4-5 6 0"/></svg></button>
    <button class="ic" id="bGallery" title="ギャラリー"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
  </div>
</div>

<div class="dock">
  <div class="pulltab" id="pulltab"></div>
  <div class="panel" id="panel">
    <div class="row">
      <span class="lab">対称</span>
      <div class="chips" id="symChips"></div>
      <button class="chip" id="mirrorChip" title="左右反転">ミラー</button>
    </div>
    <div class="row">
      <span class="lab">配色</span>
      <div class="chips" id="palChips"></div>
    </div>
    <div class="row">
      <span class="lab">太さ</span>
      <input type="range" id="size" min="1" max="22" step="0.5" value="4">
      <span class="lab">背景</span>
      <div class="chips" id="bgChips"></div>
    </div>
  </div>
  <div class="actions">
    <button class="ab" id="bUndo"><svg viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 015 5v0a5 5 0 01-5 5H9"/></svg>戻す</button>
    <button class="ab" id="bClear"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>消す</button>
    <button class="ab" id="bReplay"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M10 9l5 3-5 3z"/></svg>再生</button>
    <button class="ab wide" id="bRandom" title="ランダム配色"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="1.5"/><circle cx="16" cy="8" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="8" cy="16" r="1.5"/><circle cx="16" cy="16" r="1.5"/></svg></button>
    <button class="ab primary" id="bSave"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>保存</button>
  </div>
</div>

<div class="gal" id="gallery">
  <div class="gal-head">
    <div><h2>Gallery<span class="sub">あなたの曼荼羅</span></h2></div>
    <button class="ic" id="bCloseGal"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="gal-grid" id="galGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(()=>{
'use strict';
const art=document.getElementById('art'), fx=document.getElementById('fx');
const actx=art.getContext('2d'), fctx=fx.getContext('2d');
let W,H,cx,cy,dpr;

// ---------- state ----------
let sym=8, mirror=true, brush=4, colorMode='rainbow', solidColor='#b8a6ff';
let bg={key:'cosmos'};
const BGS={
  cosmos:{label:'宇宙', dark:true, paint(c){const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.75);g.addColorStop(0,'#141026');g.addColorStop(.6,'#0c0a18');g.addColorStop(1,'#06060e');c.fillStyle=g;c.fillRect(0,0,W,H);}},
  black:{label:'黒', dark:true, paint(c){c.fillStyle='#0a0a14';c.fillRect(0,0,W,H);}},
  navy:{label:'紺', dark:true, paint(c){const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.75);g.addColorStop(0,'#0e1c3e');g.addColorStop(1,'#070b1c');c.fillStyle=g;c.fillRect(0,0,W,H);}},
  white:{label:'白', dark:false, paint(c){const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.75);g.addColorStop(0,'#fbfbf7');g.addColorStop(1,'#eceae2');c.fillStyle=g;c.fillRect(0,0,W,H);}},
};

const PALETTES={
  rainbow:null,
  pastel:['#ffd1e0','#cdeffd','#d6f7d1','#fff3c4','#e6d4ff','#ffd9c0'],
  neon:['#ff2d95','#00f5d4','#fee440','#9b5de5','#00bbf9','#ff5400'],
  wa:['#e8546b','#f2a93b','#e6c84f','#7bb274','#3f8e7d','#5a6fb0','#9d5fa6'],
  cosmos:['#7b2ff7','#4776e6','#00c6ff','#8e54e9','#c471ed','#3a47d5'],
  ember:['#ff5e3a','#ff2a68','#ffb13a','#ff9500','#ff3b30','#ffd23a'],
  ice:['#a8edea','#c2e9fb','#d4fcff','#8ec5fc','#e0c3fc','#b8f2e6'],
};
const palLabels={rainbow:'虹', pastel:'パステル', neon:'ネオン', wa:'和', cosmos:'宇宙', ember:'灯', ice:'氷'};

// ---------- strokes model ----------
// each stroke: array of points {dx,dy,color,width}
let strokes=[];
let cur=null;
let phase=0;
let drawing=false, lastX=0,lastY=0;
let composite='lighter';

function setComposite(){ composite = BGS[bg.key].dark ? 'lighter' : 'source-over'; }

// ---------- color ----------
function hexToRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function lerp(a,b,t){return a+(b-a)*t;}
function paletteColor(pal,ph){
  const t=(ph/110)%pal.length;const i=Math.floor(t);const f=t-i;
  const a=hexToRgb(pal[i]), b=hexToRgb(pal[(i+1)%pal.length]);
  return `rgb(${lerp(a[0],b[0],f)|0},${lerp(a[1],b[1],f)|0},${lerp(a[2],b[2],f)|0})`;
}
function currentColor(){
  if(colorMode==='rainbow') return `hsl(${(phase*0.9)%360},82%,${BGS[bg.key].dark?62:52}%)`;
  if(colorMode==='solid') return solidColor;
  return paletteColor(PALETTES[colorMode],phase);
}

// ---------- sizing ----------
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2.5);
  W=window.innerWidth;H=window.innerHeight;cx=W/2;cy=H/2;
  for(const cv of [art,fx]){cv.width=W*dpr;cv.height=H*dpr;}
  for(const c of [actx,fctx]){c.setTransform(dpr,0,0,dpr,0,0);}
  setComposite();
  redrawAll();
}
window.addEventListener('resize',resize);

// ---------- drawing ----------
function strokeSeg(c,p0,p1){
  c.save();
  c.globalCompositeOperation=composite;
  c.translate(cx,cy);
  c.lineCap='round';c.lineJoin='round';
  c.strokeStyle=p1.color;c.lineWidth=p1.width;
  c.shadowColor=p1.color;c.shadowBlur=p1.width*2.1;
  const step=Math.PI*2/sym;
  for(let i=0;i<sym;i++){
    const a=i*step;
    c.save();c.rotate(a);
    c.beginPath();c.moveTo(p0.dx,p0.dy);c.lineTo(p1.dx,p1.dy);c.stroke();
    c.restore();
    if(mirror){
      c.save();c.rotate(a);c.scale(1,-1);
      c.beginPath();c.moveTo(p0.dx,p0.dy);c.lineTo(p1.dx,p1.dy);c.stroke();
      c.restore();
    }
  }
  c.restore();
}

function redrawAll(){
  actx.globalCompositeOperation='source-over';
  BGS[bg.key].paint(actx);
  for(const s of strokes){
    for(let i=1;i<s.length;i++) strokeSeg(actx,s[i-1],s[i]);
  }
}

function paintBg(){ actx.globalCompositeOperation='source-over'; BGS[bg.key].paint(actx); }

// ---------- pointer ----------
function pos(e){
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX,y:t.clientY};
}
function addPoint(x,y,seedColor){
  const dx=x-cx, dy=y-cy;
  const last=cur[cur.length-1];
  const d=Math.hypot(x-last._x, y-last._y);
  phase+=d;
  const color=currentColor();
  const p={dx,dy,color,width:brush,_x:x,_y:y};
  cur.push(p);
  strokeSeg(actx,last,p);
  // sound + particles
  audioDraw(dx,dy,d);
  if(Math.random()<Math.min(.04+d*0.004,.4)) spawnParticles(dx,dy,color);
  return d;
}
function down(e){
  if(e.target.closest('.dock,.topbar,.gal'))return;
  e.preventDefault();
  hideHint();
  const {x,y}=pos(e);
  drawing=true;
  const dx=x-cx,dy=y-cy;
  const color=currentColor();
  cur=[{dx,dy,color,width:brush,_x:x,_y:y}];
  lastX=x;lastY=y;
  audioStart();
}
function move(e){
  if(!drawing)return;
  e.preventDefault();
  const {x,y}=pos(e);
  // interpolate for smooth fast strokes
  const d=Math.hypot(x-lastX,y-lastY);
  const steps=Math.max(1,Math.floor(d/6));
  for(let i=1;i<=steps;i++){
    addPoint(lastX+(x-lastX)*i/steps, lastY+(y-lastY)*i/steps);
  }
  lastX=x;lastY=y;
}
function up(){
  if(!drawing)return;
  drawing=false;
  if(cur&&cur.length>1) strokes.push(cur);
  cur=null;
  audioStop();
}
art.addEventListener('mousedown',down);
window.addEventListener('mousemove',move);
window.addEventListener('mouseup',up);
art.addEventListener('touchstart',down,{passive:false});
window.addEventListener('touchmove',move,{passive:false});
window.addEventListener('touchend',up);
window.addEventListener('touchcancel',up);

// ---------- particles + guide + sparkle (fx loop) ----------
let particles=[];
let guideAlpha=0.5, guideTarget=0.5;
let sparkle=0;
function spawnParticles(dx,dy,color){
  const n=1+(Math.random()*2|0);
  const step=Math.PI*2/sym;
  const reps=Math.min(sym,8);
  for(let r=0;r<reps;r++){
    const a=r*step;
    const ca=Math.cos(a),sa=Math.sin(a);
    const rx=dx*ca-dy*sa, ry=dx*sa+dy*ca;
    for(let k=0;k<n;k++){
      const sp=0.2+Math.random()*0.6;const ang=Math.random()*Math.PI*2;
      particles.push({x:cx+rx,y:cy+ry,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,sz:0.8+Math.random()*1.8,color});
    }
  }
  if(particles.length>600) particles.splice(0,particles.length-600);
}
function triggerSparkle(){
  sparkle=1;
  const step=Math.PI*2/sym;
  for(let ring=0;ring<5;ring++){
    const rad=40+ring*46;
    for(let i=0;i<sym*2;i++){
      const a=i*Math.PI/sym + ring*0.2;
      const x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad;
      particles.push({x,y,vx:Math.cos(a)*1.4,vy:Math.sin(a)*1.4,life:1.3,sz:1.5+Math.random()*2,color:'hsl('+((a*60)|0)%360+',90%,72%)'});
    }
  }
}
function fxLoop(){
  fctx.clearRect(0,0,W,H);
  // guide
  guideAlpha+=(guideTarget-guideAlpha)*0.08;
  if(guideAlpha>0.01){
    fctx.save();
    fctx.translate(cx,cy);
    fctx.strokeStyle=`rgba(184,166,255,${guideAlpha*0.5})`;
    fctx.lineWidth=1;
    const R=Math.min(W,H)*0.46;
    const step=Math.PI*2/sym;
    for(let i=0;i<sym;i++){
      fctx.save();fctx.rotate(i*step);
      fctx.beginPath();fctx.moveTo(0,0);fctx.lineTo(R,0);fctx.stroke();
      fctx.restore();
    }
    fctx.beginPath();fctx.arc(0,0,4,0,Math.PI*2);
    fctx.fillStyle=`rgba(184,166,255,${guideAlpha})`;fctx.fill();
    fctx.restore();
  }
  // particles
  fctx.globalCompositeOperation='lighter';
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=0.018;p.vy+=0.002;
    if(p.life<=0){particles.splice(i,1);continue;}
    fctx.globalAlpha=Math.max(0,p.life)*0.9;
    fctx.fillStyle=p.color;
    fctx.shadowColor=p.color;fctx.shadowBlur=6;
    fctx.beginPath();fctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);fctx.fill();
  }
  fctx.globalAlpha=1;fctx.shadowBlur=0;fctx.globalCompositeOperation='source-over';
  // sparkle flash
  if(sparkle>0){
    const g=fctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6);
    g.addColorStop(0,`rgba(255,255,255,${sparkle*0.35})`);
    g.addColorStop(0.5,`rgba(200,180,255,${sparkle*0.12})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    fctx.fillStyle=g;fctx.fillRect(0,0,W,H);
    sparkle-=0.025;
  }
  requestAnimationFrame(fxLoop);
}
function hideHint(){document.getElementById('hint').classList.add('gone');guideTarget=0.12;}

// ---------- audio ----------
let AC=null, master=null, soundOn=true, ambientOn=false, ambientNodes=null, lastNote=0;
const PENTA=[0,2,4,7,9,12,14,16,19,21]; // semitone offsets
function initAudio(){
  if(AC)return;
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain();master.gain.value=0.5;master.connect(AC.destination);
}
function audioStart(){ if(!soundOn)return; initAudio(); if(AC.state==='suspended')AC.resume(); }
function audioStop(){}
function audioDraw(dx,dy,d){
  if(!soundOn||!AC)return;
  const now=AC.currentTime;
  if(now-lastNote<0.085)return;
  lastNote=now;
  const r=Math.hypot(dx,dy);
  const maxR=Math.min(W,H)*0.5;
  const idx=PENTA[Math.min(PENTA.length-1, Math.floor((1-Math.min(r/maxR,1))*PENTA.length))];
  const freq=261.63*Math.pow(2,idx/12);
  const o=AC.createOscillator(), g=AC.createGain(), f=AC.createBiquadFilter();
  o.type='triangle';o.frequency.value=freq;
  f.type='lowpass';f.frequency.value=1800;
  const vol=Math.min(0.16,0.04+d*0.004);
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(vol,now+0.015);
  g.gain.exponentialRampToValueAtTime(0.0005,now+1.1);
  o.connect(f);f.connect(g);g.connect(master);
  o.start(now);o.stop(now+1.2);
  // soft octave shimmer
  const o2=AC.createOscillator(),g2=AC.createGain();
  o2.type='sine';o2.frequency.value=freq*2;
  g2.gain.setValueAtTime(0,now);g2.gain.linearRampToValueAtTime(vol*0.3,now+0.02);
  g2.gain.exponentialRampToValueAtTime(0.0005,now+0.8);
  o2.connect(g2);g2.connect(master);o2.start(now);o2.stop(now+0.9);
}
function toggleAmbient(){
  initAudio();if(AC.state==='suspended')AC.resume();
  ambientOn=!ambientOn;
  document.getElementById('bAmbient').classList.toggle('off',!ambientOn);
  if(ambientOn) startAmbient(); else stopAmbient();
}
function startAmbient(){
  if(ambientNodes)return;
  const g=AC.createGain();g.gain.value=0;g.gain.linearRampToValueAtTime(0.13,AC.currentTime+3);
  g.connect(master);
  const notes=[130.81,196,261.63,329.63]; // C3 G3 C4 E4 drone
  const oscs=[];
  notes.forEach((fr,i)=>{
    const o=AC.createOscillator(),og=AC.createGain(),lfo=AC.createOscillator(),lg=AC.createGain();
    o.type='sine';o.frequency.value=fr*(1+ (i%2?0.003:-0.003));
    og.gain.value=0.25;
    lfo.frequency.value=0.05+i*0.02;lg.gain.value=0.12;
    lfo.connect(lg);lg.connect(og.gain);
    o.connect(og);og.connect(g);
    o.start();lfo.start();oscs.push(o,lfo);
  });
  ambientNodes={g,oscs};
}
function stopAmbient(){
  if(!ambientNodes)return;
  const {g,oscs}=ambientNodes;
  g.gain.linearRampToValueAtTime(0,AC.currentTime+1.5);
  setTimeout(()=>{oscs.forEach(o=>{try{o.stop();}catch(e){}});},1800);
  ambientNodes=null;
}

// ---------- UI build ----------
function mk(tag,cls,txt){const e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;}
// symmetry
const symVals=[4,6,8,12,16,24];
const symChips=document.getElementById('symChips');
symVals.forEach(v=>{
  const c=mk('button','chip'+(v===sym?' on':''),v);
  c.onclick=()=>{sym=v;[...symChips.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');flashGuide();};
  symChips.appendChild(c);
});
function flashGuide(){guideTarget=0.4;setTimeout(()=>guideTarget=drawing||strokes.length?0.12:0.5,500);}
const mirrorChip=document.getElementById('mirrorChip');
mirrorChip.classList.toggle('on',mirror);
mirrorChip.onclick=()=>{mirror=!mirror;mirrorChip.classList.toggle('on',mirror);};
// palettes
const palChips=document.getElementById('palChips');
Object.keys(PALETTES).forEach(k=>{
  const c=mk('button','chip'+(k===colorMode?' on':''),palLabels[k]);
  c.onclick=()=>{colorMode=k;[...palChips.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');};
  palChips.appendChild(c);
});
// bg
const bgChips=document.getElementById('bgChips');
Object.keys(BGS).forEach(k=>{
  const c=mk('button','chip'+(k===bg.key?' on':''),BGS[k].label);
  c.onclick=()=>{bg.key=k;[...bgChips.children].forEach(x=>x.classList.remove('on'));c.classList.add('on');setComposite();redrawAll();};
  bgChips.appendChild(c);
});
document.getElementById('size').oninput=e=>brush=parseFloat(e.target.value);

// actions
document.getElementById('bUndo').onclick=()=>{if(strokes.length){strokes.pop();redrawAll();if(!strokes.length)guideTarget=0.5;}};
document.getElementById('bClear').onclick=()=>{strokes=[];particles=[];phase=0;paintBg();guideTarget=0.5;document.getElementById('hint').classList.remove('gone');};
document.getElementById('bRandom').onclick=()=>{
  const keys=Object.keys(PALETTES);colorMode=keys[Math.random()*keys.length|0];
  [...palChips.children].forEach((x,i)=>x.classList.toggle('on',keys[i]===colorMode));
  toast('配色: '+palLabels[colorMode]);
};
document.getElementById('bReplay').onclick=replay;
document.getElementById('bSave').onclick=save;

// sound toggles
const bSound=document.getElementById('bSound');
bSound.onclick=()=>{soundOn=!soundOn;bSound.classList.toggle('off',!soundOn);if(soundOn)audioStart();};
document.getElementById('bAmbient').onclick=toggleAmbient;

// panel collapse
const panel=document.getElementById('panel');
document.getElementById('pulltab').onclick=()=>panel.classList.toggle('hidden');

// ---------- replay ----------
let replaying=false;
function replay(){
  if(replaying||!strokes.length)return;
  replaying=true;
  const flat=[];
  strokes.forEach(s=>{for(let i=1;i<s.length;i++)flat.push([s[i-1],s[i]]);});
  paintBg();
  let i=0;const perFrame=Math.max(1,Math.ceil(flat.length/220));
  (function step(){
    for(let k=0;k<perFrame&&i<flat.length;k++,i++){strokeSeg(actx,flat[i][0],flat[i][1]);}
    if(i<flat.length)requestAnimationFrame(step);
    else replaying=false;
  })();
}

// ---------- save + gallery ----------
const GKEY='mandala_gallery_v1';
function getGallery(){try{return JSON.parse(localStorage.getItem(GKEY)||'[]');}catch(e){return[];}}
function setGallery(a){try{localStorage.setItem(GKEY,JSON.stringify(a));}catch(e){/*quota*/}}

function save(){
  if(!strokes.length){toast('まだ何も描かれていません');return;}
  triggerSparkle();
  // export full-res png
  const url=art.toDataURL('image/png');
  const a=document.createElement('a');
  a.href=url;a.download='mandala_'+Date.now()+'.png';a.click();
  // thumbnail to gallery
  const tc=document.createElement('canvas');const TS=320;tc.width=TS;tc.height=TS;
  const t=tc.getContext('2d');
  const side=Math.min(W,H);
  t.drawImage(art,(W-side)/2*dpr,(H-side)/2*dpr,side*dpr,side*dpr,0,0,TS,TS);
  const thumb=tc.toDataURL('image/jpeg',0.72);
  const g=getGallery();
  g.unshift({thumb,t:Date.now()});
  if(g.length>12)g.length=12;
  setGallery(g);
  toast('保存しました ✦');
}

const gallery=document.getElementById('gallery'), galGrid=document.getElementById('galGrid');
function openGallery(){
  const g=getGallery();
  galGrid.innerHTML='';
  if(!g.length){
    const e=mk('div','gal-empty');e.innerHTML='まだ作品がありません<br><span style="opacity:.6;font-size:11px">描いて、保存してみましょう</span>';
    galGrid.appendChild(e);
  }else{
    g.forEach((item,idx)=>{
      const card=mk('div','card');
      const img=mk('img');img.src=item.thumb;card.appendChild(img);
      const del=mk('button','del','×');
      del.onclick=ev=>{ev.stopPropagation();const arr=getGallery();arr.splice(idx,1);setGallery(arr);openGallery();};
      card.appendChild(del);
      card.onclick=()=>{const a=document.createElement('a');a.href=item.thumb;a.download='mandala.jpg';a.click();};
      galGrid.appendChild(card);
    });
  }
  gallery.classList.add('show');
}
document.getElementById('bGallery').onclick=openGallery;
document.getElementById('bCloseGal').onclick=()=>gallery.classList.remove('show');

// ---------- toast ----------
let toastT;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1900);
}

// ---------- go ----------
resize();
fxLoop();
})();
