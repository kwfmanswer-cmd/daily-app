<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1f">
<title>あと何回、 — あなたの人生を、数えてみる</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#070a16; --bg1:#0f1430; --bg2:#241a3a;
  --ink:#f2ece0; --ink2:#cfc7ba; --muted:#8a8499;
  --gold:#e7c878; --gold2:#f3dca0; --rose:#f4a6c0; --moon:#cdd8f8; --green:#a7d8b0;
  --line:rgba(255,255,255,.09);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Zen Kaku Gothic New','Shippori Mincho',serif;
  background:var(--bg0); color:var(--ink);
  -webkit-font-smoothing:antialiased; line-height:1.85;
  overflow-x:hidden; min-height:100vh;
}
.mincho{font-family:'Shippori Mincho',serif;}
.num{font-family:'Outfit',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select{font-family:inherit;color:inherit;}

/* 背景 */
#stars{position:fixed;inset:0;z-index:0;}
.bg-gradient{position:fixed;inset:0;z-index:-1;background:
   radial-gradient(120% 80% at 50% -10%, #2a1f48 0%, transparent 55%),
   radial-gradient(140% 100% at 50% 120%, #3a2a3e 0%, transparent 50%),
   linear-gradient(180deg, var(--bg0), var(--bg1) 55%, #16122a);}

/* ステージ */
.stage{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;opacity:0;pointer-events:none;transition:opacity 1.1s ease;overflow-y:auto;}
.stage.active{opacity:1;pointer-events:auto;}

/* ---------- オープニング ---------- */
#opening .kicker{font-size:13px;letter-spacing:.5em;color:var(--gold);opacity:0;animation:rise 1.4s ease .3s forwards;font-family:'Outfit',sans-serif;font-weight:500;margin-bottom:26px;text-indent:.5em;}
#opening h1{font-size:clamp(40px,12vw,78px);font-weight:800;letter-spacing:.02em;line-height:1.2;opacity:0;animation:rise 1.6s ease .7s forwards;}
#opening h1 .comma{color:var(--gold);}
#opening .lead{margin-top:30px;font-size:clamp(15px,4vw,18px);color:var(--ink2);line-height:2.1;opacity:0;animation:rise 1.6s ease 1.4s forwards;max-width:560px;font-weight:400;}
#opening .start{margin-top:48px;opacity:0;animation:rise 1.6s ease 2.1s forwards;}
@keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
.btn-main{
  font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;color:#1a1208;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  padding:16px 52px;border-radius:50px;letter-spacing:.14em;
  box-shadow:0 10px 40px rgba(231,200,120,.35),inset 0 1px 0 rgba(255,255,255,.4);
  transition:.3s;position:relative;
}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 16px 50px rgba(231,200,120,.5);}
.btn-main:active{transform:translateY(0) scale(.98);}
.btn-ghost{font-size:14px;color:var(--ink2);letter-spacing:.08em;padding:12px 24px;border:1px solid var(--line);border-radius:40px;transition:.25s;font-family:'Shippori Mincho',serif;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

/* ---------- 入力 ---------- */
#input{justify-content:flex-start;padding-top:max(48px,8vh);}
.in-card{width:100%;max-width:480px;text-align:left;}
.in-card .ihead{text-align:center;margin-bottom:36px;}
.in-card .ihead h2{font-size:26px;font-weight:700;letter-spacing:.04em;}
.in-card .ihead p{font-size:13.5px;color:var(--muted);margin-top:10px;}
.field{margin-bottom:30px;opacity:0;transform:translateY(16px);animation:rise .8s ease forwards;}
.field .flabel{font-size:13px;color:var(--gold);letter-spacing:.1em;margin-bottom:13px;font-family:'Outfit',sans-serif;font-weight:600;display:flex;align-items:center;gap:8px;}
.field .flabel .opt{color:var(--muted);font-size:11px;letter-spacing:.05em;font-weight:400;}
.date-in{display:flex;gap:10px;}
.sel,input[type=date]{
  background:rgba(255,255,255,.04);border:1.5px solid var(--line);border-radius:14px;
  padding:14px 14px;font-size:16px;color:var(--ink);outline:none;transition:.25s;width:100%;
  font-family:'Outfit','Zen Kaku Gothic New',sans-serif;
}
.sel:focus,input[type=date]:focus{border-color:var(--gold);background:rgba(231,200,120,.06);}
.sel{appearance:none;-webkit-appearance:none;cursor:pointer;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%238a8499' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;padding-right:34px;}
.sel option{background:#1a1535;}
.range-wrap{display:flex;align-items:center;gap:16px;}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:5px;background:rgba(255,255,255,.12);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));cursor:pointer;box-shadow:0 3px 12px rgba(231,200,120,.5);}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border:none;border-radius:50%;background:var(--gold);cursor:pointer;}
.range-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--gold);min-width:74px;text-align:right;}
.range-val small{font-size:13px;color:var(--ink2);font-weight:400;margin-left:2px;}
.chips{display:flex;gap:9px;flex-wrap:wrap;}
.chip{padding:11px 18px;border-radius:40px;border:1.5px solid var(--line);font-size:14px;transition:.22s;background:rgba(255,255,255,.03);display:flex;align-items:center;gap:7px;}
.chip:hover{border-color:rgba(231,200,120,.5);}
.chip.sel{border-color:var(--gold);background:rgba(231,200,120,.14);color:var(--gold2);}
.chip .e{font-size:16px;}
.parent-toggle{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border:1.5px solid var(--line);border-radius:14px;background:rgba(255,255,255,.03);cursor:pointer;transition:.25s;}
.parent-toggle:hover{border-color:rgba(231,200,120,.4);}
.parent-toggle .pt-l{font-size:14.5px;}
.parent-toggle .pt-l small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px;}
.switch{width:46px;height:27px;border-radius:20px;background:rgba(255,255,255,.14);position:relative;transition:.25s;flex-shrink:0;}
.switch.on{background:var(--gold);}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.25s;}
.switch.on i{left:22px;}
.parent-detail{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .4s;opacity:0;margin-top:0;}
.parent-detail.show{max-height:340px;opacity:1;margin-top:18px;}
.in-actions{text-align:center;margin-top:14px;padding-bottom:40px;}
.err{color:var(--rose);font-size:12.5px;text-align:center;min-height:18px;margin-bottom:12px;}

/* ---------- 結果 ---------- */
#result{position:relative;z-index:5;display:none;}
#result.active{display:block;}
.rwrap{max-width:680px;margin:0 auto;padding:0 22px;}
.section{padding:64px 0;}
.reveal{opacity:0;transform:translateY(34px);transition:opacity 1s ease,transform 1s cubic-bezier(.2,.7,.3,1);}
.reveal.in{opacity:1;transform:none;}
.eyebrow{font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.4em;color:var(--gold);text-align:center;margin-bottom:22px;font-weight:600;}
.r-hero{min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.r-hero .htop{font-size:15px;color:var(--ink2);letter-spacing:.1em;}
.r-hero .hbig{font-size:clamp(54px,17vw,120px);font-weight:800;line-height:1;margin:14px 0;color:var(--gold2);}
.r-hero .hbig small{font-size:.3em;color:var(--ink2);font-weight:400;margin-left:4px;}
.r-hero .hsub{font-size:16px;color:var(--ink2);margin-top:8px;}
.r-hero .hsub b{color:var(--ink);font-weight:600;}
.scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:11px;letter-spacing:.2em;animation:bob 2.4s ease-in-out infinite;font-family:'Outfit',sans-serif;}
.scroll-hint svg{display:block;margin:8px auto 0;width:20px;height:20px;}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0);opacity:.5;}50%{transform:translateX(-50%) translateY(7px);opacity:1;}}

.lead-line{font-family:'Shippori Mincho',serif;font-size:clamp(20px,5.5vw,28px);font-weight:500;text-align:center;line-height:2;letter-spacing:.03em;}
.lead-line .hl{color:var(--gold2);}
.sub-line{text-align:center;color:var(--ink2);font-size:15px;margin-top:18px;line-height:2;}

/* 人生の週グリッド */
.weeks-card{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:22px;padding:28px 24px;}
.weeks-card .wtitle{text-align:center;font-family:'Shippori Mincho',serif;font-size:19px;font-weight:600;margin-bottom:6px;}
.weeks-card .wcap{text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:24px;}
.weeks-grid{display:grid;gap:2px;margin:0 auto;}
.wk{width:100%;aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,.06);opacity:0;transition:opacity .5s ease,transform .5s ease;}
.weeks-grid.go .wk{opacity:1;}
.wk.past{background:linear-gradient(135deg,var(--gold),var(--rose));}
.wk.now{background:#fff;box-shadow:0 0 8px 2px var(--gold2),0 0 16px 4px rgba(231,200,120,.6);transform:scale(1.5);position:relative;z-index:2;}
.wlegend{display:flex;gap:20px;justify-content:center;margin-top:22px;font-size:12px;color:var(--ink2);flex-wrap:wrap;}
.wlegend span{display:flex;align-items:center;gap:7px;}
.wlegend i{width:11px;height:11px;border-radius:50%;}

/* これまでstats */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.mini-stat{text-align:center;background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:18px;padding:24px 12px;}
.mini-stat .mv{font-family:'Outfit',sans-serif;font-size:clamp(26px,7vw,40px);font-weight:800;color:var(--gold2);line-height:1;}
.mini-stat .ml{font-size:12px;color:var(--ink2);margin-top:10px;letter-spacing:.04em;}

/* あと何回カード */
.count-card{position:relative;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:24px;padding:38px 30px;text-align:center;margin-bottom:20px;overflow:hidden;}
.count-card::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 120% at 50% 0%,var(--glow,rgba(231,200,120,.13)),transparent 70%);pointer-events:none;}
.count-card .cc-emoji{font-size:46px;line-height:1;margin-bottom:14px;position:relative;}
.count-card .cc-label{font-size:15px;color:var(--ink2);letter-spacing:.06em;position:relative;}
.count-card .cc-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:clamp(58px,18vw,104px);line-height:1.05;margin:6px 0;position:relative;background:linear-gradient(135deg,var(--c1,var(--gold2)),var(--c2,var(--rose)));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.count-card .cc-approx{font-size:.34em;-webkit-text-fill-color:var(--ink2);color:var(--ink2);font-weight:500;margin-right:.15em;}
.count-card .cc-unit{font-size:.32em;-webkit-text-fill-color:var(--ink2);color:var(--ink2);font-weight:500;margin-left:.1em;}
.count-card .cc-note{font-size:13px;color:var(--muted);margin-top:12px;position:relative;line-height:1.9;}

/* 親カード 特別 */
.parent-card{border:1px solid rgba(244,166,192,.35);background:linear-gradient(180deg,rgba(244,166,192,.07),rgba(255,255,255,.02));}
.parent-card .cc-quote{font-family:'Shippori Mincho',serif;font-size:15px;color:var(--rose);margin-top:18px;line-height:2;position:relative;}

/* ランディング */
.landing{text-align:center;}
.landing .ltext{font-family:'Shippori Mincho',serif;font-size:clamp(18px,4.8vw,23px);font-weight:500;line-height:2.4;letter-spacing:.03em;}
.landing .ltext .hl{color:var(--gold2);}
.landing .ldivider{width:1px;height:54px;background:linear-gradient(var(--gold),transparent);margin:30px auto;}

/* シェア */
.share-sec{text-align:center;padding-bottom:120px;}
.share-card-prev{max-width:340px;margin:0 auto 28px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid var(--line);}
.share-card-prev canvas{width:100%;display:block;}
.share-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-share{font-family:'Outfit','Zen Kaku Gothic New',sans-serif;font-size:14.5px;font-weight:600;padding:14px 26px;border-radius:44px;letter-spacing:.04em;transition:.25s;display:inline-flex;align-items:center;gap:9px;}
.btn-share svg{width:18px;height:18px;}
.bs-x{background:#fff;color:#111;}
.bs-x:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,255,255,.2);}
.bs-dl{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1208;}
.bs-dl:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(231,200,120,.4);}
.bs-again{border:1px solid var(--line);color:var(--ink2);}
.bs-again:hover{border-color:var(--gold);color:var(--gold);}

.footer-brand{text-align:center;padding:40px 0 60px;color:var(--muted);font-size:11px;letter-spacing:.2em;font-family:'Outfit',sans-serif;}
.footer-brand b{color:var(--ink2);font-weight:500;}

/* 花びら */
.petal{position:fixed;top:-30px;z-index:4;pointer-events:none;font-size:18px;opacity:0;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(140%);background:rgba(20,16,38,.95);border:1px solid var(--line);color:var(--ink);padding:13px 24px;border-radius:40px;font-size:13.5px;z-index:300;transition:transform .4s cubic-bezier(.34,1.3,.5,1);backdrop-filter:blur(8px);}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .section{padding:50px 0;}
  .stat-row{gap:9px;}
  .mini-stat{padding:18px 6px;}
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<canvas id="stars"></canvas>

<!-- ===== オープニング ===== -->
<section class="stage active" id="opening">
  <div class="kicker">A QUIET QUESTION</div>
  <h1 class="mincho">あと何回<span class="comma">、</span></h1>
  <p class="lead mincho">あなたの人生を、少しだけ数えてみませんか。<br>その有限さは、きっと、いまを美しくします。</p>
  <div class="start"><button class="btn-main" id="startBtn">はじめる</button></div>
</section>

<!-- ===== 入力 ===== -->
<section class="stage" id="input">
  <div class="in-card">
    <div class="ihead">
      <h2 class="mincho">あなたのことを、少しだけ</h2>
      <p>入力した情報は、この端末の中だけに保存されます。</p>
    </div>

    <div class="field" style="animation-delay:.1s">
      <div class="flabel">🎂 うまれた日</div>
      <input type="date" id="birth" max="">
    </div>

    <div class="field" style="animation-delay:.2s">
      <div class="flabel">⏳ 想定する人生の長さ <span class="opt">変更できます</span></div>
      <div class="range-wrap">
        <input type="range" id="life" min="60" max="105" value="85">
        <div class="range-val"><span id="lifeVal">85</span><small>歳</small></div>
      </div>
    </div>

    <div class="field" style="animation-delay:.3s">
      <div class="flabel">🍃 好きな季節 <span class="opt">任意</span></div>
      <div class="chips" id="seasonChips">
        <button class="chip" data-s="spring"><span class="e">🌸</span>春</button>
        <button class="chip" data-s="summer"><span class="e">🌊</span>夏</button>
        <button class="chip" data-s="autumn"><span class="e">🍁</span>秋</button>
        <button class="chip" data-s="winter"><span class="e">❄️</span>冬</button>
      </div>
    </div>

    <div class="field" style="animation-delay:.4s">
      <div class="parent-toggle" id="parentToggle">
        <div class="pt-l">大切な人のことも、数える<small>親しい誰か（親など）と、あと何回会えるか</small></div>
        <div class="switch" id="parentSwitch"><i></i></div>
      </div>
      <div class="parent-detail" id="parentDetail">
        <div class="field" style="animation:none;opacity:1;transform:none;margin:18px 0 0">
          <div class="flabel">その人の、いまの年齢</div>
          <div class="range-wrap">
            <input type="range" id="pAge" min="20" max="100" value="60">
            <div class="range-val"><span id="pAgeVal">60</span><small>歳</small></div>
          </div>
        </div>
        <div class="field" style="animation:none;opacity:1;transform:none;margin:18px 0 0">
          <div class="flabel">1年に、会う回数</div>
          <div class="range-wrap">
            <input type="range" id="pMeet" min="1" max="365" value="6">
            <div class="range-val"><span id="pMeetVal">6</span><small>回</small></div>
          </div>
        </div>
      </div>
    </div>

    <div class="in-actions">
      <div class="err" id="err"></div>
      <button class="btn-main" id="countBtn">数えてみる</button>
      <div style="margin-top:18px"><button class="btn-ghost" id="backBtn">もどる</button></div>
    </div>
  </div>
</section>

<!-- ===== 結果 ===== -->
<main id="result"></main>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const KEY="howmany_v1";
const DAY=86400000, YEAR=365.2425;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const fmt=n=>Math.round(n).toLocaleString("en-US");

/* ---------- 星空背景 ---------- */
const cv=$("#stars"),cx=cv.getContext("2d");
let stars=[],motes=[],W,H,DPR;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+"px";cv.style.height=H+"px";cx.setTransform(DPR,0,0,DPR,0,0);
  stars=[];const n=Math.min(160,Math.floor(W*H/9000));
  for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,t:Math.random()*Math.PI*2,ts:Math.random()*.03+.008});
  motes=[];for(let i=0;i<14;i++)motes.push(newMote());
}
function newMote(){return {x:Math.random()*W,y:H+Math.random()*H,r:Math.random()*2+1,sp:Math.random()*.3+.1,a:Math.random()*.4+.15,drift:(Math.random()-.5)*.3};}
function draw(){
  cx.clearRect(0,0,W,H);
  for(const s of stars){s.t+=s.ts;const tw=(Math.sin(s.t)+1)/2;cx.globalAlpha=.25+tw*.65;cx.fillStyle="#fff";cx.beginPath();cx.arc(s.x,s.y,s.r,0,7);cx.fill();}
  for(const m of motes){m.y-=m.sp;m.x+=m.drift;cx.globalAlpha=m.a;cx.fillStyle="#f3dca0";cx.beginPath();cx.arc(m.x,m.y,m.r,0,7);cx.fill();if(m.y<-10)Object.assign(m,newMote());}
  cx.globalAlpha=1;requestAnimationFrame(draw);
}
addEventListener("resize",resize);resize();draw();

/* ---------- 入力 ---------- */
const state={season:null,parents:false};
$("#birth").max=new Date().toISOString().slice(0,10);
$("#life").oninput=e=>$("#lifeVal").textContent=e.target.value;
$("#pAge").oninput=e=>$("#pAgeVal").textContent=e.target.value;
$("#pMeet").oninput=e=>$("#pMeetVal").textContent=e.target.value;
$$("#seasonChips .chip").forEach(c=>c.onclick=()=>{
  const on=c.classList.contains("sel");$$("#seasonChips .chip").forEach(x=>x.classList.remove("sel"));
  if(!on){c.classList.add("sel");state.season=c.dataset.s;}else state.season=null;
});
$("#parentToggle").onclick=()=>{
  state.parents=!state.parents;
  $("#parentSwitch").classList.toggle("on",state.parents);
  $("#parentDetail").classList.toggle("show",state.parents);
};

function go(stage){$$(".stage").forEach(s=>s.classList.remove("active"));if(stage)$("#"+stage).classList.add("active");}
$("#startBtn").onclick=()=>{loadInput();go("input");};
$("#backBtn").onclick=()=>go("opening");

function loadInput(){
  try{const d=JSON.parse(localStorage.getItem(KEY));if(!d)return;
    if(d.birth)$("#birth").value=d.birth;
    if(d.life){$("#life").value=d.life;$("#lifeVal").textContent=d.life;}
    if(d.season){state.season=d.season;$$("#seasonChips .chip").forEach(c=>c.classList.toggle("sel",c.dataset.s===d.season));}
    if(d.parents){state.parents=true;$("#parentSwitch").classList.add("on");$("#parentDetail").classList.add("show");
      $("#pAge").value=d.pAge;$("#pAgeVal").textContent=d.pAge;$("#pMeet").value=d.pMeet;$("#pMeetVal").textContent=d.pMeet;}
  }catch(e){}
}

/* ---------- 計算 ---------- */
const SEASON={spring:{e:"🌸",n:"春",c1:"#f4a6c0",c2:"#f7c0d4"},summer:{e:"🌊",n:"夏",c1:"#7fc8e8",c2:"#a7d8b0"},autumn:{e:"🍁",n:"秋",c1:"#f0a868",c2:"#e7c878"},winter:{e:"❄️",n:"冬",c1:"#cdd8f8",c2:"#e8eeff"}};
let G=null;
function compute(){
  const bv=$("#birth").value;
  if(!bv){showErr("うまれた日を入れてください");return false;}
  const [by,bm,bd]=bv.split("-").map(Number);
  const birth=new Date(by,bm-1,bd), now=new Date();
  if(birth>now){showErr("未来の日付は数えられません");return false;}
  const lifeExp=+$("#life").value;
  const ageMs=now-birth, ageDays=Math.floor(ageMs/DAY), ageYears=ageMs/(DAY*YEAR);
  const weeksLived=Math.floor(ageDays/7);
  const totalWeeks=lifeExp*52;
  const yearsLeft=Math.max(0,lifeExp-ageYears);
  const pctLived=clamp(ageYears/lifeExp*100,0,100);
  G={
    birth:bv,life:lifeExp,season:state.season,parents:state.parents,
    pAge:+$("#pAge").value,pMeet:+$("#pMeet").value,
    ageDays,ageYears,ageYearsInt:Math.floor(ageYears),weeksLived,totalWeeks,yearsLeft,pctLived,
    springs:Math.round(yearsLeft),
    moons:Math.round(yearsLeft*12.368),
    birthdays:Math.round(yearsLeft),
    weekends:Math.round(yearsLeft*52),
    seasons:Math.round(yearsLeft),
    sunrises:Math.round(yearsLeft*YEAR),
  };
  if(state.parents){
    const pYearsLeft=Math.max(0,85-G.pAge);
    const eff=Math.min(yearsLeft,pYearsLeft);
    G.parentMeet=Math.round(eff*G.pMeet);
    G.parentYears=Math.round(eff);
  }
  localStorage.setItem(KEY,JSON.stringify({birth:bv,life:lifeExp,season:state.season,parents:state.parents,pAge:G.pAge,pMeet:G.pMeet}));
  return true;
}
function showErr(m){const e=$("#err");e.textContent=m;e.style.opacity=1;setTimeout(()=>e.textContent="",2600);}

$("#countBtn").onclick=()=>{ if(compute()){ buildResult(); go(null); $("#result").classList.add("active"); window.scrollTo(0,0); setTimeout(initReveal,60);} };

/* 週グリッド生成 */
function buildWeeksGrid(){
  const grid=$("#weeksGrid");
  const cols=52, rows=G.life, total=cols*rows;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  const lived=Math.min(G.weeksLived,total);
  let html="";
  for(let i=0;i<total;i++){
    const d=(i/total)*1400; // stagger ms
    let cls="wk";
    if(i<lived)cls+=" past";
    else if(i===lived)cls+=" now";
    html+=`<div class="${cls}" style="transition-delay:${d.toFixed(0)}ms"></div>`;
  }
  grid.innerHTML=html;
}

/* ---------- スクロール演出 ---------- */
function initReveal(){
  const obs=new IntersectionObserver((ents)=>{
    ents.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.add("in");
        if(e.target.id==="weeksGrid"||e.target.querySelector?.("#weeksGrid")){}
        // count-ups inside
        e.target.querySelectorAll?.(".cnt").forEach(animateCount);
        if(e.target.classList.contains("cnt"))animateCount(e.target);
        // weeks grid trigger
        const wg=e.target.querySelector?.("#weeksGrid");
        if(wg)setTimeout(()=>wg.classList.add("go"),200);
        obs.unobserve(e.target);
      }
    });
  },{threshold:.25});
  $$("#result .reveal").forEach(el=>obs.observe(el));
  // hero counts immediately
  $$("#result .r-hero .cnt").forEach(animateCount);
  // sakura petals when count cards visit
  watchPetals();
}
function animateCount(el){
  if(el.dataset.done)return;el.dataset.done=1;
  const to=+el.dataset.to||0, dur=1500, st=performance.now();
  const ease=t=>1-Math.pow(1-t,3);
  const step=now=>{
    const t=clamp((now-st)/dur,0,1);
    el.textContent=fmt(to*ease(t));
    if(t<1)requestAnimationFrame(step);else el.textContent=fmt(to);
  };
  requestAnimationFrame(step);
}

/* 花びら（桜カードあたりで） */
let petalOn=false;
function watchPetals(){
  const obs=new IntersectionObserver(ents=>{
    ents.forEach(e=>{if(e.isIntersecting&&!petalOn){petalOn=true;petalLoop();}else if(!e.isIntersecting){petalOn=false;}});
  },{threshold:.1});
  const t=$$("#result .count-card")[0];if(t)obs.observe(t);
}
function petalLoop(){
  if(!petalOn)return;
  const p=document.createElement("div");p.className="petal";
  p.textContent=Math.random()<.5?"🌸":"🌸";
  const x=Math.random()*innerWidth;p.style.left=x+"px";p.style.fontSize=(12+Math.random()*14)+"px";
  document.body.appendChild(p);
  const dur=6000+Math.random()*4000, drift=(Math.random()-.5)*200, rot=Math.random()*720;
  p.animate([
    {transform:`translate(0,0) rotate(0)`,opacity:0},
    {opacity:.85,offset:.1},
    {transform:`translate(${drift}px,${innerHeight+60}px) rotate(${rot}deg)`,opacity:0}
  ],{duration:dur,easing:"linear"});
  setTimeout(()=>p.remove(),dur);
  setTimeout(petalLoop,900+Math.random()*900);
}

/* ---------- シェアカード ---------- */
function drawShareCard(){
  const c=$("#shareCanvas"),x=c.getContext("2d"),W=1080,H=1350;
  // bg
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0a0e20");g.addColorStop(.55,"#1a1438");g.addColorStop(1,"#2a1d3a");
  x.fillStyle=g;x.fillRect(0,0,W,H);
  // glow top
  const rg=x.createRadialGradient(W/2,120,0,W/2,120,700);
  rg.addColorStop(0,"rgba(231,200,120,.22)");rg.addColorStop(1,"transparent");
  x.fillStyle=rg;x.fillRect(0,0,W,H);
  // stars
  for(let i=0;i<120;i++){x.globalAlpha=Math.random()*.7+.1;x.fillStyle="#fff";const r=Math.random()*1.6+.4;x.beginPath();x.arc(Math.random()*W,Math.random()*H*.9,r,0,7);x.fill();}
  x.globalAlpha=1;
  // title
  x.textAlign="center";
  x.fillStyle="#e7c878";x.font="500 34px 'Outfit',sans-serif";x.fillText("A  Q U I E T  Q U E S T I O N",W/2,150);
  x.fillStyle="#f2ece0";x.font="800 96px 'Shippori Mincho',serif";
  x.fillText("あと何回、",W/2,265);
  // mini weeks grid（幅・高さの両方に収める）
  const cols=52, rows=G.life, oy=330;
  const widthBudget=900, heightBudget=490;
  const step=Math.min(widthBudget/cols, heightBudget/rows);
  const gap=Math.max(1,step*0.16), cell=step-gap;
  const gw=cols*step-gap, gridH=rows*step-gap;
  const ox=(W-gw)/2;
  const lived=Math.min(G.weeksLived,cols*rows);
  for(let r=0;r<rows;r++)for(let col=0;col<cols;col++){
    const i=r*cols+col, px=ox+col*step, py=oy+r*step;
    x.beginPath();x.arc(px+cell/2,py+cell/2,cell/2,0,7);
    if(i<lived){const lg=x.createLinearGradient(px,py,px+cell,py+cell);lg.addColorStop(0,"#e7c878");lg.addColorStop(1,"#f4a6c0");x.fillStyle=lg;}
    else if(i===lived){x.fillStyle="#fff";}
    else x.fillStyle="rgba(255,255,255,.1)";
    x.fill();
  }
  let y=oy+gridH+86;
  // numbers row
  const items=[["🌸",G.springs,"桜"],["🌕",G.moons,"満月"],["🎂",G.birthdays,"誕生日"]];
  if(G.season&&G.season!=="spring")items[2]=[SEASON[G.season].e,G.seasons,SEASON[G.season].n];
  const colW=W/3;
  x.fillStyle="#8a8499";x.font="500 28px 'Outfit',sans-serif";x.fillText("—  あと、何回  —",W/2,y-30);
  items.forEach((it,i)=>{
    const cxp=colW*i+colW/2;
    x.font="56px serif";x.fillText(it[0],cxp,y+40);
    x.fillStyle="#f3dca0";x.font="800 78px 'Outfit',sans-serif";x.fillText(fmt(it[1]),cxp,y+128);
    x.fillStyle="#cfc7ba";x.font="400 30px 'Zen Kaku Gothic New',sans-serif";x.fillText(it[2]+"  ・  約"+fmt(it[1])+"回",cxp,y+178);
  });
  y+=250;
  // tagline
  x.fillStyle="#f2ece0";x.font="500 40px 'Shippori Mincho',serif";
  x.fillText("時間は有限だから、美しい。",W/2,y);
  x.fillStyle="#cfc7ba";x.font="400 30px 'Shippori Mincho',serif";
  x.fillText("さあ、残りの時間を、どう使おう。",W/2,y+58);
  // brand
  x.fillStyle="#8a8499";x.font="500 26px 'Outfit',sans-serif";
  x.fillText("あと何回、 · Day 023 / 100",W/2,H-58);
}
function downloadCard(){
  const c=$("#shareCanvas");const a=document.createElement("a");
  a.href=c.toDataURL("image/png");a.download="atonankai.png";a.click();

}

      await navigator.share({files:[file],text:text+tag});return;

  window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(text+tag),"_blank");
}

let toastT;
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2400);}
