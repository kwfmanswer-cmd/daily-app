<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>どうぶつの庭 - Little Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --grass:#c8e6c9; --grass2:#a5d6a7; --sky:#b3e5fc; --sky2:#e1f5fe;
  --cream:#fff8e1; --sakura:#f8bbd0; --brown:#a1887f; --ink:#5d4037;
  --gold:#ffca28; --shadow:rgba(93,64,55,.18);
  --card:#fffdf7; --soft:#fce4ec;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'M PLUS Rounded 1c','Zen Maru Gothic',sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,#d7f0fb 0%,#e8f7e6 100%);
  overflow:hidden;
  user-select:none;
  -webkit-user-select:none;
}
#app{
  position:relative;
  max-width:520px;
  height:100dvh;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg,#cdeefb 0%,#e6f7e3 55%,#dff3da 100%);
  box-shadow:0 0 40px rgba(0,0,0,.08);
  overflow:hidden;
}

/* ---------- Top bar ---------- */
#topbar{
  position:relative;z-index:30;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  flex:0 0 auto;
}
.logo{font-family:'Zen Maru Gothic';font-weight:900;font-size:18px;color:#6d4c41;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
.logo .leaf{display:inline-block;animation:sway 3s ease-in-out infinite;}
.spacer{flex:1;}
.coin{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.75);backdrop-filter:blur(4px);
  padding:6px 12px;border-radius:20px;font-weight:800;color:#8d6e63;
  box-shadow:0 3px 0 var(--shadow);font-size:15px;
}
.coin .nut{font-size:16px;}
.iconbtn{
  width:38px;height:38px;border:none;border-radius:50%;
  background:rgba(255,255,255,.75);color:#8d6e63;font-size:17px;
  box-shadow:0 3px 0 var(--shadow);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:transform .12s;
}
.iconbtn:active{transform:scale(.9);}

/* ---------- Garden ---------- */
#garden{
  position:relative;flex:1;overflow:hidden;
}
#sky{position:absolute;inset:0;background:linear-gradient(180deg,#bfe9fb 0%,#dff3fb 40%,transparent 70%);}
.cloud{position:absolute;background:#fff;border-radius:50px;opacity:.85;filter:blur(.3px);animation:drift linear infinite;}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
.sun{position:absolute;top:18px;right:24px;width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#fff3b0,#ffd54f);box-shadow:0 0 30px #ffe082aa;animation:pulse 4s ease-in-out infinite;z-index:1;}
#ground{position:absolute;left:0;right:0;bottom:0;height:62%;
  background:linear-gradient(180deg,#d6efc7 0%,#bfe6ad 60%,#aee09b 100%);
  border-radius:48% 48% 0 0/14% 14% 0 0;box-shadow:inset 0 6px 12px #ffffff55;}
.pond{position:absolute;bottom:7%;left:6%;width:34%;height:16%;
  background:radial-gradient(circle at 40% 30%,#cdeffd,#9ed8f5);border-radius:50%;
  box-shadow:inset 0 4px 8px #ffffff88, 0 2px 4px #88c0e055;border:3px solid #b3e5fc;}
.gtree{position:absolute;z-index:2;}
.flower{position:absolute;z-index:2;font-size:18px;animation:sway 4s ease-in-out infinite;transform-origin:bottom center;}

#spots{position:absolute;inset:0;z-index:5;}
.spot{position:absolute;width:30%;max-width:120px;transform:translate(-50%,-50%);text-align:center;}
.itemslot{position:absolute;z-index:4;transform:translate(-50%,-50%);width:64px;height:64px;display:flex;align-items:flex-end;justify-content:center;}

.animal{
  position:relative;width:100%;cursor:pointer;
  filter:drop-shadow(0 6px 5px rgba(93,64,55,.22));
}
.animal svg{width:100%;height:auto;display:block;overflow:visible;}
.shadow{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:60%;height:9px;
  background:rgba(93,64,55,.16);border-radius:50%;filter:blur(2px);z-index:-1;}
.nametag{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.92);padding:1px 9px;border-radius:12px;font-size:11px;font-weight:700;
  color:#7b5e52;white-space:nowrap;box-shadow:0 2px 0 var(--shadow);opacity:0;transition:opacity .2s;pointer-events:none;
}
.animal:hover .nametag{opacity:1;}
.legend-aura{position:absolute;inset:-18%;border-radius:50%;z-index:-2;
  background:radial-gradient(circle,rgba(255,236,179,.55),transparent 65%);
  animation:auraPulse 2.2s ease-in-out infinite;}
.spark{position:absolute;font-size:13px;pointer-events:none;animation:sparkle 1.6s linear infinite;}

/* idle anims */
.bob{animation:bob 2.4s ease-in-out infinite;}
.wig{animation:wig 2s ease-in-out infinite;}
.squ{animation:squ 1.8s ease-in-out infinite;}
.pop{animation:pop .55s cubic-bezier(.34,1.56,.64,1);}
.jump{animation:jump .5s ease;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes wig{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes squ{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(.92) scaleX(1.05)}}
@keyframes pop{0%{transform:scale(0) translateY(20px);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes jump{0%,100%{transform:translateY(0)}40%{transform:translateY(-18px)}}
@keyframes auraPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.08)}}
@keyframes sparkle{0%{transform:translateY(0) scale(.6);opacity:0}30%{opacity:1}100%{transform:translateY(-22px) scale(1.1);opacity:0}}
@keyframes sway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes drift{from{transform:translateX(-120px)}to{transform:translateX(560px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.float{position:absolute;pointer-events:none;z-index:40;font-size:20px;animation:floatUp 1.1s ease-out forwards;}
@keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0}25%{opacity:1}100%{transform:translateY(-60px) scale(1.2);opacity:0}}

.ambient{position:absolute;pointer-events:none;z-index:6;opacity:.8;animation:ambFall linear forwards;}
@keyframes ambFall{0%{transform:translateY(-20px) rotate(0);opacity:0}10%{opacity:.9}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

/* ---------- Action bar ---------- */
#actions{
  position:relative;z-index:20;flex:0 0 auto;
  display:flex;gap:8px;padding:8px 12px 4px;
}
.act{
  flex:1;border:none;border-radius:16px;padding:11px 6px;cursor:pointer;
  font-family:inherit;font-weight:800;font-size:13.5px;color:#fff;
  box-shadow:0 4px 0 rgba(0,0,0,.12);transition:transform .1s, box-shadow .1s;
  display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2;
}
.act:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.12);}
.act .big{font-size:18px;}
.act.wait{background:linear-gradient(180deg,#ffd54f,#ffb300);color:#7a4e00;}
.act.feed{background:linear-gradient(180deg,#aed581,#7cb342);}
.act.shop{background:linear-gradient(180deg,#90caf9,#42a5f5);}
.foodbar{padding:2px 12px 8px;}
.foodbar .bar{height:9px;background:#e0d4c4;border-radius:8px;overflow:hidden;box-shadow:inset 0 1px 2px #00000018;}
.foodbar .fill{height:100%;background:linear-gradient(90deg,#ffd54f,#ff8f00);border-radius:8px;transition:width .4s;}
.foodbar .lbl{font-size:11px;font-weight:700;color:#8d6e63;margin-bottom:3px;display:flex;justify-content:space-between;}

/* ---------- Bottom nav ---------- */
#nav{
  flex:0 0 auto;display:flex;background:var(--card);
  box-shadow:0 -4px 16px rgba(0,0,0,.06);padding:6px 6px calc(6px + env(safe-area-inset-bottom));
  position:relative;z-index:30;
}
.navbtn{
  flex:1;border:none;background:none;cursor:pointer;font-family:inherit;
  padding:6px 0 4px;color:#bcaaa4;font-weight:700;font-size:11px;
  display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s;
}
.navbtn .ic{font-size:21px;transition:transform .15s;}
.navbtn.on{color:#66bb6a;}
.navbtn.on .ic{transform:translateY(-2px) scale(1.12);}
.navbtn .badge{position:absolute;}

/* ---------- Panels (modal-ish) ---------- */
.panel{
  position:absolute;inset:0;z-index:50;background:linear-gradient(180deg,#fffdf9,#fdf3e7);
  display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.panel.open{transform:translateY(0);pointer-events:auto;}
.phead{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;flex:0 0 auto;}
.phead h2{font-family:'Zen Maru Gothic';font-weight:900;font-size:19px;color:#6d4c41;flex:1;}
.pbody{flex:1;overflow-y:auto;padding:6px 14px 20px;-webkit-overflow-scrolling:touch;}
.closeb{width:34px;height:34px;border:none;border-radius:50%;background:#f1e3d3;color:#9c8576;font-size:18px;font-weight:800;cursor:pointer;}
.closeb:active{transform:scale(.9);}

/* collection */
.prog{background:#fff;border-radius:16px;padding:12px 14px;margin-bottom:12px;box-shadow:0 3px 10px #e0c9a833;}
.prog .top{display:flex;justify-content:space-between;align-items:baseline;font-weight:800;color:#7b5e52;margin-bottom:6px;}
.prog .top b{font-size:22px;color:#ef9a3d;}
.prog .bar{height:12px;background:#efe2d2;border-radius:8px;overflow:hidden;}
.prog .fill{height:100%;background:linear-gradient(90deg,#a5d6a7,#66bb6a);border-radius:8px;transition:width .5s;}
.dexgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.dexcard{
  background:#fff;border-radius:16px;padding:8px 4px 7px;text-align:center;
  box-shadow:0 3px 8px #e0c9a830;position:relative;cursor:pointer;transition:transform .12s;border:2px solid transparent;
}
.dexcard:active{transform:scale(.95);}
.dexcard.seen{border-color:#ffe0b2;}
.dexcard .pic{width:62px;height:62px;margin:0 auto 2px;display:flex;align-items:center;justify-content:center;}
.dexcard .pic svg{width:100%;height:100%;overflow:visible;}
.dexcard .nm{font-size:12px;font-weight:800;color:#7b5e52;}
.dexcard .cnt{font-size:10px;color:#b0a;color:#bcaaa4;font-weight:700;}
.dexcard.locked .pic{filter:brightness(0) opacity(.18);}
.dexcard.locked .nm{color:#cfc1b6;}
.rchip{position:absolute;top:5px;left:5px;font-size:8.5px;font-weight:800;padding:1px 5px;border-radius:8px;color:#fff;}
.r0{background:#9ccc65;}.r1{background:#4fc3f7;}.r2{background:#ba68c8;}.r3{background:linear-gradient(90deg,#ff8a65,#ffd54f,#ba68c8);}
.newbadge{position:absolute;top:4px;right:4px;background:#ff7043;color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:8px;}

/* shop */
.shoptabs{display:flex;gap:6px;margin-bottom:10px;}
.shoptab{flex:1;border:none;background:#f1e3d3;color:#9c8576;font-family:inherit;font-weight:800;font-size:13px;padding:8px;border-radius:12px;cursor:pointer;}
.shoptab.on{background:#ffce6b;color:#7a4e00;}
.item{
  background:#fff;border-radius:16px;padding:11px 12px;margin-bottom:9px;
  display:flex;align-items:center;gap:11px;box-shadow:0 3px 8px #e0c9a830;
}
.item .emo{font-size:30px;width:46px;text-align:center;flex:0 0 auto;}
.item .info{flex:1;min-width:0;}
.item .info .t{font-weight:800;color:#6d4c41;font-size:14.5px;}
.item .info .d{font-size:11.5px;color:#9c8576;line-height:1.4;margin-top:2px;}
.item .buy{
  border:none;border-radius:14px;padding:9px 13px;font-family:inherit;font-weight:800;font-size:13px;
  background:linear-gradient(180deg,#ffd54f,#ffb300);color:#7a4e00;cursor:pointer;box-shadow:0 3px 0 #d99a00;
  display:flex;flex-direction:column;align-items:center;gap:1px;flex:0 0 auto;min-width:62px;
}
.item .buy:active{transform:translateY(2px);box-shadow:0 1px 0 #d99a00;}
.item .buy.owned{background:#c8e6c9;color:#558b2f;box-shadow:0 3px 0 #aed581;}
.item .buy.placed{background:#a5d6a7;color:#2e7d32;}
.item .buy small{font-size:10px;font-weight:700;opacity:.85;}
.item.lock{opacity:.6;}
.item.lock .buy{background:#e0d4c4;color:#9c8576;box-shadow:0 3px 0 #c4b4a0;}

/* achievements */
.ach{background:#fff;border-radius:14px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 8px #e0c9a830;}
.ach .ic{font-size:26px;width:38px;text-align:center;}
.ach .info .t{font-weight:800;color:#6d4c41;font-size:14px;}
.ach .info .d{font-size:11.5px;color:#9c8576;}
.ach.locked{opacity:.45;filter:grayscale(.6);}
.ach .chk{margin-left:auto;font-size:18px;}

/* arrival / detail modal */
.overlay{position:absolute;inset:0;z-index:60;background:rgba(60,40,30,.42);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;padding:22px;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:auto;}
.modal{background:linear-gradient(180deg,#fffef9,#fdf2e0);border-radius:24px;padding:20px 18px;max-width:340px;width:100%;
  box-shadow:0 16px 40px rgba(0,0,0,.25);text-align:center;transform:scale(.85);transition:transform .3s cubic-bezier(.34,1.56,.64,1);max-height:86%;overflow-y:auto;}
.overlay.open .modal{transform:scale(1);}
.modal h3{font-family:'Zen Maru Gothic';font-weight:900;font-size:20px;color:#6d4c41;margin-bottom:4px;}
.modal .sub{font-size:12.5px;color:#9c8576;margin-bottom:10px;}
.arr-list{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:8px 0 4px;}
.arr-item{width:78px;text-align:center;}
.arr-item .pic{width:70px;height:70px;margin:0 auto;}
.arr-item .pic svg{width:100%;height:100%;overflow:visible;}
.arr-item .nm{font-size:11px;font-weight:800;color:#7b5e52;}
.arr-item.isnew .nm{color:#ff7043;}
.detail-pic{width:120px;height:120px;margin:6px auto;}
.detail-pic svg{width:100%;height:100%;overflow:visible;}
.profile{background:#fff7ec;border-radius:14px;padding:11px 13px;font-size:13px;color:#7b5e52;line-height:1.6;text-align:left;margin:8px 0;}
.profile .row{display:flex;gap:6px;margin-top:3px;}
.profile .row b{color:#a1887f;min-width:54px;flex:0 0 auto;}
.mbtn{border:none;border-radius:16px;padding:12px 28px;font-family:inherit;font-weight:800;font-size:15px;
  background:linear-gradient(180deg,#aed581,#7cb342);color:#fff;cursor:pointer;box-shadow:0 4px 0 #689f38;margin-top:6px;}
.mbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #689f38;}

.toast{position:absolute;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:70;
  background:rgba(74,52,40,.92);color:#fff;padding:9px 18px;border-radius:20px;font-weight:700;font-size:13px;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90%;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.rainbowtxt{background:linear-gradient(90deg,#ff8a80,#ffd180,#ffff8d,#a7ffeb,#82b1ff,#b388ff);
  -webkit-background-clip:text;background-clip:text;color:transparent;font-weight:900;}

.placehint{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:25;
  background:rgba(124,179,66,.95);color:#fff;font-weight:800;font-size:12.5px;padding:7px 16px;border-radius:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.15);display:none;}
.placehint.show{display:block;animation:pop .4s;}
.spot.placing{cursor:pointer;}
.spot.placing .ring{position:absolute;inset:-6px;border:3px dashed #7cb34299;border-radius:50%;
  width:58px;height:58px;left:50%;top:50%;transform:translate(-50%,-50%);animation:ringp 1.2s ease-in-out infinite;}
@keyframes ringp{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo"><span class="leaf">🌿</span>どうぶつの庭</div>
    <div class="spacer"></div>
    <div class="coin"><span class="nut">🌰</span><span id="nutCount">0</span></div>
    <button class="iconbtn" id="soundBtn" title="サウンド">🔊</button>
  </div>

  <div id="garden">
    <div id="sky"></div>
    <div class="sun"></div>
    <div id="spots"></div>
    <div class="placehint" id="placeHint">そっと置く場所をえらんでね</div>
  </div>

  <div class="foodbar">
    <div class="lbl"><span id="foodName">えさ</span><span id="foodCnt"></span></div>
    <div class="bar"><div class="fill" id="foodFill"></div></div>
  </div>
  <div id="actions">
    <button class="act wait" id="waitBtn"><span class="big">⏳</span>ちょっと待つ</button>
    <button class="act feed" id="feedBtn"><span class="big">🍚</span>えさ・グッズ</button>
    <button class="act shop" id="shopBtn"><span class="big">🛒</span>おみせ</button>
  </div>

  <div id="nav">
    <button class="navbtn on" data-tab="garden"><span class="ic">🏡</span>にわ</button>
    <button class="navbtn" data-tab="dex"><span class="ic">📖</span>ずかん</button>
    <button class="navbtn" data-tab="shop2"><span class="ic">🛒</span>おみせ</button>
    <button class="navbtn" data-tab="ach"><span class="ic">🏆</span>じっせき</button>
  </div>

  <!-- Collection panel -->
  <div class="panel" id="dexPanel">
    <div class="phead"><h2>📖 どうぶつずかん</h2><button class="closeb" data-close>✕</button></div>
    <div class="pbody">
      <div class="prog">
        <div class="top"><span>コンプリート</span><span><b id="dexDone">0</b>/<span id="dexTotal">0</span>しゅるい</span></div>
        <div class="bar"><div class="fill" id="dexFill"></div></div>
      </div>
      <div class="dexgrid" id="dexGrid"></div>
    </div>
  </div>

  <!-- Shop panel -->
  <div class="panel" id="shopPanel">
    <div class="phead"><h2>🛒 おみせ</h2><button class="closeb" data-close>✕</button></div>
    <div class="pbody">
      <div class="shoptabs">
        <button class="shoptab on" data-shop="feed">🍚 えさ</button>
        <button class="shoptab" data-shop="goods">🎀 グッズ</button>
      </div>
      <div id="shopList"></div>
    </div>
  </div>

  <!-- Feed/goods placement panel -->
  <div class="panel" id="invPanel">
    <div class="phead"><h2>🍚 えさ・グッズ</h2><button class="closeb" data-close>✕</button></div>
    <div class="pbody" id="invBody"></div>
  </div>

  <!-- Achievements panel -->
  <div class="panel" id="achPanel">
    <div class="phead"><h2>🏆 じっせき</h2><button class="closeb" data-close>✕</button></div>
    <div class="pbody" id="achBody"></div>
  </div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
/* =========================================================
   どうぶつの庭 - Little Garden   (Day 020)
   ========================================================= */

/* ---------- SVG animal builder ---------- */
// 共通のまるっこい体に、耳・しっぽ・特別パーツを足して28種を描き分ける
function sv(parts){ return '<svg viewBox="0 0 100 100">'+parts+'</svg>'; }
function ell(cx,cy,rx,ry,f,extra=''){ return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${f}" ${extra}/>`; }
function cir(cx,cy,r,f,extra=''){ return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${f}" ${extra}/>`; }
function pth(d,f,extra=''){ return `<path d="${d}" fill="${f}" ${extra}/>`; }

// 目: ふつう / きらきら / ねむい
function eyes(style,col='#3e2723'){
  if(style==='sparkle')
    return `<g>${cir(40,55,6,'#fff')}${cir(60,55,6,'#fff')}${cir(40,55,4,col)}${cir(60,55,4,col)}${cir(41.5,53,1.6,'#fff')}${cir(61.5,53,1.6,'#fff')}<text x="33" y="48" font-size="7">✨</text></g>`;
  if(style==='sleep')
    return `<path d="M35 55 q5 5 10 0" stroke="${col}" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M55 55 q5 5 10 0" stroke="${col}" stroke-width="2.4" fill="none" stroke-linecap="round"/>`;
  // default round shiny
  return `${cir(40,55,4.6,col)}${cir(60,55,4.6,col)}${cir(41.6,53.2,1.7,'#fff')}${cir(61.6,53.2,1.7,'#fff')}`;
}

/* ---------- Sound (Web Audio) ---------- */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(freq,dur,type='sine',vol=.18,when=0){
  if(!S.sound)return; const c=ac(); if(!c)return;
  const t=c.currentTime+when;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g).connect(c.destination); o.start(t); o.stop(t+dur+.02);
}
function sfxTap(){ tone(660,.12,'sine',.14); tone(990,.1,'sine',.08,.04); }
function sfxGet(){ [523,659,784].forEach((f,i)=>tone(f,.16,'triangle',.13,i*.06)); }
function sfxBuy(){ tone(440,.1,'square',.1); tone(660,.14,'square',.1,.08); }
function sfxNew(){ [523,659,784,1046].forEach((f,i)=>tone(f,.22,'triangle',.14,i*.09)); }
function sfxRare(){ [659,880,1046,1318,1760].forEach((f,i)=>tone(f,.3,'sine',.13,i*.1)); }
function sfxPlace(){ tone(300,.16,'sine',.12); }

/* ---------- Visit simulation ---------- */
function weightedPick(weights){
  let t=0; for(const w of weights)t+=w; if(t<=0)return -1;
  let r=Math.random()*t;
  for(let i=0;i<weights.length;i++){ r-=weights[i]; if(r<0)return i; }
  return weights.length-1;
}
function placedBoost(){
  const b=[1,1,1,1];
  S.placedGoods.forEach(gid=>{ const g=GOODS[gid]; if(g) g.boost.forEach((m,i)=>b[i]*=m); });
  return b;
}
function pickAnimalForTier(tier){
  const pool=ANIMALS.filter(a=>a.r===tier);
  if(!pool.length)return null;
  // お気に入りの餌/グッズが置いてあると、その子の出やすさが上がる
  const ws=pool.map(a=>{
    let w=1;
    if(S.food.type===a.food)w*=2.2;
    if(S.placedGoods.includes(a.good))w*=1.8;
    return w;
  });
  return pool[weightedPick(ws)];
}
// 1ひき分の来訪を試みる。来たらanimal、来なかったらnull
function rollVisit(){
  if(S.food.servings<=0)return null;
  const feed=FEEDS[S.food.type];
  const boost=placedBoost();
  const w=feed.w.map((x,i)=>x*boost[i]);
  const tier=weightedPick(w);
  if(tier<0)return null;
  const a=pickAnimalForTier(tier);
  if(!a)return null;
  S.food.servings--;
  return a;
}

// 経過時間ぶんの来訪をまとめて処理。戻り値: 新たに来た動物配列(id) と 新規発見配列
function processElapsed(elapsedMin){
  const result={arrived:[], newly:[], raredisc:false};
  let slotsFree=SPOT_POS.length - S.visitors.length;
  if(slotsFree<=0)return result;
  let chances=Math.floor(elapsedMin/VISIT_MINUTES);
  if(chances<=0)return result;
  if(chances>40)chances=40; // 久しぶりでも上限
  for(let i=0;i<chances && slotsFree>0;i++){
    const a=rollVisit();
    if(!a)break;
    // visit確率: チャンスごとに必ず1ひきではなく、少しゆらぎ
    S.visitors.push({id:a.id});
    S.totalVisits++;
    const wasNew=!S.dex[a.id];
    if(!S.dex[a.id])S.dex[a.id]={count:0};
    S.dex[a.id].count++;
    // 木の実報酬
    let reward=[2,5,12,40][a.r];
    S.placedGoods.forEach(gid=>{ if(GOODS[gid]) reward+=GOODS[gid].nuts; });
    if(S.food.type===a.food)reward+=2;
    if(wasNew)reward+=[5,15,40,120][a.r];
    S.nuts+=reward;
    result.arrived.push({id:a.id,reward,isNew:wasNew});
    if(wasNew)result.newly.push(a.id);
    if(a.r>=2 && wasNew)result.raredisc=true;
    slotsFree--;
  }
  return result;
}

/* ---------- Rendering: garden ---------- */
function decorateGarden(){
  const g=$('#garden');
  // 既存の装飾を消す（spots/sky/sun/hint以外）
  [...g.querySelectorAll('.cloud,.ground,#ground,.gtree,.flower,.pond')].forEach(e=>e.remove());
  // ground
  const ground=el('div'); ground.id='ground'; g.insertBefore(ground,$('#spots'));
  // pond
  const pond=el('div','pond'); g.insertBefore(pond,$('#spots'));
  // clouds
  for(let i=0;i<3;i++){
    const c=el('div','cloud'); const w=40+i*16;
    c.style.width=w+'px'; c.style.height=(w*.42)+'px';
    c.style.top=(10+i*16)+'px'; c.style.left=(-60-i*40)+'px';
    c.style.animationDuration=(26+i*9)+'s'; c.style.animationDelay=(-i*8)+'s';
    g.insertBefore(c,$('#spots'));
  }
  // trees
  const trees=[{x:8,y:30,s:1},{x:86,y:24,s:.8}];
  trees.forEach(t=>{
    const tr=el('div','gtree');
    const sz=70*t.s;
    tr.style.left=t.x+'%'; tr.style.top=t.y+'%'; tr.style.fontSize=sz+'px';
    tr.innerHTML='🌳';
    g.insertBefore(tr,$('#spots'));
  });
  // flowers: コンプ率で増える
  const fcount=4+Math.floor(compRate()*14);
  const flowers=['🌷','🌸','🌼','🌻','🏵️','🌺'];
  for(let i=0;i<fcount;i++){
    const f=el('div','flower');
    f.textContent=flowers[i%flowers.length];
    f.style.left=(6+ (i*37)%88 )+'%';
    f.style.top=(58+ (i*23)%34 )+'%';
    f.style.fontSize=(14+ (i%3)*3 )+'px';
    f.style.animationDelay=(-i*.5)+'s';
    g.insertBefore(f,$('#spots'));
  }
}

function renderSpots(){

    const p=SPOT_POS[i];
    const spot=el('div','spot');
    spot.style.left=p.x+'%'; spot.style.top=p.y+'%';
    const idle=['bob','wig','squ'][ (v.id.charCodeAt(0)+i)%3 ];

    spot.innerHTML=`<div class="animal pop" data-id="${v.id}">${aura}${sparks}<div class="nametag">${a.n}</div>${a.svg()}<div class="shadow"></div></div>`;

  for(let i=0;i<3;i++){

  const m=$('#modal');

  const isRare=res.raredisc;

  html+=`<div class="sub">${res.arrived.length}ひきが あそびに来ていました</div>`;

  }

  $('#overlay').classList.add('open');
  $('#arrOk').onclick=()=>{ $('#overlay').classList.remove('open'); };

  else if(res.newly.length){ sfxNew(); }
  else { sfxGet(); }

let shopTab='feed';
function renderShop(){
  const list=$('#shopList'); list.innerHTML='';
  document.querySelectorAll('.shoptab').forEach(t=>t.classList.toggle('on',t.dataset.shop===shopTab));
  if(shopTab==='feed'){
    FEED_ORDER.forEach(fid=>{
      const f=FEEDS[fid];
      const it=el('div','item');
      it.innerHTML=`<div class="emo">${f.emo}</div>
        <div class="info"><div class="t">${f.n}</div><div class="d">${f.desc}<br><span style="color:#a1887f">えさ ${f.servings}回ぶん</span></div></div>
        <button class="buy" data-feed="${fid}"><span>🌰${f.cost}</span><small>かう</small></button>`;
      list.appendChild(it);
    });
    list.querySelectorAll('[data-feed]').forEach(b=>b.onclick=()=>buyFeed(b.dataset.feed));
  }else{
    GOODS_ORDER.forEach(gid=>{
      const g=GOODS[gid];
      const owned=S.ownedGoods.includes(gid);
      const placed=S.placedGoods.includes(gid);
      const locked=seenCount()<g.unlock && !owned;
      const it=el('div','item'+(locked?' lock':''));
      let btn;
      if(locked){ btn=`<button class="buy" disabled><span>🔒</span><small>${g.unlock}種で解放</small></button>`; }
      else if(!owned){ btn=`<button class="buy" data-good="${gid}"><span>🌰${g.cost}</span><small>かう</small></button>`; }
      else if(placed){ btn=`<button class="buy placed" data-toggle="${gid}"><span>✓</span><small>はずす</small></button>`; }
      else { btn=`<button class="buy owned" data-toggle="${gid}"><span>もってる</span><small>おく</small></button>`; }
      it.innerHTML=`<div class="emo">${g.emo}</div>
        <div class="info"><div class="t">${g.n}</div><div class="d">${g.desc}</div></div>${btn}`;
      list.appendChild(it);
    });
    list.querySelectorAll('[data-good]').forEach(b=>b.onclick=()=>buyGood(b.dataset.good));
    list.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>togglePlace(b.dataset.toggle));
  }
}

function buyFeed(fid){
  const f=FEEDS[fid];
  if(S.nuts<f.cost){ toast('🌰 木の実がたりないよ'); return; }
  S.nuts-=f.cost;
  // 同じ餌なら補充、違えば置きかえ
  if(S.food.type===fid) S.food.servings+=f.servings;
  else S.food={type:fid,servings:f.servings};
  sfxBuy(); save(); renderHUD(); renderShop();
  toast(`${f.emo} ${f.n}をおいたよ！`);
}
function buyGood(gid){
  const g=GOODS[gid];
  if(S.nuts<g.cost){ toast('🌰 木の実がたりないよ'); return; }
  S.nuts-=g.cost; S.ownedGoods.push(gid);
  sfxBuy(); save(); renderHUD(); renderShop();
  toast(`${g.emo} ${g.n}を かった！`);
}
function togglePlace(gid){
  const i=S.placedGoods.indexOf(gid);
  if(i>=0){ S.placedGoods.splice(i,1); toast('はずしたよ'); }
  else{
    if(S.placedGoods.length>=MAX_GOODS){ toast(`グッズは${MAX_GOODS}つまで`); return; }
    S.placedGoods.push(gid); sfxPlace(); toast('にわに おいたよ！');
  }
  save(); renderShop(); renderSpots();
}

  b.appendChild(fc);
  // 餌をかえる
  const fh=el('div'); fh.innerHTML='<div style="font-weight:800;color:#6d4c41;margin:6px 2px">🍚 えさをかえる／補充</div>'; b.appendChild(fh);
  FEED_ORDER.forEach(fid=>{
    const fe=FEEDS[fid];
    const it=el('div','item');
    it.innerHTML=`<div class="emo">${fe.emo}</div>
      <div class="info"><div class="t">${fe.n}</div><div class="d">${fe.desc}</div></div>
      <button class="buy" data-feed="${fid}"><span>🌰${fe.cost}</span><small>${S.food.type===fid?'補充':'おく'}</small></button>`;
    b.appendChild(it);
  });
  // グッズ
  const gh=el('div'); gh.innerHTML=`<div style="font-weight:800;color:#6d4c41;margin:12px 2px 6px">🎀 グッズ（${S.placedGoods.length}/${MAX_GOODS} 設置中）</div>`; b.appendChild(gh);
  if(!S.ownedGoods.length){
    const e=el('div','item'); e.innerHTML=`<div class="emo">🛒</div><div class="info"><div class="d">まだグッズを持っていないよ。おみせで買ってみよう！</div></div>`; b.appendChild(e);
  }
  S.ownedGoods.forEach(gid=>{
    const g=GOODS[gid]; const placed=S.placedGoods.includes(gid);
    const it=el('div','item');
    it.innerHTML=`<div class="emo">${g.emo}</div>
      <div class="info"><div class="t">${g.n}</div><div class="d">${g.desc}</div></div>
      <button class="buy ${placed?'placed':'owned'}" data-toggle="${gid}"><span>${placed?'✓':'おく'}</span><small>${placed?'はずす':''}</small></button>`;
    b.appendChild(it);
  });
  b.querySelectorAll('[data-feed]').forEach(btn=>btn.onclick=()=>{buyFeed(btn.dataset.feed); renderInv();});
  b.querySelectorAll('[data-toggle]').forEach(btn=>btn.onclick=()=>{togglePlace(btn.dataset.toggle); renderInv();});
}

function renderAch(){
  const b=$('#achBody'); b.innerHTML='';
  ACHS.forEach(a=>{
    const done=S.achDone.includes(a.id);
    const it=el('div','ach'+(done?'':' locked'));
    it.innerHTML=`<div class="ic">${a.ic}</div>
      <div class="info"><div class="t">${a.t}</div><div class="d">${a.d}</div></div>
      <div class="chk">${done?'✅':'⬜'}</div>`;
    b.appendChild(it);
  });
}

function checkAch(){
  let unlocked=[];
  ACHS.forEach(a=>{
    if(!S.achDone.includes(a.id) && a.chk(S)){
      S.achDone.push(a.id); unlocked.push(a);
    }
  });
  if(unlocked.length){
    save();
    unlocked.forEach((a,i)=>setTimeout(()=>{ toast(`🏆 じっせき: ${a.t}`); sfxNew(); }, 600+i*1600));
  }
}

/* ---------- Wait button ---------- */
let waiting=false;
function doWait(){
  if(waiting)return;
  if(S.food.servings<=0){ toast('🍚 えさがないよ。おみせで補充してね'); openInvFromHint(); return; }
  if(S.visitors.length>=SPOT_POS.length){ toast('にわが いっぱい！なでてあげてね'); return; }
  waiting=true;
  const btn=$('#waitBtn'); btn.style.opacity='.6';
  toast('⏳ どうぶつを まっています…');
  // 擬似的に時間を進める
  setTimeout(()=>{
    const res=processElapsed(WAIT_MINUTES*2 + VISIT_MINUTES); // 1〜2ひき来やすく
    S.lastTime=Date.now();
    save();
    decorateGarden(); renderSpots(); renderHUD();
    if(res.arrived.length)showArrival(res); else toast('まだ だれも来なかった…またね');
    checkAch();
    waiting=false; btn.style.opacity='1';
  },1100);
}
function openInvFromHint(){ closePanels(); renderInv(); openPanel($('#invPanel')); }

/* ---------- Init / boot ---------- */
function boot(){
  const existed=load();
  // 経過時間で来訪処理
  const now=Date.now();
  const elapsedMin=(now-S.lastTime)/60000;
  let res=null;
  if(existed && elapsedMin>=VISIT_MINUTES && S.food.servings>0 && S.visitors.length<SPOT_POS.length){
    res=processElapsed(elapsedMin);
  }
  S.lastTime=now;
  save();

  decorateGarden(); renderSpots(); renderHUD();
  bindUI();
  setInterval(spawnAmbient,2600);
  spawnAmbient();

  if(res && res.arrived.length){ setTimeout(()=>{ showArrival(res); checkAch(); },500); }
  else { checkAch(); }
  // はじめての人へ
  if(!existed){
    setTimeout(()=>{
      const m=$('#modal');
      m.innerHTML=`<h3>🌿 ようこそ！</h3>
        <div class="profile">
          ここは どうぶつが あそびに来る ちいさな庭。<br><br>
          🍚 <b>えさ</b>をおいて、すこし<b>まつ</b>と…<br>
          🐾 いろんな子が 遊びに来てくれるよ！<br><br>
          来た子は <b>ずかん</b>に記録され、<b>木の実🌰</b>がもらえる。<br>
          木の実で あたらしい えさ や グッズを買って、<br>
          ぜんぶで<b> ${ANIMALS.length}しゅるい</b>の コンプリートを めざそう！
        </div>
        <button class="mbtn" id="welOk">はじめる！</button>`;
      $('#overlay').classList.add('open');
      $('#welOk').onclick=()=>{ $('#overlay').classList.remove('open'); toast('⏳「ちょっと待つ」をタップしてみてね'); };
    },400);
  }
}

function bindUI(){
  $('#waitBtn').onclick=()=>{ if(!AC)ac(); doWait(); };
  $('#feedBtn').onclick=()=>{ renderInv(); openPanel($('#invPanel')); };
  $('#shopBtn').onclick=()=>{ shopTab='feed'; renderShop(); openPanel($('#shopPanel')); };
  $('#soundBtn').onclick=()=>{ S.sound=!S.sound; save(); renderHUD(); if(S.sound){ac();sfxTap();} toast(S.sound?'🔊 サウンド オン':'🔇 サウンド オフ'); };

  document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closePanels);
  $('#overlay').onclick=(e)=>{ if(e.target.id==='overlay')$('#overlay').classList.remove('open'); };

  document.querySelectorAll('.navbtn').forEach(b=>{
    b.onclick=()=>{
      const tab=b.dataset.tab;
      document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('on',x===b));
      if(tab!=='garden') { /* keep garden visible behind */ }
      closePanels();
      if(tab==='dex'){ renderDex(); openPanel($('#dexPanel')); }
      else if(tab==='shop2'){ shopTab='feed'; renderShop(); openPanel($('#shopPanel')); }
      else if(tab==='ach'){ renderAch(); openPanel($('#achPanel')); }
      if(!AC && S.sound)ac();
    };
  });
  // パネルを閉じたら にわタブに戻す
  document.querySelectorAll('[data-close]').forEach(b=>{
    const orig=b.onclick;
    b.onclick=()=>{ closePanels(); document.querySelectorAll('.navbtn').forEach(x=>x.classList.toggle('on',x.dataset.tab==='garden')); };
  });

  document.querySelectorAll('.shoptab').forEach(t=>t.onclick=()=>{ shopTab=t.dataset.shop; renderShop(); });
}

boot();
</script>
</body>
</html>
