<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のラッキーカラー診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ee;
    --bg-from: #f6f3ee;
    --bg-to: #f6f3ee;
    --ink: #1a1a1a;
    --ink-soft: #5a5a5a;
    --ink-faint: #9a9a9a;
    --line: #e6e0d5;
    --card: #ffffff;
    --lucky: #1a1a1a;
    --lucky-soft: rgba(26, 26, 26, 0.08);
    --shadow: 0 30px 80px -30px rgba(0, 0, 0, 0.18), 0 4px 14px rgba(0, 0, 0, 0.04);
    --serif-jp: "Shippori Mincho B1", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --sans-jp: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    --serif-en: "Cormorant Garamond", "Times New Roman", serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--sans-jp);
    color: var(--ink);
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, var(--bg-from) 0%, transparent 55%),
                      radial-gradient(circle at 80% 90%, var(--bg-to) 0%, transparent 55%),
                      linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    transition: background-color 1.4s ease, color 1.4s ease;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 10%, var(--bg-from) 0%, transparent 55%),
                      radial-gradient(circle at 80% 90%, var(--bg-to) 0%, transparent 55%),
                      linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
    transition: opacity 1.6s ease, filter 1.6s ease;
    z-index: -1;
    filter: saturate(1.05);
  }

  .stage {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .scene {
    display: none;
    animation: fadeIn 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  .scene.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Intro ---------- */
  .intro {
    text-align: center;
    padding: 8px 0;
  }
  .intro .eyebrow {
    font-family: var(--serif-en);
    font-style: italic;
    letter-spacing: 0.22em;
    font-size: 13px;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .intro h1 {
    font-family: var(--serif-jp);
    font-weight: 500;
    font-size: clamp(28px, 5vw, 38px);
    letter-spacing: 0.14em;
    line-height: 1.4;
    margin-bottom: 14px;
  }
  .intro .lead {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.9;
    letter-spacing: 0.05em;
    margin-bottom: 44px;
  }

  .input-card {
    background: var(--card);
    border-radius: 22px;
    padding: 36px 30px 30px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .input-label {
    display: block;
    font-family: var(--serif-en);
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 14px;
    text-align: center;
  }
  .input-row {
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    transition: border-color 0.4s ease;
  }
  .input-row:focus-within { border-color: var(--ink); }
  .input-row input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: var(--serif-jp);
    font-size: 22px;
    color: var(--ink);
    padding: 6px 4px;
    letter-spacing: 0.08em;
    text-align: center;
  }
  .input-row input::placeholder {
    color: #cfc8b9;
    font-weight: 300;
  }
  .input-hint {
    margin-top: 14px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
  }

  .btn {
    appearance: none;
    border: 0;
    cursor: pointer;
    width: 100%;
    margin-top: 28px;
    padding: 17px 24px;
    font-family: var(--sans-jp);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.42em;
    background: var(--ink);
    color: #fff;
    border-radius: 999px;
    transition: transform 0.25s ease, opacity 0.25s ease, background 0.4s ease;
    padding-left: calc(24px + 0.42em);
  }
  .btn:hover:not(:disabled) { transform: translateY(-2px); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled {
    opacity: 0.28;
    cursor: not-allowed;
  }
  .btn.ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn.ghost:hover { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ---------- Result ---------- */
  .result-card {
    background: var(--card);
    border-radius: 28px;
    padding: 44px 36px 40px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--lucky), transparent);
    opacity: 0.5;
  }

  .result-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--serif-en);
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .result-head .for-name { color: var(--ink); font-weight: 500; letter-spacing: 0.18em; }

  .swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .swatch {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: var(--lucky);
    box-shadow: 0 18px 40px -10px var(--lucky-soft), inset 0 0 0 1px rgba(255,255,255,0.18);
    position: relative;
    animation: swatchIn 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .swatch::after {
    content: "";
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 1px solid var(--line);
    pointer-events: none;
  }
  @keyframes swatchIn {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .color-name {
    margin-top: 28px;
    text-align: center;
  }
  .color-name .romaji {
    font-family: var(--serif-en);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .color-name .kanji {
    font-family: var(--serif-jp);
    font-weight: 500;
    font-size: clamp(32px, 6vw, 42px);
    letter-spacing: 0.22em;
    line-height: 1.3;
    color: var(--ink);
  }
  .color-name .hex {
    margin-top: 10px;
    font-family: var(--serif-en);
    font-size: 12px;
    letter-spacing: 0.24em;
    color: var(--ink-faint);
  }

  .meaning {
    margin: 28px auto 0;
    padding: 0 6px;
    text-align: center;
    font-family: var(--serif-jp);
    font-size: 15px;
    line-height: 2;
    letter-spacing: 0.1em;
    color: var(--ink);
    max-width: 420px;
  }
  .meaning::before, .meaning::after {
    content: "";
    display: block;
    width: 36px;
    height: 1px;
    background: var(--line);
    margin: 14px auto;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 30px;
  }
  .stat {
    text-align: center;
    padding: 18px 8px 16px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(250, 247, 240, 0.5);
  }
  .stat .label {
    font-family: var(--serif-en);
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat .value {
    font-family: var(--serif-jp);
    font-weight: 500;
    color: var(--ink);
    line-height: 1.2;
  }
  .stat.number .value {
    font-family: var(--serif-en);
    font-weight: 500;
    font-size: 38px;
    color: var(--lucky);
  }
  .stat.item .value {
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 6px 0;
  }
  .stat.fortune .value {
    font-size: 18px;
    letter-spacing: 0.1em;
    color: var(--lucky);
  }
  .stat.fortune .stars span {
    display: inline-block;
    opacity: 0;
    transform: translateY(-4px);
    animation: starIn 0.4s ease forwards;
  }
  @keyframes starIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: var(--serif-en);
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
    text-align: center;
    margin: 34px 0 14px;
    position: relative;
  }
  .section-title::before, .section-title::after {
    content: "";
    display: inline-block;
    width: 22px;
    height: 1px;
    background: var(--line);
    vertical-align: middle;
    margin: 0 12px;
  }

  .advice {
    text-align: center;
    font-family: var(--serif-jp);
    font-size: 15px;
    line-height: 2;
    letter-spacing: 0.08em;
    color: var(--ink);
    padding: 0 6px;
  }

  .palette {
    display: flex;
    justify-content: center;
    gap: 18px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .palette .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: chipIn 0.6s ease forwards;
  }
  @keyframes chipIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .palette .dot {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    box-shadow: 0 6px 14px -6px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.2);
  }
  .palette .chip-name {
    font-family: var(--serif-jp);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--ink-soft);
  }

  .footer-actions {
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .footer-actions .btn { margin-top: 0; }

  .stamp {
    text-align: center;
    margin-top: 18px;
    font-family: var(--serif-en);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .pagefoot {
    text-align: center;
    margin-top: 26px;
    font-family: var(--serif-en);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* ---------- Reveal effect ---------- */
  .reveal { opacity: 0; transform: translateY(10px); }
  .reveal.show { animation: revealIn 0.7s ease forwards; }
  @keyframes revealIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 480px) {
    .input-card, .result-card { padding-left: 22px; padding-right: 22px; }
    .swatch { width: 110px; height: 110px; }
    .stat .label { font-size: 9px; }
    .stat.number .value { font-size: 32px; }
    .palette { gap: 12px; }
    .palette .dot { width: 32px; height: 32px; }
  }

  /* Lucky theme body overlay for active result */
  body.themed::before {
    opacity: 1;
    filter: saturate(1.08);
  }
</style>
</head>
<body>
  <div class="stage">

    <!-- ===== Intro scene ===== -->
    <section id="scene-intro" class="scene active">
      <div class="intro">
        <div class="eyebrow">Daily Lucky Color</div>
        <h1>今日の<br>ラッキーカラー診断</h1>
        <p class="lead">
          名前と今日の日付から、<br>
          あなたに寄り添う一色を導きます。
        </p>
      </div>
      <div class="input-card">
        <label class="input-label" for="name">Your Name</label>
        <div class="input-row">
          <input id="name" type="text" placeholder="お名前を入力" autocomplete="off" maxlength="24">
        </div>
        <div class="input-hint">ニックネームでも構いません</div>
        <button id="diagnose-btn" class="btn" disabled>診&nbsp;&nbsp;断&nbsp;&nbsp;す&nbsp;&nbsp;る</button>
      </div>
      <div class="pagefoot" id="today-label"></div>
    </section>

    <!-- ===== Result scene ===== -->
    <section id="scene-result" class="scene">
      <div class="result-card">
        <div class="result-head">
          <span id="today-stamp">— — —</span>
          <span class="for-name" id="for-name">For —</span>
        </div>

        <div class="swatch-wrap">
          <div class="swatch" id="swatch"></div>
          <div class="color-name">
            <div class="romaji reveal" id="romaji">—</div>
            <div class="kanji reveal" id="kanji">—</div>
            <div class="hex reveal" id="hex">#000000</div>
          </div>
        </div>

        <p class="meaning reveal" id="meaning">—</p>

        <div class="stats">
          <div class="stat number reveal">
            <div class="label">Number</div>
            <div class="value" id="lucky-number">0</div>
          </div>
          <div class="stat item reveal">
            <div class="label">Item</div>
            <div class="value" id="lucky-item">—</div>
          </div>
          <div class="stat fortune reveal">
            <div class="label">Fortune</div>
            <div class="value stars" id="lucky-stars">—</div>
          </div>
        </div>

        <div class="section-title">Today's Advice</div>
        <p class="advice reveal" id="advice">—</p>

        <div class="section-title">Matches Well With</div>
        <div class="palette" id="palette"></div>

        <div class="footer-actions">
          <button id="again-btn" class="btn ghost">も&nbsp;う&nbsp;一&nbsp;度&nbsp;診&nbsp;断</button>
        </div>

        <div class="stamp">Daily Lucky Color · No.<span id="seed-stamp">0000</span></div>
      </div>
    </section>

  </div>

<script>
/* ============ Color palette ============ */
const COLORS = [
  { key:"akane",       kanji:"茜色",     romaji:"Akane",        hex:"#B7282E",
    meaning:"情熱と決意の色。心の奥にある芯の強さを思い出させます。",
    advice:"直感を信じて、ためらわずに一歩を踏み出してみましょう。",
    matches:["toki","rikyucha","sumire"] },
  { key:"sakura",      kanji:"桜色",     romaji:"Sakura",       hex:"#FBE2E2",
    meaning:"優しさと新しい始まりを象徴する、ふんわりとした色。",
    advice:"周りの人をいたわる言葉を、一つ多めに口にしてみて。",
    matches:["wakakusa","gunjo","kogane"] },
  { key:"yamabuki",    kanji:"山吹色",   romaji:"Yamabuki",     hex:"#F8B500",
    meaning:"豊かさと社交性の色。人と人を温かく結びます。",
    advice:"笑顔を絶やさず、誰かと食事や会話を楽しむ一日に。",
    matches:["ruri","koke","ginnezu"] },
  { key:"moegi",       kanji:"萌黄色",   romaji:"Moegi",        hex:"#AACF53",
    meaning:"芽吹きの色。これから伸びゆく可能性を内包します。",
    advice:"小さくても新しい挑戦を一つ始めるのに最適な日です。",
    matches:["sakura","shu","konjo"] },
  { key:"wakakusa",    kanji:"若草色",   romaji:"Wakakusa",     hex:"#C3D825",
    meaning:"柔軟性と若々しさを表す、生命力あふれる色。",
    advice:"細かい計画より、その場の直感を大切にしてみて。",
    matches:["akane","konjo","kobai"] },
  { key:"koke",        kanji:"苔色",     romaji:"Koke",         hex:"#69821B",
    meaning:"落ち着きと知性を宿す色。深く根を張る強さを感じます。",
    advice:"急がず、じっくり考える時間をひとり分作ってみて。",
    matches:["yamabuki","sakura","toki"] },
  { key:"hisui",       kanji:"翡翠色",   romaji:"Hisui",        hex:"#38B48B",
    meaning:"調和と癒しを運ぶ、澄んだみずみずしい色。",
    advice:"自然のあるところで深呼吸する時間を持ちましょう。",
    matches:["sango","edomurasaki","kogane"] },
  { key:"asagi",       kanji:"浅葱色",   romaji:"Asagi",        hex:"#00A3AF",
    meaning:"清らかさと革新の色。よどんだ空気を入れ替えてくれます。",
    advice:"机のまわりや身の回りを整えると、運気が動き出します。",
    matches:["sumire","shu","kobai"] },
  { key:"ruri",        kanji:"瑠璃色",   romaji:"Ruri",         hex:"#1E50A2",
    meaning:"誠実さと深い知性を象徴する、宝石のような青。",
    advice:"大切な決断や約束ごとは、今日のうちに済ませて。",
    matches:["yamabuki","sakura","nadeshiko"] },
  { key:"gunjo",       kanji:"群青",     romaji:"Gunjo",        hex:"#4C6CB3",
    meaning:"冷静さと信頼の色。周囲からの安心感を引き寄せます。",
    advice:"自分が話す前に、相手の言葉をひと呼吸長く聴いてみて。",
    matches:["sakura","rikyucha","kogane"] },
  { key:"konjo",       kanji:"紺青",     romaji:"Konjo",        hex:"#192F60",
    meaning:"威厳と忍耐の色。物事の本質を見抜く力を高めます。",
    advice:"目先の損得より、長く続く価値を優先しましょう。",
    matches:["wakakusa","toki","yukishiro"] },
  { key:"sumire",      kanji:"菫色",     romaji:"Sumire",       hex:"#7058A3",
    meaning:"神秘性と気品をたたえる、内なる感性の色。",
    advice:"ひとりで過ごす静かな時間が、あなたの感性を磨きます。",
    matches:["asagi","shu","akane"] },
  { key:"edomurasaki", kanji:"江戸紫",   romaji:"Edomurasaki",  hex:"#745399",
    meaning:"優雅さと格調を漂わせる、洗練された伝統色。",
    advice:"美術館・書店・上質な音楽など、美に触れる時間を。",
    matches:["hisui","toki","ginnezu"] },
  { key:"kikyo",       kanji:"桔梗色",   romaji:"Kikyo",        hex:"#5D3F6A",
    meaning:"気高さと清純さの色。意志を静かに通します。",
    advice:"短くてもいい、本を開いて自分の世界に戻る時間を。",
    matches:["wakakusa","shu","kogane"] },
  { key:"toki",        kanji:"鴇色",     romaji:"Toki",         hex:"#F4B3C2",
    meaning:"慈愛と純真をあらわす、淡くやわらかな色。",
    advice:"しばらく連絡していない人に、軽く便りを送ってみて。",
    matches:["akane","koke","konjo"] },
  { key:"nadeshiko",   kanji:"撫子色",   romaji:"Nadeshiko",    hex:"#EEBBCB",
    meaning:"上品さと愛らしさをまとう、ひそやかな色。",
    advice:"立ち居振る舞いを少しゆっくり、丁寧に意識して。",
    matches:["ruri","koke","shikkoku"] },
  { key:"shu",         kanji:"朱色",     romaji:"Shu",          hex:"#EB6101",
    meaning:"生命力と勇気を呼び起こす、力強くあたたかな色。",
    advice:"思い切った行動が吉。背中を押されたら乗ってみて。",
    matches:["asagi","sumire","yukishiro"] },
  { key:"sango",       kanji:"珊瑚色",   romaji:"Sango",        hex:"#F596AA",
    meaning:"親しみやすさと愛情の色。場をやさしく包みます。",
    advice:"人との縁を丁寧に。今日の出会いに少しの時間を割いて。",
    matches:["hisui","konjo","ginnezu"] },
  { key:"rikyucha",    kanji:"利休茶",   romaji:"Rikyucha",     hex:"#9A8A4D",
    meaning:"渋さと品格をたたえる、味わい深い茶色。",
    advice:"古いもの・長く愛されたものに価値を見出す日です。",
    matches:["akane","sakura","gunjo"] },
  { key:"kogane",      kanji:"黄金",     romaji:"Kogane",       hex:"#E6B422",
    meaning:"豊穣と栄光の色。あなたの存在感を際立たせます。",
    advice:"控えめになりすぎず、自信を持って前に出てみて。",
    matches:["sumire","hisui","kikyo"] },
  { key:"ginnezu",     kanji:"銀鼠",     romaji:"Ginnezu",      hex:"#9CA1A6",
    meaning:"洗練と中庸を象徴する、静かで品のある色。",
    advice:"極端な判断を避け、バランス感覚を信じて選びましょう。",
    matches:["shu","kogane","edomurasaki"] },
  { key:"shikkoku",    kanji:"漆黒",     romaji:"Shikkoku",     hex:"#1A1A24",
    meaning:"神秘と内省の色。すべてを受けとめる深さを持ちます。",
    advice:"夜のひととき、画面を消して自分と向き合ってみて。",
    matches:["sakura","kogane","nadeshiko"] },
  { key:"yukishiro",   kanji:"雪白",     romaji:"Yukishiro",    hex:"#F7F5F0",
    meaning:"純粋と新生の色。あらゆるものをやさしくリセットします。",
    advice:"重く感じていたことを、今日いったん手放してみて。",
    matches:["shikkoku","shu","konjo"] },
  { key:"kobai",       kanji:"紅梅色",   romaji:"Kobai",        hex:"#E16B8C",
    meaning:"華やかさと前向きさの色。寒さのなかでも咲く意志。",
    advice:"先延ばしにしていた連絡や行動に、笑顔で先手を。",
    matches:["wakakusa","asagi","ginnezu"] }
];

const ITEMS = [
  "革の手帳","万年筆","香り高いお茶","小さな観葉植物","アロマキャンドル",
  "手のひらサイズの石","文庫本一冊","シルクのスカーフ","木製のコースター","真鍮の鍵",
  "ガラスのペーパーウェイト","木綿のハンカチ","季節の花一輪","銀のスプーン","ヴィンテージの時計",
  "ハーブの小瓶","陶器のマグカップ","革製のしおり","和紙のメモ帳","拾った木の実",
  "古い葉書","鉱物標本","折りたたみの扇子","お気に入りのCD","木彫りの小物"
];

/* ============ Deterministic hash ============ */
function fnv1a(str) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) | 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function diagnose(name) {
  const key = name.trim() + "|" + todayKey();
  const seed = fnv1a(key);
  const rng = mulberry32(seed);

  const colorIdx = Math.floor(rng() * COLORS.length);
  const color = COLORS[colorIdx];

  const number = 1 + Math.floor(rng() * 9);
  const itemIdx = Math.floor(rng() * ITEMS.length);
  const item = ITEMS[itemIdx];
  // weighted fortune: 1★ rare, 5★ rare, 3-4 common
  const r = rng();
  let stars;
  if (r < 0.05) stars = 1;
  else if (r < 0.20) stars = 2;
  else if (r < 0.55) stars = 3;
  else if (r < 0.88) stars = 4;
  else stars = 5;

  return { seed, color, number, item, stars };
}

/* ============ Helpers ============ */
function hexToRgb(hex) {
  const h = hex.replace("#","");
  return {
    r: parseInt(h.substring(0,2),16),
    g: parseInt(h.substring(2,4),16),
    b: parseInt(h.substring(4,6),16)
  };
}
function rgba(hex, a) {
  const {r,g,b} = hexToRgb(hex);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}
function mix(hex, withHex, t) {
  const a = hexToRgb(hex), b = hexToRgb(withHex);
  const r = Math.round(a.r * (1-t) + b.r * t);
  const g = Math.round(a.g * (1-t) + b.g * t);
  const bl = Math.round(a.b * (1-t) + b.b * t);
  return `rgb(${r}, ${g}, ${bl})`;
}
function relLum(hex) {
  const {r,g,b} = hexToRgb(hex);
  const f = v => { v/=255; return v<=0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
  return 0.2126*f(r) + 0.7152*f(g) + 0.0722*f(b);
}

function formatToday() {
  const d = new Date();
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} (${w})`;
}

/* ============ UI ============ */
const $ = id => document.getElementById(id);
const nameInput = $("name");
const diagBtn = $("diagnose-btn");
const againBtn = $("again-btn");
const sceneIntro = $("scene-intro");
const sceneResult = $("scene-result");

$("today-label").textContent = formatToday();

nameInput.addEventListener("input", () => {
  diagBtn.disabled = nameInput.value.trim().length === 0;
});
nameInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !diagBtn.disabled) {
    e.preventDefault();
    runDiagnosis();
  }
});

diagBtn.addEventListener("click", runDiagnosis);
againBtn.addEventListener("click", backToIntro);

function setScene(which) {
  sceneIntro.classList.toggle("active", which === "intro");
  sceneResult.classList.toggle("active", which === "result");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function backToIntro() {
  document.body.classList.remove("themed");
  document.documentElement.style.setProperty("--bg-from", "#f6f3ee");
  document.documentElement.style.setProperty("--bg-to", "#f6f3ee");
  document.documentElement.style.setProperty("--lucky", "#1a1a1a");
  document.documentElement.style.setProperty("--lucky-soft", "rgba(26,26,26,0.08)");
  setScene("intro");
  setTimeout(() => nameInput.focus(), 350);
}

function applyTheme(hex) {
  const soft = mix(hex, "#FFFFFF", 0.78);
  const deep = mix(hex, "#FFFFFF", 0.55);
  document.documentElement.style.setProperty("--bg-from", soft);
  document.documentElement.style.setProperty("--bg-to", deep);
  document.documentElement.style.setProperty("--lucky", hex);
  document.documentElement.style.setProperty("--lucky-soft", rgba(hex, 0.45));
  document.body.classList.add("themed");
}

function countUp(el, target, duration=900) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = String(Math.floor(eased * target) || (t>0?1:0));
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = String(target);
  }
  requestAnimationFrame(step);
}

function revealSequential(els, delayStep=120) {
  els.forEach((el, i) => {
    setTimeout(() => el.classList.add("show"), 80 + i * delayStep);
  });
}

function runDiagnosis() {
  const name = nameInput.value.trim();
  if (!name) return;

  const result = diagnose(name);

  // pre-fill text
  $("for-name").textContent = `For  ${name}`;
  $("today-stamp").textContent = formatToday();
  $("romaji").textContent = result.color.romaji;
  $("kanji").textContent = result.color.kanji;
  $("hex").textContent = result.color.hex.toUpperCase();
  $("meaning").textContent = result.color.meaning;
  $("advice").textContent = result.color.advice;
  $("lucky-item").textContent = result.item;
  $("seed-stamp").textContent = String(result.seed).slice(-4).padStart(4,"0");

  // palette
  const pal = $("palette");
  pal.innerHTML = "";
  result.color.matches.forEach((mkey, i) => {
    const c = COLORS.find(c => c.key === mkey);
    if (!c) return;
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.style.animationDelay = `${600 + i*140}ms`;
    chip.innerHTML = `<div class="dot" style="background:${c.hex}"></div><div class="chip-name">${c.kanji}</div>`;
    pal.appendChild(chip);
  });

  // stars
  const starsEl = $("lucky-stars");
  starsEl.innerHTML = "";
  for (let i = 0; i < 5; i++) {
    const s = document.createElement("span");
    s.textContent = i < result.stars ? "★" : "☆";
    s.style.color = i < result.stars ? result.color.hex : "var(--ink-faint)";
    s.style.animationDelay = `${800 + i * 110}ms`;
    starsEl.appendChild(s);
  }

  // theme & scene swap
  applyTheme(result.color.hex);
  setScene("result");

  // animations
  const reveals = Array.from(document.querySelectorAll("#scene-result .reveal"));
  reveals.forEach(r => r.classList.remove("show"));
  revealSequential(reveals, 100);

  // number countup with slight delay
  const numEl = $("lucky-number");
  numEl.textContent = "0";
  setTimeout(() => countUp(numEl, result.number, 850), 500);
}

// Focus name input on load
window.addEventListener("DOMContentLoaded", () => {
  nameInput.focus();
});
</script>
