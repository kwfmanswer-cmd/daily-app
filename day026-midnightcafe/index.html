<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0d18">
<title>まよなかカフェ — Midnight Café</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0d18}
body{font-family:'Outfit','Shippori Mincho',sans-serif;position:fixed;inset:0;
  touch-action:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none;color:#e8e2d4}
#scene{display:block;position:absolute;inset:0;width:100%;height:100%}

/* ambient top info */
#topinfo{position:absolute;top:calc(16px + env(safe-area-inset-top));left:20px;z-index:6;pointer-events:none;
  text-shadow:0 2px 10px rgba(0,0,0,.6)}
#clock{font-family:'Shippori Mincho',serif;font-size:26px;font-weight:500;letter-spacing:.06em;color:#f0e9d8;opacity:.92}
#stay{font-size:11px;letter-spacing:.18em;opacity:.5;margin-top:2px}
#timerTop{position:absolute;top:calc(18px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:6;font-family:'Shippori Mincho',serif;font-size:30px;letter-spacing:.08em;color:#ffd9a0;
  text-shadow:0 0 24px rgba(255,180,90,.5);opacity:0;transition:opacity .6s;pointer-events:none}
#timerTop.on{opacity:.95}

/* bottom dock */
#dock{position:absolute;left:0;right:0;bottom:0;z-index:8;display:flex;justify-content:center;
  padding:0 0 calc(18px + env(safe-area-inset-bottom));pointer-events:none;transition:opacity .8s}
.dockbar{display:flex;gap:6px;align-items:center;pointer-events:auto;
  background:rgba(20,18,28,.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,220,170,.12);border-radius:30px;padding:7px 10px;box-shadow:0 10px 40px rgba(0,0,0,.45)}
.dbtn{height:42px;border:none;border-radius:22px;cursor:pointer;background:transparent;color:#e8ddc8;
  display:flex;align-items:center;gap:7px;padding:0 14px;font-family:inherit;font-size:13px;letter-spacing:.08em;
  transition:background .2s,transform .15s}
.dbtn:active{transform:scale(.94)}
.dbtn.icon{width:42px;padding:0;justify-content:center}
.dbtn:hover{background:rgba(255,225,180,.08)}
.dbtn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.dbtn.active{background:rgba(255,200,130,.16);color:#ffd9a0}
.dbtn.muted{color:#7a7466}

/* sheet */
#scrim{position:fixed;inset:0;background:rgba(8,8,14,.5);backdrop-filter:blur(2px);z-index:14;opacity:0;
  pointer-events:none;transition:opacity .4s}
#scrim.open{opacity:1;pointer-events:auto}
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:15;max-width:560px;margin:0 auto;
  background:linear-gradient(180deg,#171520,#13111a);border-radius:26px 26px 0 0;
  border-top:1px solid rgba(255,220,170,.14);
  padding:8px 20px calc(24px + env(safe-area-inset-bottom));transform:translateY(115%);
  transition:transform .45s cubic-bezier(.3,1.3,.5,1);box-shadow:0 -16px 50px rgba(0,0,0,.55);max-height:86vh;overflow-y:auto}
#sheet.open{transform:translateY(0)}
.grip{width:42px;height:5px;border-radius:5px;background:rgba(255,230,190,.3);margin:8px auto 14px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{flex:1;text-align:center;padding:10px;border-radius:14px;cursor:pointer;font-size:13px;letter-spacing:.12em;
  background:rgba(255,255,255,.04);color:#b8b0a0;transition:background .2s,color .2s}
.tab.sel{background:rgba(255,200,130,.16);color:#ffd9a0}
.panel{display:none}.panel.show{display:block}

/* mixer rows */
.mrow{display:flex;align-items:center;gap:12px;padding:9px 2px}
.mrow .ic{width:34px;height:34px;border-radius:12px;display:grid;place-items:center;font-size:17px;
  background:rgba(255,255,255,.05);flex-shrink:0;transition:background .25s,box-shadow .25s}
.mrow.on .ic{background:rgba(255,190,110,.18);box-shadow:0 0 14px rgba(255,180,90,.25)}
.mrow .nm{width:74px;font-size:13px;color:#cfc6b4;flex-shrink:0;letter-spacing:.04em}
.mrow.on .nm{color:#f0e6d2}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:4px;
  background:rgba(255,255,255,.12);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:#ffd9a0;cursor:pointer;box-shadow:0 0 10px rgba(255,190,110,.6);transition:transform .15s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border:none;border-radius:50%;background:#ffd9a0;cursor:pointer}
.seclabel{font-size:11px;letter-spacing:.16em;color:#8a8270;margin:18px 0 8px;text-transform:uppercase}
.presets{display:flex;gap:8px;flex-wrap:wrap}
.pchip{padding:9px 14px;border-radius:20px;cursor:pointer;font-size:12.5px;letter-spacing:.04em;
  background:rgba(255,255,255,.05);color:#cfc6b4;border:1px solid transparent;transition:all .2s}
.pchip:active{transform:scale(.94)}
.pchip:hover{background:rgba(255,200,130,.12);border-color:rgba(255,200,130,.2)}

/* timer panel */
.timerwrap{text-align:center;padding:6px 0 2px}
.tring{position:relative;width:200px;height:200px;margin:6px auto 10px}
.tring svg{transform:rotate(-90deg)}
.tnum{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tnum .big{font-family:'Shippori Mincho',serif;font-size:46px;font-weight:500;letter-spacing:.04em;color:#f0e9d8}
.tnum .st{font-size:11px;letter-spacing:.22em;color:#8a8270;margin-top:4px}
.tpre{display:flex;gap:8px;justify-content:center;margin:10px 0 16px}
.tpre .pchip.sel{background:rgba(255,200,130,.2);color:#ffd9a0;border-color:rgba(255,200,130,.4)}
.tctrl{display:flex;gap:10px;justify-content:center}
.tctrl button{padding:12px 26px;border:none;border-radius:16px;cursor:pointer;font-family:inherit;font-size:14px;
  letter-spacing:.1em;background:rgba(255,200,130,.16);color:#ffd9a0;transition:transform .15s,background .2s}
.tctrl button.sec{background:rgba(255,255,255,.06);color:#cfc6b4}
.tctrl button:active{transform:scale(.94)}
.todrow{display:flex;gap:8px;justify-content:center;margin-top:6px}
.foot{text-align:center;font-size:11px;color:#6a6456;margin-top:20px;letter-spacing:.06em}

/* gentle intro overlay */
#intro{position:fixed;inset:0;z-index:30;background:#0a0d18;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:opacity 1.2s ease}
#intro.gone{opacity:0;pointer-events:none}
#intro .ttl{font-family:'Shippori Mincho',serif;font-size:clamp(26px,7vw,40px);letter-spacing:.22em;
  color:#f0e6d2;text-shadow:0 0 30px rgba(255,180,90,.3)}
#intro .sub{font-size:12px;letter-spacing:.4em;color:#8a8270;margin-top:18px;text-transform:uppercase}
#intro .en{font-size:13px;letter-spacing:.3em;color:#b89a6a;margin-top:40px;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.9}}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="topinfo">
  <div id="clock">--:--</div>
  <div id="stay">今夜の滞在 0分</div>
</div>
<div id="timerTop"></div>

<div id="dock">
  <div class="dockbar">
    <button class="dbtn" id="mixBtn"><svg viewBox="0 0 24 24"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>ミキサー</button>
    <button class="dbtn icon" id="beatBtn" aria-label="lo-fi"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></button>
    <button class="dbtn" id="timerBtn"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg>タイマー</button>
    <button class="dbtn icon" id="muteBtn" aria-label="mute"><svg viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg></button>
  </div>
</div>

<div id="scrim"></div>
<div id="sheet">
  <div class="grip"></div>
  <div class="tabs">
    <div class="tab sel" data-p="mixer">環境音</div>
    <div class="tab" data-p="timer">集中タイマー</div>
  </div>

  <div class="panel show" id="panel-mixer">
    <div class="seclabel">サウンド</div>
    <div id="mixerList"></div>
    <div class="mrow on" id="beatRow">
      <div class="ic">🎵</div><div class="nm">lo-fi</div>
      <input type="range" min="0" max="100" value="40" id="beatVol">
    </div>
    <div class="seclabel">プリセット</div>
    <div class="presets" id="presets"></div>
    <div class="seclabel">マスター音量</div>
    <div class="mrow"><div class="ic">🔊</div><div class="nm">全体</div>
      <input type="range" min="0" max="100" value="80" id="masterVol"></div>
  </div>

  <div class="panel" id="panel-timer">
    <div class="timerwrap">
      <div class="tring">
        <svg width="200" height="200" viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="6"/>
          <circle id="tprog" cx="100" cy="100" r="90" fill="none" stroke="#ffce8a" stroke-width="6"
            stroke-linecap="round" stroke-dasharray="565.5" stroke-dashoffset="565.5"
            style="filter:drop-shadow(0 0 8px rgba(255,190,110,.6))"/>
        </svg>
        <div class="tnum"><div class="big" id="tdisplay">25:00</div><div class="st" id="tstate">しゅうちゅう</div></div>
      </div>
      <div class="tpre" id="tpresets"></div>
      <div class="tctrl">
        <button id="tStart">はじめる</button>
        <button class="sec" id="tReset">リセット</button>
      </div>
    </div>
    <div class="seclabel" style="text-align:center">時間帯</div>
    <div class="todrow presets" id="todRow"></div>
    <div class="foot">Day 026 · まよなかカフェ — Midnight Café</div>
  </div>
</div>

<div id="intro">
  <div class="ttl">まよなかカフェ</div>
  <div class="sub">Midnight Café</div>
  <div class="en">tap to enter</div>
</div>

<script>
"use strict";
/* =====================================================================
   まよなかカフェ — Midnight Café  (Day 026)
   A cozy late-night café you can *be* in. Rain on the window, neon bleeding
   through, coffee steam, a sleeping cat, soft lo-fi beat, and a mixable
   wall of ambient sound — all synthesized, all looping seamlessly.
   ===================================================================== */
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const nowMs=()=>performance.now();

/* ---------------- persistence ---------------- */
const LS='midcafe_v1';
let store={ mix:{rain:.55,thunder:0,cafe:.25,fire:0,train:0,waves:0,wind:.15,crickets:0},
  beat:.4, master:.8, tod:'auto', totalSecs:0 };
try{const j=JSON.parse(localStorage.getItem(LS));if(j){store=Object.assign(store,j);store.mix=Object.assign({rain:.55,thunder:0,cafe:.25,fire:0,train:0,waves:0,wind:.15,crickets:0},j.mix||{});}}catch(e){}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{try{localStorage.setItem(LS,JSON.stringify(store));}catch(e){}},500);}

/* ===================================================================
   AUDIO ENGINE
   =================================================================== */
let AC=null, master=null, ambientBus=null, beatBus=null, beatLP=null, started=false, muted=false;
let whiteBuf=null, brownBuf=null;
const CH={};   // channel nodes

function makeNoise(sec, brown){
  const len=AC.sampleRate*sec, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  let last=0;
  for(let i=0;i<len;i++){
    const w=Math.random()*2-1;
    if(brown){ last=(last+0.02*w)/1.02; d[i]=last*3.2; }
    else d[i]=w;
  }
  return buf;
}
function noiseSrc(brown){
  const s=AC.createBufferSource();s.buffer=brown?brownBuf:whiteBuf;s.loop=true;s.start();return s;
}
function gain(v){const g=AC.createGain();g.gain.value=v;return g;}
function filt(type,freq,q){const f=AC.createBiquadFilter();f.type=type;f.frequency.value=freq;if(q!=null)f.Q.value=q;return f;}

function startAudio(){
  if(started)return; started=true;
  try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  whiteBuf=makeNoise(2,false); brownBuf=makeNoise(3,true);
  const lim=AC.createDynamicsCompressor();
  lim.threshold.value=-8;lim.ratio.value=6;lim.attack.value=.005;lim.release.value=.25;
  lim.connect(AC.destination);
  master=gain(muted?0:store.master); master.connect(lim);
  ambientBus=gain(1); ambientBus.connect(master);
  beatLP=filt('lowpass',3000,.7); beatBus=gain(store.beat); beatBus.connect(beatLP); beatLP.connect(master);

  buildChannels();
  applyMix();
  buildBeat();
  scheduleAmbient();
}

/* ---- ambient channels ---- */
function buildChannels(){
  // RAIN: layered filtered white noise
  {
    const g=gain(0);
    const hp=filt('highpass',420,.6), bp=filt('bandpass',1500,.5), lp=filt('lowpass',5200,.4);
    const body=noiseSrc(false), bg=gain(.5); body.connect(filt('lowpass',900,.3)).connect(bg);
    const s=noiseSrc(false); s.connect(hp).connect(bp).connect(lp).connect(g);
    bg.connect(g);
    // gentle life LFO
    const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=.08;
    const lg=gain(.12); lfo.connect(lg); const amp=gain(.88); lg.connect(amp.gain); lfo.start();
    g.connect(amp); amp.connect(ambientBus);
    CH.rain={g};
  }
  // THUNDER: event-based (handled in ambient tick), persistent quiet rumble bed
  { const g=gain(0); CH.thunder={g, bus:ambientBus}; }
  // CAFE murmur
  {
    const g=gain(0);
    const n=noiseSrc(true); n.connect(filt('lowpass',520,.4)).connect(g);
    const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=.13;
    const lg=gain(.35);lfo.connect(lg);const amp=gain(.65);lg.connect(amp.gain);lfo.start();
    g.connect(amp);amp.connect(ambientBus);
    CH.cafe={g};
  }
  // FIRE base hiss (crackles in tick)
  {
    const g=gain(0);
    const n=noiseSrc(true); n.connect(filt('lowpass',780,.5)).connect(filt('highpass',200,.3)).connect(g);
    g.connect(ambientBus);
    CH.fire={g};
  }
  // TRAIN low rumble (swell + clacks in tick)
  {
    const g=gain(0);
    const n=noiseSrc(true); n.connect(filt('lowpass',180,.6)).connect(g);
    const swell=gain(.15); g.connect(swell); swell.connect(ambientBus);
    CH.train={g, swell, passT:rand(20,45), passing:0, clackT:0};
  }
  // WAVES: white noise washing with slow LFO
  {
    const g=gain(0);
    const n=noiseSrc(false); n.connect(filt('lowpass',720,.4)).connect(filt('highpass',180,.3)).connect(g);
    const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=.11;
    const lg=gain(.5);lfo.connect(lg);const amp=gain(.5);lg.connect(amp.gain);lfo.start();
    g.connect(amp);amp.connect(ambientBus);
    CH.waves={g};
  }
  // WIND: bandpass swept
  {
    const g=gain(0);
    const bp=filt('bandpass',500,2.2);
    const n=noiseSrc(false); n.connect(bp).connect(g);
    const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=.06;
    const lg=gain(380);lfo.connect(lg);lg.connect(bp.frequency);lfo.start();
    const lfo2=AC.createOscillator();lfo2.type='sine';lfo2.frequency.value=.09;
    const lg2=gain(.4);lfo2.connect(lg2);const amp=gain(.6);lg2.connect(amp.gain);lfo2.start();
    g.connect(amp);amp.connect(ambientBus);
    CH.wind={g};
  }
  // CRICKETS / night (chirps in tick)
  { const g=gain(0); CH.crickets={g, chirpT:rand(.5,1.2), birdT:rand(20,45)}; }
}

function applyMix(){
  for(const id in store.mix){ if(CH[id]) CH[id].g.gain.setTargetAtTime(store.mix[id], AC.currentTime, .3); }
}

/* ---- one-shot ambient sounds ---- */
function thunder(){
  const t=AC.currentTime, vol=store.mix.thunder;
  // deep rumble: brown noise burst lowpassed, long decay
  const n=noiseSrc(true);
  const lp=filt('lowpass',130,.7), g=gain(0);
  n.connect(lp).connect(g); g.connect(ambientBus);
  g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(vol*1.1,t+rand(.3,.9));
  g.gain.exponentialRampToValueAtTime(.0001,t+rand(2.5,4));
  // sweep cutoff down
  lp.frequency.setValueAtTime(220,t); lp.frequency.exponentialRampToValueAtTime(70,t+3);
  setTimeout(()=>{try{n.stop();}catch(e){}}, 4500);
  // visual flash
  lightning();
}
function clink(){
  const t=AC.currentTime, vol=store.mix.cafe;
  const f=rand(1800,3200);
  [0,1].forEach((k)=>{
    const o=AC.createOscillator();o.type='sine';o.frequency.value=f*(k?2.7:1);
    const g=gain(0);o.connect(g);g.connect(ambientBus);
    g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol*(k?.06:.12),t+.002);
    g.gain.exponentialRampToValueAtTime(.0001,t+rand(.12,.25));
    o.start(t);o.stop(t+.3);
  });
}
function crackle(amt){
  const t=AC.currentTime, vol=store.mix.fire;
  const n=noiseSrc(false);
  const bp=filt('bandpass',rand(900,2600),rand(2,6)), g=gain(0);
  n.connect(bp).connect(g);g.connect(ambientBus);
  const peak=vol*amt*rand(.3,.9);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(Math.max(.0002,peak),t+.003);
  g.gain.exponentialRampToValueAtTime(.0001,t+rand(.03,.12));
  setTimeout(()=>{try{n.stop();}catch(e){}},200);
}
function trainClack(intensity){
  const t=AC.currentTime, vol=store.mix.train;
  const n=noiseSrc(false);
  const bp=filt('bandpass',rand(180,360),3), g=gain(0);
  n.connect(bp).connect(g);g.connect(ambientBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol*intensity*.5,t+.004);
  g.gain.exponentialRampToValueAtTime(.0001,t+.09);
  setTimeout(()=>{try{n.stop();}catch(e){}},150);
}
function chirp(){
  const t=AC.currentTime, vol=store.mix.crickets;
  const base=rand(4200,5200);
  for(let i=0;i<rand(2,4)|0;i++){
    const tt=t+i*0.03;
    const o=AC.createOscillator();o.type='triangle';o.frequency.value=base;
    const g=gain(0);o.connect(g);g.connect(ambientBus);
    g.gain.setValueAtTime(.0001,tt);g.gain.exponentialRampToValueAtTime(vol*.05,tt+.004);
    g.gain.exponentialRampToValueAtTime(.0001,tt+.03);
    o.start(tt);o.stop(tt+.05);
  }
}
function nightBird(){
  const t=AC.currentTime, vol=store.mix.crickets;
  const o=AC.createOscillator();o.type='sine';o.frequency.setValueAtTime(900,t);
  o.frequency.exponentialRampToValueAtTime(680,t+.4);
  const g=gain(0);o.connect(g);g.connect(ambientBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol*.12,t+.05);
  g.gain.exponentialRampToValueAtTime(.0001,t+.5);
  o.start(t);o.stop(t+.6);
}

/* ---- ambient stochastic scheduler ---- */
let ambTimer=null;
const evT={thunder:rand(14,34), clink:rand(4,11)};
function scheduleAmbient(){
  if(ambTimer)return;
  ambTimer=setInterval(()=>{
    const dt=.12;
    // thunder
    evT.thunder-=dt; if(evT.thunder<=0){ if(store.mix.thunder>.04)thunder(); evT.thunder=rand(13,40); }
    // cafe clink
    evT.clink-=dt; if(evT.clink<=0){ if(store.mix.cafe>.03)clink(); evT.clink=rand(4,12); }
    // fire crackle (probabilistic)
    if(store.mix.fire>.02 && Math.random()<store.mix.fire*0.7){ crackle(1); if(Math.random()<.3)crackle(.6); }
    // crickets
    const cr=CH.crickets;
    cr.chirpT-=dt; if(cr.chirpT<=0){ if(store.mix.crickets>.02)chirp(); cr.chirpT=rand(.7,1.5); }
    cr.birdT-=dt; if(cr.birdT<=0){ if(store.mix.crickets>.05 && Math.random()<.5)nightBird(); cr.birdT=rand(22,55); }
    // train pass
    const tr=CH.train;
    if(tr.passing>0){
      tr.passing-=dt;
      const p=1-Math.abs(tr.passing/6-1);           // 0..1..0 over 12s
      tr.swell.gain.setTargetAtTime(.15+clamp(p,0,1)*1.1, AC.currentTime, .2);
      tr.clackT-=dt; if(tr.clackT<=0){ if(store.mix.train>.03)trainClack(clamp(p,.2,1)); tr.clackT=rand(.36,.5); }
      if(tr.passing<=0){ tr.swell.gain.setTargetAtTime(.15,AC.currentTime,.5); tr.passT=rand(26,55); }
    } else {
      tr.passT-=dt; if(tr.passT<=0 && store.mix.train>.03){ tr.passing=12; tr.clackT=0; }
      else if(tr.passT<=0){ tr.passT=rand(26,55); }
    }
  },120);
}

/* ===================================================================
   LO-FI BEAT ENGINE
   =================================================================== */
const BPM=72, SECP16=60/BPM/4;
let beatOn=true, nextNote=0, step=0, beatTimer=null, vinylSrc=null, vinylGain=null;
const PROG=[ [60,64,67,71], [57,60,64,67], [62,65,69,72], [55,59,62,65] ]; // Cmaj7 Am7 Dm7 G7
const BASS=[48,45,50,43];
const mtof=m=>440*Math.pow(2,(m-69)/12);

function buildBeat(){
  // vinyl crackle bed
  vinylGain=gain(0);
  const n=noiseSrc(false);
  n.connect(filt('highpass',3000,.5)).connect(filt('lowpass',8000,.5)).connect(vinylGain);
  vinylGain.connect(beatBus);
  vinylGain.gain.value=.02;
  if(store.beat>0.001){ beatOn=true; startBeatClock(); }
  else beatOn=false;
}
function startBeatClock(){
  if(beatTimer)return;
  nextNote=AC.currentTime+0.1; step=0;
  beatTimer=setInterval(()=>{
    while(nextNote < AC.currentTime+0.12){
      scheduleStep(step, nextNote);
      const swing = (step%2===1)? SECP16*0.12 : 0;
      nextNote += SECP16;
      step=(step+1)%64;  // 4 bars * 16
    }
  },25);
}
function stopBeatClock(){ if(beatTimer){clearInterval(beatTimer);beatTimer=null;} }

function chordVoice(midis, t, dur){
  const cg=gain(0); const lp=filt('lowpass',2200,.5);
  cg.connect(lp); lp.connect(beatBus);
  cg.gain.setValueAtTime(.0001,t);
  cg.gain.linearRampToValueAtTime(.16,t+.09);
  cg.gain.setTargetAtTime(.10,t+.12,.3);
  cg.gain.exponentialRampToValueAtTime(.0001,t+dur);
  midis.forEach(m=>{
    const f=mtof(m);
    [[-4,'sine'],[4,'triangle']].forEach(([cent,wave])=>{
      const o=AC.createOscillator();o.type=wave;o.frequency.value=f*Math.pow(2,cent/1200);
      o.connect(cg);o.start(t);o.stop(t+dur+.1);
    });
  });
  // tremolo shimmer
  const lfo=AC.createOscillator();lfo.type='sine';lfo.frequency.value=4.5;
  const lg=gain(.02);lfo.connect(lg);lg.connect(cg.gain);lfo.start(t);lfo.stop(t+dur+.1);
}
function bassNote(midi,t,dur){
  const o=AC.createOscillator();o.type='sine';o.frequency.value=mtof(midi);
  const g=gain(0);o.connect(g);g.connect(beatBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.26,t+.02);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t);o.stop(t+dur+.05);
}
function kick(t){
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(140,t);o.frequency.exponentialRampToValueAtTime(48,t+.11);
  const g=gain(0);o.connect(g);g.connect(beatBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.7,t+.005);
  g.gain.exponentialRampToValueAtTime(.0001,t+.22);
  o.start(t);o.stop(t+.3);
}
function snare(t){
  const n=noiseSrc(false);
  const hp=filt('highpass',1400,.7), g=gain(0);
  n.connect(hp).connect(g);g.connect(beatBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.22,t+.004);
  g.gain.exponentialRampToValueAtTime(.0001,t+.16);
  const o=AC.createOscillator();o.type='triangle';o.frequency.value=180;
  const g2=gain(0);o.connect(g2);g2.connect(beatBus);
  g2.gain.setValueAtTime(.0001,t);g2.gain.exponentialRampToValueAtTime(.12,t+.004);
  g2.gain.exponentialRampToValueAtTime(.0001,t+.1);
  o.start(t);o.stop(t+.15);
  setTimeout(()=>{try{n.stop();}catch(e){}},250);
}
function hat(t,v){
  const n=noiseSrc(false);
  const hp=filt('highpass',7000,.6), g=gain(0);
  n.connect(hp).connect(g);g.connect(beatBus);
  g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(v,t+.003);
  g.gain.exponentialRampToValueAtTime(.0001,t+.05);
  setTimeout(()=>{try{n.stop();}catch(e){}},120);
}
function scheduleStep(s, t){
  const bar=Math.floor(s/16)%4, st=s%16;
  if(st===0){ chordVoice(PROG[bar], t, SECP16*15); bassNote(BASS[bar],t,SECP16*3.5); }
  if(st===8){ chordVoice(PROG[bar].map(m=>m), t, SECP16*7); bassNote(BASS[bar]+7,t,SECP16*2.5); }
  // drums (laid-back)
  if(st===0||st===10) kick(t);
  if(st===4||st===12) snare(t);
  if(st===2||st===6||st===10||st===14) hat(t, .05);
  else if(Math.random()<.15) hat(t,.02);
}
function setBeat(v){
  store.beat=v;
  if(!started){return;}
  beatBus.gain.setTargetAtTime(v,AC.currentTime,.2);
  if(v>0.001){ if(!beatTimer)startBeatClock(); }
  else { stopBeatClock(); }
}

/* ===================================================================
   VISUAL SCENE
   =================================================================== */
const cv=document.getElementById('scene'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=innerWidth;H=innerHeight;
  cv.width=W*DPR|0;cv.height=H*DPR|0;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  initScene();
}
// time-of-day palettes
const TOD={
  midnight:{sky:[[8,11,24],[16,12,28]], dark:.5, warm:1, neon:1},
  dawn:    {sky:[[40,46,78],[150,110,96]], dark:.16, warm:.7, neon:.55},
  evening: {sky:[[24,20,46],[48,30,52]], dark:.3, warm:.95, neon:.85},
};
let curSky=[[8,11,24],[16,12,28]], curDark=.5, curWarm=1, curNeon=1;
function todTarget(){
  let key=store.tod;
  if(key==='auto'){
    const h=new Date().getHours();
    key = (h>=22||h<5)?'midnight' : (h>=5&&h<8)?'dawn' : 'evening';
  }
  return TOD[key]||TOD.midnight;
}

let bokeh=[], rainOut=[], glassDrops=[], runners=[], steam=[], grainCanvas=null, cat={};
let car=null, carT=rand(8,20);
function initScene(){
  // bokeh neon lights outside
  bokeh=[];
  const cols=[[255,120,160],[120,200,255],[255,180,90],[180,140,255],[120,255,200],[255,90,120]];
  const n=Math.round(clamp(W/55,12,30));
  for(let i=0;i<n;i++){
    bokeh.push({x:rand(0,W),y:rand(H*0.18,H*0.66),r:rand(8,34),
      col:cols[(Math.random()*cols.length)|0], a:rand(.25,.7), ph:rand(0,7), drift:rand(.02,.08)});
  }
  // outside falling rain
  rainOut=[];
  const rn=Math.round(clamp(W/8,60,160));
  for(let i=0;i<rn;i++) rainOut.push({x:rand(0,W),y:rand(0,H),len:rand(8,20),sp:rand(7,13)});
  // glass static droplets
  glassDrops=[];
  const gn=Math.round(clamp(W/14,40,90));
  for(let i=0;i<gn;i++) glassDrops.push({x:rand(0,W),y:rand(0,H*0.8),r:rand(1.2,3.4)});
  runners=[];
  steam=[];
  // grain tile
  grainCanvas=document.createElement('canvas');grainCanvas.width=grainCanvas.height=120;
  const gx=grainCanvas.getContext('2d'), img=gx.createImageData(120,120);
  for(let i=0;i<img.data.length;i+=4){const v=Math.random()*255;img.data[i]=img.data[i+1]=img.data[i+2]=v;img.data[i+3]=255;}
  gx.putImageData(img,0,0);
  // cat geometry (bottom-right ledge)
  cat={x:W*0.80, y:H*0.9, s:clamp(Math.min(W,H)/520,.7,1.5), breath:0};
  renderCityCache();
}

// droplet bead sprite
let beadSprite=null;
function makeBead(){
  const S=48,c=document.createElement('canvas');c.width=c.height=S;const x=c.getContext('2d');
  const g=x.createRadialGradient(S*0.4,S*0.35,1,S*0.5,S*0.5,S*0.5);
  g.addColorStop(0,'rgba(220,235,255,0.9)');
  g.addColorStop(.3,'rgba(150,180,220,0.45)');
  g.addColorStop(.7,'rgba(80,100,140,0.18)');
  g.addColorStop(1,'rgba(40,50,80,0)');
  x.fillStyle=g;x.beginPath();x.arc(S/2,S/2,S/2,0,7);x.fill();
  // bright top highlight
  x.fillStyle='rgba(255,255,255,0.8)';x.beginPath();x.arc(S*0.4,S*0.32,S*0.1,0,7);x.fill();
  beadSprite=c;
}

let lightFlash=0;
function lightning(){ lightFlash=1; setTimeout(()=>{lightFlash=0.7;},80); setTimeout(()=>{lightFlash=Math.random()<.6?1:0.7;},150); }

let lastSteam=0;
function updateScene(dt,t){
  // tod lerp
  const tg=todTarget();
  for(let i=0;i<2;i++)for(let c=0;c<3;c++)curSky[i][c]=lerp(curSky[i][c],tg.sky[i][c],0.03*dt);
  curDark=lerp(curDark,tg.dark,0.03*dt); curWarm=lerp(curWarm,tg.warm,0.03*dt); curNeon=lerp(curNeon,tg.neon,0.03*dt);
  lightFlash*=Math.pow(0.86,dt);

  // outside rain
  for(const r of rainOut){ r.y+=r.sp*dt*(0.6+store.mix.rain*0.8); r.x-=r.sp*0.25*dt; if(r.y>H){r.y=-10;r.x=rand(0,W);} }
  // glass runners: occasionally spawn from big static drops
  if(Math.random()<0.05*(0.4+store.mix.rain)) {
    runners.push({x:rand(0,W), y:rand(-20,H*0.3), r:rand(2.2,4.5), sp:rand(0.4,1.2), wob:rand(0,7)});
  }
  for(let i=runners.length-1;i>=0;i--){
    const r=runners[i];
    r.sp+=0.04*dt; r.y+=r.sp*dt; r.wob+=0.2*dt;
    r.x+=Math.sin(r.wob)*0.3;
    if(Math.random()<0.04) glassDrops.push({x:r.x+rand(-2,2), y:r.y-rand(2,8), r:r.r*rand(.4,.7)});
    if(r.y>H+10) runners.splice(i,1);
  }
  if(runners.length>70) runners.splice(0, runners.length-70);
  // steam from cup
  lastSteam+=dt;
  const cupX=W*0.30, cupY=H*0.9;
  if(lastSteam>4){ lastSteam=0; steam.push({x:cupX+rand(-4,4), y:cupY-14, vy:rand(-.5,-.3), life:0, max:rand(2.6,4), sway:rand(0,7), w:rand(8,16)}); }
  for(let i=steam.length-1;i>=0;i--){
    const s=steam[i]; s.life+=dt/60; s.y+=s.vy*dt; s.sway+=0.03*dt; s.x+=Math.sin(s.sway)*0.3;
    if(s.life>=s.max) steam.splice(i,1);
  }
  // cat breathing
  cat.breath+=0.03*dt;
  // car
  carT-=dt/60; if(carT<=0){ car={x:-40, y:H*rand(0.40,0.6), sp:rand(6,11), col:Math.random()<.5?[255,220,180]:[255,150,150]}; carT=rand(12,32); }
  if(car){ car.x+=car.sp*dt; if(car.x>W+40) car=null; }
}

function drawScene(t){
  // sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgb(${curSky[0][0]|0},${curSky[0][1]|0},${curSky[0][2]|0})`);
  g.addColorStop(1,`rgb(${curSky[1][0]|0},${curSky[1][1]|0},${curSky[1][2]|0})`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // distant city silhouette (cached)
  if(cityCanvas) ctx.drawImage(cityCanvas,0,0,W,H);

  // bokeh neon (outside, soft)
  ctx.globalCompositeOperation='lighter';
  for(const b of bokeh){
    const fl=0.7+0.3*Math.sin(t*1.3+b.ph);
    const a=b.a*fl*curNeon*(1+lightFlash*0.5);
    b.x+=b.drift; if(b.x>W+40)b.x=-40;
    const rg=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    rg.addColorStop(0,`rgba(${b.col[0]},${b.col[1]},${b.col[2]},${a})`);
    rg.addColorStop(1,`rgba(${b.col[0]},${b.col[1]},${b.col[2]},0)`);
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();
  }
  // car light streak
  if(car){
    const rg=ctx.createRadialGradient(car.x,car.y,0,car.x,car.y,40);
    rg.addColorStop(0,`rgba(${car.col[0]},${car.col[1]},${car.col[2]},${0.5*curNeon})`);
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.ellipse(car.x,car.y,40,8,0,0,7);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // outside falling rain (faint)
  ctx.strokeStyle=`rgba(170,190,230,${0.12+store.mix.rain*0.12})`;ctx.lineWidth=1;
  ctx.beginPath();
  for(const r of rainOut){ ctx.moveTo(r.x,r.y); ctx.lineTo(r.x-2,r.y+r.len); }
  ctx.stroke();

  // ---- glass with rain droplets ----
  // subtle cool glass tint over outside
  ctx.fillStyle='rgba(20,30,55,0.12)';ctx.fillRect(0,0,W,H*0.84);
  // static droplets
  if(beadSprite){
    for(const d of glassDrops){
      const s=d.r*4;
      ctx.drawImage(beadSprite, d.x-s/2, d.y-s/2, s, s);
    }
    // runners with streak
    ctx.strokeStyle='rgba(150,180,220,0.10)';ctx.lineWidth=2;
    for(const r of runners){
      ctx.beginPath();ctx.moveTo(r.x,r.y-18);ctx.lineTo(r.x,r.y);ctx.stroke();
      const s=r.r*4.5; ctx.drawImage(beadSprite, r.x-s/2, r.y-s/2, s, s);
    }
  }
  // drops slowly shrink/recycle
  for(const d of glassDrops){ d.r-=0.0009; if(d.r<0.6){d.x=rand(0,W);d.y=rand(0,H*0.5);d.r=rand(1.2,3.2);} }

  // ---- window frame (foreground) ----
  drawWindowFrame();

  // ---- interior warm light glow (counter, left) ----
  ctx.globalCompositeOperation='lighter';
  const lampX=W*0.12, lampY=H*0.72, flick=0.85+0.15*Math.sin(t*7.0)*Math.sin(t*3.1);
  const lg=ctx.createRadialGradient(lampX,lampY,0,lampX,lampY,Math.max(W,H)*0.5);
  const wa=0.22*curWarm*flick;
  lg.addColorStop(0,`rgba(255,180,90,${wa})`);
  lg.addColorStop(.5,`rgba(255,150,70,${wa*0.4})`);
  lg.addColorStop(1,'rgba(255,150,70,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';

  // ---- interior foreground: table ledge ----
  drawInterior(t);

  // ---- steam ----
  ctx.globalCompositeOperation='lighter';
  for(const s of steam){
    const p=s.life/s.max;
    const a=Math.sin(p*Math.PI)*0.16;
    const rg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.w*(0.6+p));
    rg.addColorStop(0,`rgba(255,240,220,${a})`);
    rg.addColorStop(1,'rgba(255,240,220,0)');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(s.x,s.y,s.w*(0.6+p),0,7);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // ---- overlays ----
  // lightning flash
  if(lightFlash>0.01){
    ctx.fillStyle=`rgba(180,200,255,${lightFlash*0.22})`;ctx.fillRect(0,0,W,H);
  }
  // vignette
  const vg=ctx.createRadialGradient(W/2,H*0.45,Math.min(W,H)*0.3,W/2,H*0.5,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,`rgba(0,0,0,${0.45+curDark*0.4})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  // overall darkness tint by tod
  ctx.fillStyle=`rgba(6,8,18,${curDark*0.4})`;ctx.fillRect(0,0,W,H);
  // film grain
  if(grainCanvas){
    ctx.globalAlpha=0.045;ctx.globalCompositeOperation='overlay';
    const ox=(Math.random()*120)|0, oy=(Math.random()*120)|0;
    for(let x=-ox;x<W;x+=120)for(let y=-oy;y<H;y+=120)ctx.drawImage(grainCanvas,x,y);
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  }
}

let cityCanvas=null;
function renderCityCache(){
  const tg=todTarget();
  cityCanvas=document.createElement('canvas');cityCanvas.width=Math.max(1,W);cityCanvas.height=Math.max(1,H);
  const x2=cityCanvas.getContext('2d');
  x2.fillStyle=`rgba(${(tg.sky[1][0]*0.6)|0},${(tg.sky[1][1]*0.6)|0},${(tg.sky[1][2]*0.7)|0},0.9)`;
  const base=H*0.66;
  let x=0,i=0;
  x2.beginPath();x2.moveTo(0,H);
  while(x<W){
    const bw=30+((Math.sin(i*53.13)+1)*0.5)*70;
    const bh=base - ((Math.sin(i*17.7)+1)*0.5)*H*0.32 - H*0.05;
    x2.lineTo(x,bh);x2.lineTo(x+bw,bh);
    x+=bw;i++;
  }
  x2.lineTo(W,H);x2.closePath();x2.fill();
  // lit windows
  x2.fillStyle=`rgba(255,200,120,${0.5*tg.neon})`;
  x=0;i=0;
  while(x<W){
    const bw=30+((Math.sin(i*53.13)+1)*0.5)*70;
    const bh=base - ((Math.sin(i*17.7)+1)*0.5)*H*0.32 - H*0.05;
    for(let wy=bh+10;wy<base;wy+=14){
      for(let wx=x+5;wx<x+bw-5;wx+=12){
        if(((Math.sin(wx*12.9+wy*7.1))*43758.5)%1>0.72) x2.fillRect(wx,wy,4,6);
      }
    }
    x+=bw;i++;
  }
}

function drawWindowFrame(){
  const fr= `rgba(28,22,20,0.96)`;
  ctx.strokeStyle=fr;
  const t=Math.max(10,W*0.018);
  ctx.lineWidth=t;
  // outer
  ctx.strokeRect(t/2, t/2, W-t, H*0.84-t);
  // mullions
  ctx.lineWidth=t*0.7;
  ctx.beginPath();ctx.moveTo(W*0.5,0);ctx.lineTo(W*0.5,H*0.84);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H*0.40);ctx.lineTo(W,H*0.40);ctx.stroke();
  // warm rim light on frame
  ctx.strokeStyle=`rgba(255,170,90,${0.10*curWarm})`;ctx.lineWidth=2;
  ctx.strokeRect(t, t, W-t*2, H*0.84-t*2);
}

function drawInterior(t){
  // table / ledge
  const ly=H*0.84;
  const grd=ctx.createLinearGradient(0,ly,0,H);
  grd.addColorStop(0,'#1c140e');grd.addColorStop(1,'#0e0a08');
  ctx.fillStyle=grd;ctx.fillRect(0,ly,W,H-ly);
  // ledge top highlight
  ctx.fillStyle='rgba(255,170,90,0.06)';ctx.fillRect(0,ly,W,3);

  // coffee cup (left)
  drawCup(W*0.30, H*0.9, clamp(Math.min(W,H)/16,28,60));
  // a little plant (right of cup) silhouette
  drawPlant(W*0.55, ly+4, clamp(Math.min(W,H)/14,26,52));
  // cat (right)
  drawCat();
}

function drawCup(cx, cy, r){
  ctx.save();
  // saucer
  ctx.fillStyle='#2a201a';
  ctx.beginPath();ctx.ellipse(cx,cy+r*0.5,r*1.2,r*0.28,0,0,7);ctx.fill();
  // cup body
  const g=ctx.createLinearGradient(cx-r,0,cx+r,0);
  g.addColorStop(0,'#3a2c22');g.addColorStop(.5,'#544030');g.addColorStop(1,'#2c2018');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.moveTo(cx-r*0.75,cy-r*0.4);
  ctx.lineTo(cx+r*0.75,cy-r*0.4);
  ctx.lineTo(cx+r*0.6,cy+r*0.35);
  ctx.quadraticCurveTo(cx,cy+r*0.55,cx-r*0.6,cy+r*0.35);
  ctx.closePath();ctx.fill();
  // handle
  ctx.strokeStyle='#4a382a';ctx.lineWidth=r*0.16;
  ctx.beginPath();ctx.arc(cx+r*0.8,cy-r*0.02,r*0.3,-1.1,1.1);ctx.stroke();
  // coffee surface
  ctx.fillStyle='#1a0f08';
  ctx.beginPath();ctx.ellipse(cx,cy-r*0.4,r*0.72,r*0.16,0,0,7);ctx.fill();
  ctx.fillStyle='rgba(120,70,40,0.5)';
  ctx.beginPath();ctx.ellipse(cx-r*0.15,cy-r*0.42,r*0.3,r*0.06,0,0,7);ctx.fill();
  // warm rim
  ctx.strokeStyle='rgba(255,180,100,0.25)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-r*0.75,cy-r*0.4);ctx.lineTo(cx+r*0.75,cy-r*0.4);ctx.stroke();
  ctx.restore();
}

function drawPlant(cx, baseY, r){
  ctx.save();
  // pot
  ctx.fillStyle='#241a14';
  ctx.beginPath();
  ctx.moveTo(cx-r*0.4,baseY);ctx.lineTo(cx+r*0.4,baseY);ctx.lineTo(cx+r*0.3,baseY+r*0.5);
  ctx.lineTo(cx-r*0.3,baseY+r*0.5);ctx.closePath();ctx.fill();
  // leaves (silhouette with faint warm edge)
  ctx.fillStyle='#16241a';
  for(let i=0;i<5;i++){
    const a=-Math.PI/2 + (i-2)*0.5;
    const lx=cx+Math.cos(a)*r*0.1, ly=baseY;
    ctx.save();ctx.translate(lx,ly);ctx.rotate(a+Math.PI/2);
    ctx.beginPath();ctx.ellipse(0,-r*0.6,r*0.16,r*0.62,0,0,7);ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle='rgba(120,200,140,0.10)';ctx.lineWidth=1;
  ctx.restore();
}

function drawCat(){
  const c=cat, s=c.s;
  const breathe=1+Math.sin(c.breath)*0.02;
  ctx.save();
  ctx.translate(c.x, H*0.9);
  ctx.scale(s, s*breathe);
  // body (curled)
  ctx.fillStyle='#15110f';
  ctx.beginPath();ctx.ellipse(0,0,70,40,0,0,7);ctx.fill();
  // tail wrapping
  ctx.strokeStyle='#15110f';ctx.lineWidth=20;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(40,4,42,-0.3,1.5);ctx.stroke();
  // head
  ctx.fillStyle='#1a1512';
  ctx.beginPath();ctx.arc(-46,-6,26,0,7);ctx.fill();
  // ears
  ctx.beginPath();ctx.moveTo(-62,-22);ctx.lineTo(-56,-44);ctx.lineTo(-44,-26);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(-40,-26);ctx.lineTo(-30,-44);ctx.lineTo(-26,-22);ctx.closePath();ctx.fill();
  // warm rim light (from lamp left)
  ctx.strokeStyle='rgba(255,170,90,0.18)';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(0,0,70,40,0,Math.PI*0.9,Math.PI*1.7);ctx.stroke();
  ctx.beginPath();ctx.arc(-46,-6,26,Math.PI*0.8,Math.PI*1.5);ctx.stroke();
  ctx.restore();
}

/* ===================================================================
   MAIN LOOP
   =================================================================== */
makeBead();
resize();addEventListener('resize',resize);

let last=nowMs(), running=true;
function frame(tn){
  if(!running)return;
  const dt=clamp((tn-last)/16.67,0,3); last=tn;
  const t=tn/1000;
  updateScene(dt,t);
  drawScene(t);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// pause rendering when hidden (keep audio)
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ running=false; flushStay(); }
  else { running=true; last=nowMs(); requestAnimationFrame(frame); }
});

/* ===================================================================
   STAY TIME + CLOCK
   =================================================================== */
let sessionStart=nowMs();
function flushStay(){ store.totalSecs += Math.round((nowMs()-sessionStart)/1000); sessionStart=nowMs(); save(); }
let tonightSecs= 0;
setInterval(()=>{
  tonightSecs+=1;
  const m=Math.floor(tonightSecs/60);
  document.getElementById('stay').textContent = m<60? `今夜の滞在 ${m}分` : `今夜の滞在 ${Math.floor(m/60)}時間${m%60}分`;
},1000);
function updateClock(){
  const d=new Date();
  document.getElementById('clock').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
updateClock();setInterval(updateClock,10000);
addEventListener('pagehide',flushStay);
addEventListener('beforeunload',()=>{ store.totalSecs+=Math.round((nowMs()-sessionStart)/1000); try{localStorage.setItem(LS,JSON.stringify(store));}catch(e){} });

/* ===================================================================
   UI WIRING
   =================================================================== */
const CHANNELS=[
  {id:'rain',label:'雨',icon:'🌧️'},{id:'thunder',label:'雷',icon:'⚡'},
  {id:'cafe',label:'ざわめき',icon:'☕'},{id:'fire',label:'焚き火',icon:'🔥'},
  {id:'train',label:'電車',icon:'🚃'},{id:'waves',label:'波',icon:'🌊'},
  {id:'wind',label:'風',icon:'🍃'},{id:'crickets',label:'虫の声',icon:'🦗'},
];
const PRESETS=[
  {n:'しずかな雨', mix:{rain:.6,cafe:.2}, beat:.35},
  {n:'焚き火の夜', mix:{fire:.6,rain:.25,wind:.2}, beat:.3},
  {n:'深夜の電車', mix:{train:.5,rain:.35,cafe:.15}, beat:.3},
  {n:'海辺の夜', mix:{waves:.6,wind:.3,crickets:.25}, beat:.25},
  {n:'雨と雷', mix:{rain:.7,thunder:.5}, beat:.2},
  {n:'カフェ作業', mix:{cafe:.5,rain:.3}, beat:.55},
];

const mixerList=document.getElementById('mixerList');
const rowEls={};
CHANNELS.forEach(c=>{
  const row=document.createElement('div');row.className='mrow'+(store.mix[c.id]>0?' on':'');
  row.innerHTML=`<div class="ic">${c.icon}</div><div class="nm">${c.label}</div>
    <input type="range" min="0" max="100" value="${Math.round(store.mix[c.id]*100)}">`;
  const slider=row.querySelector('input');
  slider.addEventListener('input',()=>{
    const v=slider.value/100; store.mix[c.id]=v;
    row.classList.toggle('on', v>0);
    if(started && CH[c.id]) CH[c.id].g.gain.setTargetAtTime(v,AC.currentTime,.2);
    save();
  });
  // tap icon to quick toggle
  row.querySelector('.ic').addEventListener('click',()=>{
    const v = store.mix[c.id]>0 ? 0 : 0.5;
    slider.value=v*100; store.mix[c.id]=v; row.classList.toggle('on',v>0);
    if(started && CH[c.id]) CH[c.id].g.gain.setTargetAtTime(v,AC.currentTime,.2);
    save();
  });
  mixerList.appendChild(row);
  rowEls[c.id]={row,slider};
});

const beatVol=document.getElementById('beatVol'), beatRow=document.getElementById('beatRow');
beatVol.value=Math.round(store.beat*100); beatRow.classList.toggle('on',store.beat>0);
beatVol.addEventListener('input',()=>{ const v=beatVol.value/100; setBeat(v); beatRow.classList.toggle('on',v>0); save(); updateBeatBtn(); });

const masterVol=document.getElementById('masterVol');
masterVol.value=Math.round(store.master*100);
masterVol.addEventListener('input',()=>{ store.master=masterVol.value/100; if(started&&!muted)master.gain.setTargetAtTime(store.master,AC.currentTime,.1); save(); });

// presets
const presetsEl=document.getElementById('presets');
PRESETS.forEach(p=>{
  const chip=document.createElement('div');chip.className='pchip';chip.textContent=p.n;
  chip.addEventListener('click',()=>applyPreset(p));
  presetsEl.appendChild(chip);
});
function applyPreset(p){
  for(const c of CHANNELS){ const v=p.mix[c.id]||0; store.mix[c.id]=v;
    rowEls[c.id].slider.value=v*100; rowEls[c.id].row.classList.toggle('on',v>0);
    if(started && CH[c.id]) CH[c.id].g.gain.setTargetAtTime(v,AC.currentTime,.4);
  }
  setBeat(p.beat); beatVol.value=p.beat*100; beatRow.classList.toggle('on',p.beat>0); updateBeatBtn();
  save();
}

/* dock buttons */
const scrim=document.getElementById('scrim'), sheet=document.getElementById('sheet');
function openSheet(panel){
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.toggle('sel',tb.dataset.p===panel));
  document.querySelectorAll('.panel').forEach(pp=>pp.classList.toggle('show',pp.id==='panel-'+panel));
  scrim.classList.add('open');sheet.classList.add('open');
}
function closeSheet(){scrim.classList.remove('open');sheet.classList.remove('open');}
document.getElementById('mixBtn').addEventListener('click',()=>openSheet('mixer'));
document.getElementById('timerBtn').addEventListener('click',()=>openSheet('timer'));
scrim.addEventListener('click',closeSheet);
document.querySelectorAll('.tab').forEach(tb=>tb.addEventListener('click',()=>openSheet(tb.dataset.p)));
// swipe down close
let shY=null;
sheet.addEventListener('pointerdown',e=>{ if(e.target.closest('input,.pchip,.tab,button,.ic'))return; shY=e.clientY;});
sheet.addEventListener('pointermove',e=>{ if(shY==null)return; const d=e.clientY-shY; if(d>0)sheet.style.transform=`translateY(${d}px)`;});
sheet.addEventListener('pointerup',e=>{ if(shY==null)return; const d=e.clientY-shY; sheet.style.transform=''; if(d>90)closeSheet(); shY=null;});

const beatBtn=document.getElementById('beatBtn');
function updateBeatBtn(){ beatBtn.classList.toggle('active', store.beat>0.001); }
beatBtn.addEventListener('click',()=>{
  if(store.beat>0.001){ beatBtn.dataset.prev=store.beat; setBeat(0); beatVol.value=0; beatRow.classList.remove('on'); }
  else { const v=parseFloat(beatBtn.dataset.prev)||0.4; setBeat(v); beatVol.value=v*100; beatRow.classList.add('on'); }
  updateBeatBtn(); save();
});

const muteBtn=document.getElementById('muteBtn');
muteBtn.addEventListener('click',()=>{
  muted=!muted; muteBtn.classList.toggle('muted',muted);
  if(started)master.gain.setTargetAtTime(muted?0:store.master,AC.currentTime,.1);
});

/* timer */
const TPRE=[15,25,45,60];
let timerTotal=25*60, timerLeft=25*60, timerRunning=false, timerIntv=null;
const tDisplay=document.getElementById('tdisplay'), tProg=document.getElementById('tprog'),
      tState=document.getElementById('tstate'), timerTop=document.getElementById('timerTop');
const tpresetsEl=document.getElementById('tpresets');
TPRE.forEach(m=>{
  const chip=document.createElement('div');chip.className='pchip'+(m===25?' sel':'');chip.textContent=m+'分';
  chip.addEventListener('click',()=>{
    if(timerRunning)return;
    tpresetsEl.querySelectorAll('.pchip').forEach(x=>x.classList.remove('sel'));chip.classList.add('sel');
    timerTotal=timerLeft=m*60; renderTimer();
  });
  tpresetsEl.appendChild(chip);
});
function fmtT(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function renderTimer(){
  tDisplay.textContent=fmtT(timerLeft);
  const frac=timerTotal>0?timerLeft/timerTotal:0;
  tProg.style.strokeDashoffset=565.5*(1-frac);
  if(timerRunning){ timerTop.textContent=fmtT(timerLeft); timerTop.classList.add('on'); }
  else timerTop.classList.remove('on');
}
document.getElementById('tStart').addEventListener('click',function(){
  if(!started){enterCafe();}
  if(timerRunning){ pauseTimer(); this.textContent='つづける'; tState.textContent='きゅうけい'; }
  else { startTimer(); this.textContent='とめる'; tState.textContent='しゅうちゅう'; }
});
document.getElementById('tReset').addEventListener('click',()=>{
  pauseTimer(); timerLeft=timerTotal; document.getElementById('tStart').textContent='はじめる';
  tState.textContent='しゅうちゅう'; renderTimer();
});
function startTimer(){
  timerRunning=true; renderTimer();
  timerIntv=setInterval(()=>{
    timerLeft--; if(timerLeft<=0){ timerLeft=0; timerDone(); }
    renderTimer();
  },1000);
}
function pauseTimer(){ timerRunning=false; if(timerIntv){clearInterval(timerIntv);timerIntv=null;} renderTimer(); }
function timerDone(){
  pauseTimer(); document.getElementById('tStart').textContent='はじめる';
  tState.textContent='おつかれさま'; chime();
  timerTop.textContent='おつかれさま'; timerTop.classList.add('on');
  setTimeout(()=>{ timerTop.classList.remove('on'); timerLeft=timerTotal; renderTimer(); }, 6000);
}
function chime(){
  if(!started||!AC) return;
  const t=AC.currentTime; const notes=[523.25,659.25,783.99];
  notes.forEach((f,i)=>{
    const o=AC.createOscillator();o.type='sine';o.frequency.value=f;
    const g=gain(0);o.connect(g);g.connect(master);
    const tt=t+i*0.28;
    g.gain.setValueAtTime(.0001,tt);g.gain.exponentialRampToValueAtTime(.18,tt+.03);
    g.gain.exponentialRampToValueAtTime(.0001,tt+1.6);
    o.start(tt);o.stop(tt+1.8);
  });
}
renderTimer();

/* time of day */
const TODS=[{k:'auto',n:'自動'},{k:'midnight',n:'真夜中'},{k:'evening',n:'夕暮れ'},{k:'dawn',n:'明け方'}];
const todRow=document.getElementById('todRow');
TODS.forEach(o=>{
  const chip=document.createElement('div');chip.className='pchip'+(store.tod===o.k?' sel':'');chip.textContent=o.n;
  chip.addEventListener('click',()=>{ store.tod=o.k; todRow.querySelectorAll('.pchip').forEach(x=>x.classList.remove('sel'));chip.classList.add('sel'); renderCityCache(); save(); });
  todRow.appendChild(chip);
});

/* intro / enter */
const intro=document.getElementById('intro');
let entered=false;
function enterCafe(){
  if(entered)return; entered=true;
  startAudio();
  if(AC&&AC.state==='suspended')AC.resume();
  updateBeatBtn();
  intro.classList.add('gone');
  setTimeout(()=>intro.style.display='none',1300);
}
intro.addEventListener('click',enterCafe);
// also enter on first dock interaction
['mixBtn','timerBtn','beatBtn','muteBtn'].forEach(id=>document.getElementById(id).addEventListener('click',()=>{ if(!entered)enterCafe(); },true));

/* prevent zoom gestures */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
addEventListener('contextmenu',e=>e.preventDefault());
</script>
