<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7f6f3">
<title>シキ - 色を見抜け</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f6f3;
  --panel:#ffffff;
  --ink:#1d1d22;
  --sub:#8a8a96;
  --line:#e9e7e2;
  --accent:#22c55e;
  --accent-soft:rgba(34,197,94,.16);
  --bad:#ff4d57;
  --gold:#ffb938;
  --shadow:0 16px 40px rgba(20,20,30,.10);
  --shadow-sm:0 6px 18px rgba(20,20,30,.08);
  --cell-shadow:0 4px 10px rgba(20,20,30,.10);
}
html[data-theme="dark"]{
  --bg:#15151a;
  --panel:#1e1e25;
  --ink:#f2f2f5;
  --sub:#8b8b97;
  --line:#2c2c34;
  --accent-soft:rgba(34,197,94,.18);
  --shadow:0 16px 44px rgba(0,0,0,.5);
  --shadow-sm:0 6px 20px rgba(0,0,0,.4);
  --cell-shadow:0 4px 12px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:"Zen Kaku Gothic New","Outfit",system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  overflow:hidden;
  transition:background .4s ease,color .4s ease;
  user-select:none;-webkit-user-select:none;
  position:fixed;inset:0;width:100%;
}
#app{
  height:100%;height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
}
.screen{
  width:100%;max-width:480px;
  display:none;flex-direction:column;
  animation:fadeIn .45s cubic-bezier(.2,.8,.2,1);
}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ---------- TITLE ---------- */
#title{align-items:center;text-align:center;gap:8px;}
.logo{
  font-family:"Outfit",sans-serif;font-weight:900;
  font-size:clamp(64px,22vw,108px);line-height:.92;letter-spacing:-.03em;
  background:linear-gradient(135deg,#ff5e8a,#ffb938 30%,#22c55e 60%,#3aa0ff 90%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:saturate(1.05);
}
.logo-jp{
  font-weight:900;font-size:clamp(34px,12vw,56px);letter-spacing:.18em;
  margin-top:-4px;
}
.tagline{color:var(--sub);font-size:14px;font-weight:500;margin:6px 0 22px;letter-spacing:.04em;}
.modes{display:flex;flex-direction:column;gap:12px;width:100%;}
.mode-btn{
  position:relative;overflow:hidden;
  background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:16px 18px;
  display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform .12s ease,box-shadow .25s ease;
}
.mode-btn:active{transform:scale(.975);}
.mode-ico{
  width:46px;height:46px;flex:0 0 46px;border-radius:14px;
  display:grid;place-items:center;font-size:24px;
}
.mi-time{background:linear-gradient(135deg,#3aa0ff,#5ed0ff);}
.mi-inf{background:linear-gradient(135deg,#a855f7,#ec4899);}
.mi-speed{background:linear-gradient(135deg,#ff8a3a,#ffce3a);}
.mode-meta{flex:1;min-width:0;}
.mode-name{font-weight:700;font-size:17px;letter-spacing:.02em;}
.mode-desc{color:var(--sub);font-size:12px;font-weight:500;margin-top:2px;}
.mode-best{
  text-align:right;flex:0 0 auto;font-family:"Outfit";
}
.mode-best .b-lab{font-size:10px;color:var(--sub);letter-spacing:.1em;text-transform:uppercase;}
.mode-best .b-val{font-weight:800;font-size:20px;line-height:1;}
.title-foot{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:22px;}
.icon-btn{
  width:46px;height:46px;border-radius:14px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-size:20px;cursor:pointer;
  display:grid;place-items:center;box-shadow:var(--shadow-sm);
  transition:transform .12s ease;
}
.icon-btn:active{transform:scale(.9);}
.stat-pill{
  font-family:"Outfit";font-size:12px;color:var(--sub);font-weight:600;
  padding:0 14px;
}
.stat-pill b{color:var(--ink);font-weight:800;}

/* ---------- GAME ---------- */
#game{gap:0;}
.hud{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:10px;
}
.hud-cell{display:flex;flex-direction:column;line-height:1;}
.hud-cell .lab{font-size:10px;letter-spacing:.14em;color:var(--sub);text-transform:uppercase;font-weight:700;margin-bottom:5px;}
.hud-cell .val{font-family:"Outfit";font-weight:800;font-size:26px;}
.hud-mid{align-items:center;flex:1;}
.timebar-wrap{height:8px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:2px;width:100%;}
.timebar{height:100%;width:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#7be3a6);transition:background .3s;}
.lives{display:flex;gap:5px;margin-top:5px;}
.life{width:12px;height:12px;border-radius:99px;background:var(--bad);transition:transform .3s,opacity .3s,background .3s;}
.life.lost{opacity:.18;transform:scale(.7);background:var(--sub);}
.hud-right{align-items:flex-end;}
.pause-btn{
  width:40px;height:40px;border-radius:12px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-size:15px;cursor:pointer;
  display:grid;place-items:center;
}
.board-wrap{
  position:relative;width:100%;
  aspect-ratio:1/1;
  max-width:min(94vw,72vh,460px);
  margin:0 auto;
}
.board{
  position:absolute;inset:0;
  display:grid;gap:clamp(5px,1.6vw,10px);
  transition:opacity .18s ease,transform .18s ease;
}
.board.swap{opacity:0;transform:scale(.94);}
.cell{
  border-radius:clamp(9px,2.6vw,16px);
  box-shadow:var(--cell-shadow);
  cursor:pointer;position:relative;
  transition:transform .08s ease;
  will-change:transform;
}
.cell:active{transform:scale(.94);}
.cell.correct{animation:popCorrect .5s cubic-bezier(.2,.9,.2,1) forwards;z-index:3;}
@keyframes popCorrect{
  0%{transform:scale(.9);}
  40%{transform:scale(1.18);box-shadow:0 0 0 6px var(--accent-soft);}
  100%{transform:scale(1);}
}
.cell.wrong{animation:shakeCell .4s ease;}
@keyframes shakeCell{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-7px);}40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}80%{transform:translateX(3px);}
}
.ripple{
  position:absolute;border-radius:50%;pointer-events:none;
  border:3px solid var(--accent);left:50%;top:50%;
  width:30px;height:30px;transform:translate(-50%,-50%) scale(.3);
  opacity:.9;z-index:4;
}
.ripple.go{animation:rip .6s ease-out forwards;}
@keyframes rip{to{transform:translate(-50%,-50%) scale(6);opacity:0;}}
.board-flash{
  position:absolute;inset:-20px;border-radius:24px;background:var(--bad);
  opacity:0;pointer-events:none;z-index:1;
}
.board-flash.go{animation:redFlash .4s ease;}
@keyframes redFlash{0%{opacity:0;}25%{opacity:.16;}100%{opacity:0;}}
.game-foot{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:18px;color:var(--sub);font-size:12px;font-weight:600;letter-spacing:.05em;
}
.game-foot .dot{width:5px;height:5px;border-radius:99px;background:var(--sub);opacity:.5;}

/* shake whole screen on wrong */
.shake{animation:scShake .35s ease;}
@keyframes scShake{
  0%,100%{transform:none;}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}
}

/* ---------- RESULT ---------- */
#result{align-items:center;text-align:center;}
.res-card{
  width:100%;background:var(--panel);border:1px solid var(--line);
  border-radius:28px;padding:30px 26px 26px;box-shadow:var(--shadow);
}
.res-rank-badge{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 16px;border-radius:99px;font-weight:800;font-size:14px;
  color:#fff;letter-spacing:.04em;margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.res-lab{font-size:12px;color:var(--sub);letter-spacing:.16em;text-transform:uppercase;font-weight:700;}
.res-level{
  font-family:"Outfit";font-weight:900;font-size:84px;line-height:.9;
  letter-spacing:-.03em;margin:4px 0 2px;
}
.res-rank-name{font-weight:900;font-size:22px;letter-spacing:.06em;}
.res-rank-en{color:var(--sub);font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;margin-top:2px;}
.new-record{
  display:none;margin-top:16px;
  background:linear-gradient(135deg,var(--gold),#ff8a3a);color:#fff;
  font-weight:900;font-size:15px;letter-spacing:.12em;padding:9px 0;border-radius:14px;
  animation:recPulse 1.1s ease-in-out infinite;
}
.new-record.show{display:block;}
@keyframes recPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
.res-best{margin-top:14px;color:var(--sub);font-size:13px;font-weight:600;}
.res-best b{color:var(--ink);font-family:"Outfit";font-weight:800;}
.res-btns{display:flex;flex-direction:column;gap:10px;margin-top:22px;width:100%;}
.btn{
  border:none;border-radius:16px;padding:15px;font-size:16px;font-weight:800;
  cursor:pointer;font-family:inherit;letter-spacing:.04em;
  transition:transform .12s ease,filter .2s ease;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--ink);color:var(--bg);}
.btn-share{background:#000;color:#fff;display:flex;align-items:center;justify-content:center;gap:9px;}
html[data-theme="dark"] .btn-share{background:#fff;color:#000;}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--line);}
.row2{display:flex;gap:10px;}
.row2 .btn{flex:1;}

/* ---------- INTRO ---------- */
.overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(8,8,12,.6);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn .3s ease;
}
.overlay.active{display:flex;}
.intro-card{
  background:var(--panel);border-radius:26px;padding:32px 26px;max-width:380px;width:100%;
  text-align:center;box-shadow:var(--shadow);
}
.intro-demo{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:150px;margin:0 auto 22px;
}
.intro-demo div{aspect-ratio:1;border-radius:11px;background:#3aa0ff;box-shadow:var(--cell-shadow);}
.intro-demo .odd{background:#5ed0ff;animation:hintPulse 1.4s ease-in-out infinite;}
@keyframes hintPulse{0%,100%{transform:scale(1);box-shadow:var(--cell-shadow);}50%{transform:scale(1.08);box-shadow:0 0 0 5px var(--accent-soft);}}
.intro-title{font-weight:900;font-size:24px;letter-spacing:.04em;margin-bottom:8px;}
.intro-text{color:var(--sub);font-size:14.5px;line-height:1.7;font-weight:500;margin-bottom:24px;}
.intro-text b{color:var(--ink);}

/* pause overlay */
.pause-card{background:var(--panel);border-radius:24px;padding:30px;text-align:center;max-width:320px;width:100%;box-shadow:var(--shadow);}
.pause-card h3{font-size:22px;margin-bottom:20px;letter-spacing:.06em;}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:60;}

.fab-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <section id="title" class="screen active">
    <div class="logo">SHIKI</div>
    <div class="logo-jp">シキ</div>
    <div class="tagline">違う色を、一瞬で見抜け。</div>
    <div class="modes">
      <button class="mode-btn" data-mode="time">
        <div class="mode-ico mi-time">⏱️</div>
        <div class="mode-meta">
          <div class="mode-name">タイムアタック</div>
          <div class="mode-desc">60秒で何レベルまで行ける？</div>
        </div>
        <div class="mode-best"><div class="b-lab">BEST</div><div class="b-val" id="best-time">-</div></div>
      </button>
      <button class="mode-btn" data-mode="infinite">
        <div class="mode-ico mi-inf">♾️</div>
        <div class="mode-meta">
          <div class="mode-name">無限モード</div>
          <div class="mode-desc">3ミスで終了。限界に挑め</div>
        </div>
        <div class="mode-best"><div class="b-lab">BEST</div><div class="b-val" id="best-infinite">-</div></div>
      </button>
      <button class="mode-btn" data-mode="speed">
        <div class="mode-ico mi-speed">⚡</div>
        <div class="mode-meta">
          <div class="mode-name">スピードモード</div>
          <div class="mode-desc">制限時間がどんどん短く</div>
        </div>
        <div class="mode-best"><div class="b-lab">BEST</div><div class="b-val" id="best-speed">-</div></div>
      </button>
    </div>
    <div class="title-foot">
      <button class="icon-btn" id="btn-sound" title="サウンド">🔊</button>
      <div class="stat-pill">プレイ <b id="stat-plays">0</b> 回 ・ 最高 <b id="stat-rank">-</b></div>
      <button class="icon-btn" id="btn-theme" title="テーマ">🌙</button>
    </div>
  </section>

  <!-- GAME -->
  <section id="game" class="screen">
    <div class="hud">
      <div class="hud-cell">
        <div class="lab">LEVEL</div>
        <div class="val" id="hud-level">1</div>
      </div>
      <div class="hud-cell hud-mid">
        <div class="lab" id="hud-mid-lab">TIME</div>
        <div class="val" id="hud-mid-val" style="font-size:22px;">60.0</div>
        <div class="timebar-wrap" id="timebar-wrap"><div class="timebar" id="timebar"></div></div>
        <div class="lives" id="lives" style="display:none;"></div>
      </div>
      <div class="hud-cell hud-right">
        <div class="lab">　</div>
        <button class="pause-btn" id="btn-pause">❚❚</button>
      </div>
    </div>
    <div class="board-wrap">
      <div class="board-flash" id="board-flash"></div>
      <div class="board" id="board"></div>
    </div>
    <div class="game-foot">
      <span id="foot-mode">タイムアタック</span>
      <span class="dot"></span>
      <span id="foot-rank">凡人の目</span>
    </div>
  </section>

  <!-- RESULT -->
  <section id="result" class="screen">
    <div class="res-card">
      <div class="res-rank-badge" id="res-badge">RANK</div>
      <div class="res-lab">到達レベル</div>
      <div class="res-level" id="res-level">12</div>
      <div class="res-rank-name" id="res-rank-name">冴えた目</div>
      <div class="res-rank-en" id="res-rank-en">SHARP EYE</div>
      <div class="new-record" id="new-record">🎉 NEW RECORD 🎉</div>
      <div class="res-best">自己ベスト <b id="res-best">12</b> ・ <span id="res-mode">タイムアタック</span></div>
    </div>
    <div class="res-btns">
      <button class="btn btn-share" id="btn-share">𝕏 結果をシェア</button>
      <div class="row2">
        <button class="btn btn-primary" id="btn-retry">もう一度</button>
        <button class="btn btn-ghost" id="btn-home">ホーム</button>
      </div>
    </div>
  </section>

</div>

<!-- INTRO -->
<div class="overlay" id="intro">
  <div class="intro-card">
    <div class="intro-demo"><div></div><div></div><div></div><div class="odd"></div><div></div><div></div><div></div><div></div><div></div></div>
    <div class="intro-title">違う色を見つけろ</div>
    <div class="intro-text">マスの中に<b>1つだけ色が違う</b>マスがあります。<br>それをタップするだけ。<br>レベルが上がるほど差は小さく、シビアに。</div>
    <button class="btn btn-primary" id="btn-intro-ok" style="width:100%;">はじめる</button>
  </div>
</div>

<!-- PAUSE -->
<div class="overlay" id="pause">
  <div class="pause-card">
    <h3>一時停止</h3>
    <div class="res-btns">
      <button class="btn btn-primary" id="btn-resume">再開</button>
      <button class="btn btn-ghost" id="btn-quit">やめる</button>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<script>
(function(){
"use strict";
const $=s=>document.querySelector(s);
const screens={title:$("#title"),game:$("#game"),result:$("#result")};
function show(name){for(const k in screens)screens[k].classList.toggle("active",k===name);}

/* ---------- storage ---------- */
const LS={
  get(k,d){try{const v=localStorage.getItem("shiki_"+k);return v===null?d:JSON.parse(v);}catch(e){return d;}},
  set(k,v){try{localStorage.setItem("shiki_"+k,JSON.stringify(v));}catch(e){}}
};
let bests={time:LS.get("best_time",0),infinite:LS.get("best_infinite",0),speed:LS.get("best_speed",0)};
let plays=LS.get("plays",0);
let soundOn=LS.get("sound",true);
let theme=LS.get("theme","light");

/* ---------- ranks ---------- */
const RANKS=[
  {min:1,max:5,name:"凡人の目",en:"NOVICE EYE",color:"#9aa0aa"},
  {min:6,max:15,name:"冴えた目",en:"SHARP EYE",color:"#3aa0ff"},
  {min:16,max:30,name:"鷹の目",en:"HAWK EYE",color:"#a855f7"},
  {min:31,max:50,name:"神の目",en:"DIVINE EYE",color:"#ff8a3a"},
  {min:51,max:Infinity,name:"色の支配者",en:"COLOR MASTER",color:"#22c55e"}
];
function rankFor(lv){for(const r of RANKS)if(lv>=r.min&&lv<=r.max)return r;return RANKS[0];}
const MODE_NAMES={time:"タイムアタック",infinite:"無限モード",speed:"スピードモード"};

/* ---------- audio ---------- */
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return actx;}
function tone(freq,dur,type,vol,when){
  if(!soundOn)return;const c=ac();if(!c)return;
  const t=c.currentTime+(when||0);
  const o=c.createOscillator(),g=c.createGain();
  o.type=type||"sine";o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||.18,t+.012);
  g.gain.exponentialRampToValueAtTime(.0008,t+dur);
  o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur+.02);
}
function sfxCorrect(lv){
  const base=520+Math.min(lv,40)*8;
  tone(base,.12,"sine",.2,0);tone(base*1.5,.16,"sine",.14,.05);
}
function sfxWrong(){tone(150,.18,"sawtooth",.16,0);tone(110,.22,"square",.1,.04);}
function sfxLevel(lv){
  const n=[0,4,7,12],b=440+Math.min(lv,30)*4;
  n.forEach((s,i)=>tone(b*Math.pow(2,s/12),.16,"triangle",.13,i*.05));
}
function sfxRecord(){
  const seq=[523,659,784,1047,1319];
  seq.forEach((f,i)=>tone(f,.32,"triangle",.2,i*.1));
  tone(1568,.5,"sine",.16,.5);
}
function sfxOver(){tone(330,.2,"sine",.15,0);tone(247,.3,"sine",.13,.12);tone(196,.45,"sine",.12,.24);}

/* ---------- difficulty ---------- */
function gridSize(lv){
  if(lv<=2)return 2;if(lv<=5)return 3;if(lv<=9)return 4;
  if(lv<=14)return 5;if(lv<=20)return 6;if(lv<=28)return 7;return 8;
}
function colorDelta(lv){
  // lightness difference in %, from ~16 (easy) down to ~1.5 (extreme)
  const t=Math.min(1,(lv-1)/42);
  return 1.5+14.5*Math.pow(1-t,1.75);
}
function makeColors(lv){
  const hue=Math.floor(Math.random()*360);
  const sat=58+Math.random()*16;          // 58-74
  const light=50+Math.random()*10;         // 50-60
  const d=colorDelta(lv);
  let sign;
  if(light+d>78)sign=-1;else if(light-d<28)sign=1;else sign=Math.random()<.5?-1:1;
  const oddLight=Math.max(20,Math.min(82,light+sign*d));
  return{
    base:`hsl(${hue} ${sat.toFixed(1)}% ${light.toFixed(1)}%)`,
    odd:`hsl(${hue} ${sat.toFixed(1)}% ${oddLight.toFixed(1)}%)`
  };
}

/* ---------- game state ---------- */
const TIME_START=60, TIME_BONUS=0.9, TIME_PENALTY=2.2;
const SPEED_START=5.0, SPEED_MIN=1.15, SPEED_STEP=0.16;
let state=null,rafId=null,lastTs=0;

function startGame(mode){
  ac();
  state={mode,level:1,misses:0,best:bests[mode],running:true,paused:false,locked:false,
    time:mode==="time"?TIME_START:0,qLimit:0,qLeft:0};
  plays++;LS.set("plays",plays);refreshTitleStats();
  $("#foot-mode").textContent=MODE_NAMES[mode];
  // HUD config
  const midLab=$("#hud-mid-lab"),tbWrap=$("#timebar-wrap"),lives=$("#lives");
  if(mode==="infinite"){
    midLab.textContent="MISS";tbWrap.style.display="none";lives.style.display="flex";
    lives.innerHTML='<div class="life"></div><div class="life"></div><div class="life"></div>';
    $("#hud-mid-val").style.display="none";
  }else{
    tbWrap.style.display="block";lives.style.display="none";$("#hud-mid-val").style.display="block";
    midLab.textContent=mode==="time"?"TIME":"FREEZE";
  }
  show("game");
  buildBoard(true);
  lastTs=0;
  if(mode!=="infinite"){cancelAnimationFrame(rafId);rafId=requestAnimationFrame(loop);}
  updateHUD();
}

function buildBoard(first){
  const n=gridSize(state.level);
  const c=makeColors(state.level);
  state.oddIndex=Math.floor(Math.random()*n*n);
  const board=$("#board");
  const render=()=>{
    board.style.gridTemplateColumns=`repeat(${n},1fr)`;
    board.style.gridTemplateRows=`repeat(${n},1fr)`;
    let html="";
    for(let i=0;i<n*n;i++){
      html+=`<div class="cell" data-i="${i}" style="background:${i===state.oddIndex?c.odd:c.base}"></div>`;
    }
    board.innerHTML=html;
    board.classList.remove("swap");
    state.locked=false;
  };
  if(first){render();}
  else{
    board.classList.add("swap");
    setTimeout(render,180);
  }
  // speed mode question timer
  if(state.mode==="speed"){
    state.qLimit=Math.max(SPEED_MIN,SPEED_START-(state.level-1)*SPEED_STEP);
    state.qLeft=state.qLimit;
  }
}

function onBoardTap(e){
  const cell=e.target.closest(".cell");
  if(!cell||!state||!state.running||state.paused||state.locked)return;
  const i=+cell.dataset.i;
  if(i===state.oddIndex){
    state.locked=true;
    cell.classList.add("correct");
    spawnRipple(cell);
    sfxCorrect(state.level);
    if(state.mode==="time")state.time=Math.min(TIME_START,state.time+TIME_BONUS);
    state.level++;
    if(state.level%5===0)sfxLevel(state.level);
    setTimeout(()=>{if(state&&state.running){buildBoard(false);updateHUD();}},170);
    updateHUD();
  }else{
    cell.classList.add("wrong");
    setTimeout(()=>cell.classList.remove("wrong"),400);
    flashBad();
    sfxWrong();
    if(navigator.vibrate)navigator.vibrate(40);
    if(state.mode==="time"){
      state.time=Math.max(0,state.time-TIME_PENALTY);
      if(state.time<=0)return endGame();
    }else if(state.mode==="infinite"){
      state.misses++;updateLives();
      if(state.misses>=3)return endGame();
    }else if(state.mode==="speed"){
      endGame();
    }
  }
}

function spawnRipple(cell){
  const r=document.createElement("div");r.className="ripple";
  cell.appendChild(r);requestAnimationFrame(()=>r.classList.add("go"));
  setTimeout(()=>r.remove(),650);
}
function flashBad(){
  const f=$("#board-flash");f.classList.remove("go");void f.offsetWidth;f.classList.add("go");
  const g=$("#game");g.classList.remove("shake");void g.offsetWidth;g.classList.add("shake");
}
function updateLives(){
  const ls=$("#lives").children;
  for(let i=0;i<3;i++)ls[i].classList.toggle("lost",i<state.misses);
}

function loop(ts){
  if(!state||!state.running){return;}
  if(!state.paused){
    if(!lastTs)lastTs=ts;
    const dt=(ts-lastTs)/1000;lastTs=ts;
    if(state.mode==="time"){
      state.time-=dt;
      if(state.time<=0){state.time=0;updateHUD();return endGame();}
    }else if(state.mode==="speed"){
      state.qLeft-=dt;
      if(state.qLeft<=0){state.qLeft=0;updateHUD();return endGame();}
    }
    updateHUD();
  }else{lastTs=ts;}
  rafId=requestAnimationFrame(loop);
}

function updateHUD(){
  $("#hud-level").textContent=state.level;
  const r=rankFor(state.level);$("#foot-rank").textContent=r.name;
  const val=$("#hud-mid-val"),bar=$("#timebar");
  if(state.mode==="time"){
    val.textContent=state.time.toFixed(1);
    const p=state.time/TIME_START;bar.style.width=(p*100)+"%";
    bar.style.background=state.time<=10?"linear-gradient(90deg,#ff4d57,#ff8a3a)":"linear-gradient(90deg,var(--accent),#7be3a6)";
    if(state.time<=10&&Math.ceil(state.time)!==Math.ceil(state.time+0.02)){tone(880,.06,"sine",.08);}
  }else if(state.mode==="speed"){
    val.textContent=state.qLeft.toFixed(1);
    const p=state.qLimit?state.qLeft/state.qLimit:0;bar.style.width=(p*100)+"%";
    bar.style.background=p<.35?"linear-gradient(90deg,#ff4d57,#ff8a3a)":"linear-gradient(90deg,var(--accent),#7be3a6)";
  }
}

function endGame(){
  if(!state)return;
  state.running=false;cancelAnimationFrame(rafId);
  const reached=state.level;          // level reached = score
  const mode=state.mode;
  const r=rankFor(reached);
  const isRecord=reached>bests[mode];
  if(isRecord){bests[mode]=reached;LS.set("best_"+mode,reached);}
  const bestRank=LS.get("bestRank",0);
  if(reached>bestRank)LS.set("bestRank",reached);
  // result UI
  $("#res-level").textContent=reached;
  $("#res-rank-name").textContent=r.name;
  $("#res-rank-en").textContent=r.en;
  const badge=$("#res-badge");badge.textContent=r.name;badge.style.background=r.color;
  $("#res-mode").textContent=MODE_NAMES[mode];
  $("#res-best").textContent=bests[mode];
  $("#new-record").classList.toggle("show",isRecord);
  refreshTitleStats();
  show("result");
  if(isRecord){sfxRecord();confettiBurst();}else{sfxOver();}
  state._mode=mode;
}

/* ---------- title stats ---------- */
function fmt(v){return v>0?v:"-";}
function refreshTitleStats(){
  $("#best-time").textContent=fmt(bests.time);
  $("#best-infinite").textContent=fmt(bests.infinite);
  $("#best-speed").textContent=fmt(bests.speed);
  $("#stat-plays").textContent=plays;
  const br=LS.get("bestRank",0);
  $("#stat-rank").textContent=br>0?rankFor(br).name:"-";
}

/* ---------- confetti ---------- */
const cvs=$("#confetti"),cx=cvs.getContext("2d");
let parts=[],confRaf=null;
function resizeCvs(){cvs.width=innerWidth;cvs.height=innerHeight;}
resizeCvs();addEventListener("resize",resizeCvs);
function confettiBurst(){
  const cols=["#ff5e8a","#ffb938","#22c55e","#3aa0ff","#a855f7"];
  parts=[];
  for(let i=0;i<140;i++){
    parts.push({x:innerWidth/2,y:innerHeight*0.38,
      vx:(Math.random()-.5)*16,vy:Math.random()*-15-4,
      g:.42+Math.random()*.2,size:6+Math.random()*7,
      col:cols[i%cols.length],rot:Math.random()*6.28,vr:(Math.random()-.5)*.4,life:1});
  }
  if(!confRaf)confRaf=requestAnimationFrame(confLoop);
}
function confLoop(){
  cx.clearRect(0,0,cvs.width,cvs.height);
  let alive=false;
  for(const p of parts){
    if(p.life<=0)continue;alive=true;
    p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vx*=.99;
    if(p.y>cvs.height+30)p.life=0;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.col;
    cx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);cx.restore();
  }
  if(alive)confRaf=requestAnimationFrame(confLoop);
  else{confRaf=null;cx.clearRect(0,0,cvs.width,cvs.height);}
}

/* ---------- share ---------- */
function share(){
  const lv=$("#res-level").textContent;
  const rk=$("#res-rank-name").textContent;
  const mode=$("#res-mode").textContent;
  const text=`「シキ」${mode}でレベル${lv}「${rk}」に到達！🎨\nあなたは違う色を見抜けるか？\n#シキ #色を見抜け`;
  const url=location.href.split("#")[0];
  if(navigator.share){
    navigator.share({text,url}).catch(()=>{});
  }else{
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,"_blank");
  }
}

/* ---------- pause ---------- */
function pauseGame(){if(!state||!state.running)return;state.paused=true;$("#pause").classList.add("active");}
function resumeGame(){if(!state)return;state.paused=false;$("#pause").classList.remove("active");lastTs=0;}
function quitGame(){
  state&&(state.running=false);cancelAnimationFrame(rafId);
  $("#pause").classList.remove("active");show("title");
}

/* ---------- theme & sound ---------- */
function applyTheme(){
  document.documentElement.setAttribute("data-theme",theme);
  $("#btn-theme").textContent=theme==="dark"?"☀️":"🌙";
  document.querySelector('meta[name=theme-color]').setAttribute("content",theme==="dark"?"#15151a":"#f7f6f3");
}
function applySound(){$("#btn-sound").textContent=soundOn?"🔊":"🔇";$("#btn-sound").style.opacity=soundOn?"1":".5";}

/* ---------- events ---------- */
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    const mode=b.dataset.mode;
    if(!LS.get("introSeen",false)){
      $("#intro").classList.add("active");
      $("#btn-intro-ok").onclick=()=>{LS.set("introSeen",true);$("#intro").classList.remove("active");startGame(mode);};
    }else startGame(mode);
  });
});
$("#board").addEventListener("pointerdown",onBoardTap);
$("#btn-pause").addEventListener("click",pauseGame);
$("#btn-resume").addEventListener("click",resumeGame);
$("#btn-quit").addEventListener("click",quitGame);
$("#btn-retry").addEventListener("click",()=>startGame(state._mode));
$("#btn-home").addEventListener("click",()=>show("title"));
$("#btn-share").addEventListener("click",share);
$("#btn-theme").addEventListener("click",()=>{theme=theme==="dark"?"light":"dark";LS.set("theme",theme);applyTheme();});
$("#btn-sound").addEventListener("click",()=>{soundOn=!soundOn;LS.set("sound",soundOn);applySound();if(soundOn)tone(660,.1,"sine",.15);});
document.addEventListener("visibilitychange",()=>{if(document.hidden&&state&&state.running&&!state.paused&&state.mode!=="infinite")pauseGame();});

/* ---------- init ---------- */
applyTheme();applySound();refreshTitleStats();
})();
</script>
</body>
</html>
